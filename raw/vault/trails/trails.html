<template id="node-06-10" data-type="node" data-trail="trail-06" data-order="10"
  data-title="DDIA Transactions"
  data-file="DDIA/Transactions.md"
  data-bridge="">

<h3>Why Transactions Exist</h3>
<p>A <strong>transaction</strong> groups reads and writes into a logical unit: either everything succeeds (commit) or everything is undone (abort/rollback). They simplify error handling when hardware fails mid-write, apps crash mid-op, networks cut connections, or concurrent clients overwrite each other.</p>
<div class="warn">Transactions are a design choice, not a requirement. Without them, every failure path and concurrency edge case must be handled entirely by the application.</div>

<h3>ACID</h3>
<table>
  <thead><tr><th>Letter</th><th>What it actually means</th><th>Responsible</th></tr></thead>
  <tbody>
    <tr><td><strong>Atomicity</strong></td><td>All-or-nothing. Fault mid-txn → all writes undone. Better name: <em>abortability</em>. NOT about concurrency — that's Isolation.</td><td>Database</td></tr>
    <tr><td><strong>Consistency</strong></td><td>Application invariants (credits = debits) preserved. The app defines what's valid. "Was tossed in to make the acronym work."</td><td>Application</td></tr>
    <tr><td><strong>Isolation</strong></td><td>Concurrent transactions don't interfere. Ideal: same result as serial execution. In practice, most DBs use weaker levels.</td><td>Database</td></tr>
    <tr><td><strong>Durability</strong></td><td>Once committed, survives crashes. Single-node: WAL. Replicated: copied to n nodes. Perfect durability doesn't exist.</td><td>Database</td></tr>
  </tbody>
</table>
<div class="info">"Consistency" has 4 distinct meanings in DDIA: (1) replica consistency (Ch.5), (2) consistent hashing (Ch.6), (3) linearizability (Ch.9), (4) ACID consistency here. Context always matters.</div>

<h3>Multi-Object Transactions &amp; Retry Pitfalls</h3>
<ul>
  <li><strong>Multi-object transactions</strong> needed when: keeping foreign keys valid, syncing denormalized data (email count + unread flag), updating secondary indexes atomically with primary data</li>
  <li>Retrying aborted transactions is the whole point of atomicity — but retries have edge cases:</li>
</ul>
<table>
  <thead><tr><th>Retry scenario</th><th>Problem</th><th>Fix</th></tr></thead>
  <tbody>
    <tr><td>Network fail after commit</td><td>Client doesn't know it succeeded → retry = duplicate</td><td>Idempotency keys / app deduplication</td></tr>
    <tr><td>Overload caused the failure</td><td>Retry adds more load</td><td>Exponential backoff</td></tr>
    <tr><td>Permanent error (constraint)</td><td>Retry is pointless</td><td>Don't retry</td></tr>
    <tr><td>Side effects (email sent)</td><td>Can't undo</td><td>Two-phase commit (Ch.9)</td></tr>
  </tbody>
</table>
<div class="warn">Many ORMs (Django, Rails ActiveRecord) don't retry aborted transactions — the error bubbles up and user input is lost. This defeats the purpose of transactions.</div>

<h3>Isolation Level Ladder</h3>
<pre>
  Weakest                                                         Strongest
  ──────────────────────────────────────────────────────────────────────────►
  Read Uncommitted │ Read Committed  │ Snapshot Isolation │ Serializable
  (almost unused)  │ (default most   │ (called "Repeatable│ (prevents ALL
                   │  DBs)           │  Read" in most DBs)│  race conditions)</pre>

<h3>Read Committed</h3>
<div class="compare">
  <div><h4>No dirty reads</h4><pre>You only see committed data.
Uncommitted writes by other txns
are invisible to you.
Implementation: DB keeps both old
committed value + new uncommitted
value. Reads return old value until
writing txn commits.</pre></div>
  <div><h4>No dirty writes</h4><pre>You only overwrite committed data.
Two txns writing same object:
second waits until first commits.
Implementation: row-level write
locks held until commit/abort.
Does NOT prevent lost updates.</pre></div>
</div>
<div class="info">Default in PostgreSQL, Oracle, SQL Server, MemSQL.</div>

<h3>Snapshot Isolation + MVCC</h3>
<p><strong>Read skew</strong> (nonrepeatable read): Alice checks two accounts during a transfer and sees $100 missing — she caught the transfer mid-flight. Usually harmless, but critical for backups (inconsistent snapshot) and analytics queries (nonsensical results). Solution: each transaction reads from a <strong>consistent snapshot</strong> of the DB at its start time.</p>
<pre>
  Multi-Version Concurrency Control (MVCC)

  Each write creates a new row version tagged with the writing transaction's ID.
  Each row tracks: created_by(txn_id)  deleted_by(txn_id)

  v1: created_by=10, deleted_by=20  ← old version
  v2: created_by=20, deleted_by=NULL ← current version

  Visibility rules at read time (hide this version if ANY of):
    1. Writing txn not yet committed when this txn started
    2. Writing txn was aborted
    3. Writing txn has a higher ID (started after us)
  Everything else → visible.

  Key property: readers never block writers, writers never block readers.
  Long-running read queries work on a consistent snapshot without blocking writes.</pre>
<div class="warn">Naming confusion: Oracle calls snapshot isolation "serializable" (it isn't). PostgreSQL/MySQL call it "repeatable read". IBM DB2 uses "repeatable read" to mean actual serializability. "Nobody really knows what repeatable read means."</div>

<h3>Preventing Lost Updates</h3>
<p>Two transactions both read-modify-write the same value. The second write clobbers the first (incrementing a counter, editing a wiki page, updating a JSON document).</p>
<table>
  <thead><tr><th>Solution</th><th>How</th><th>Risk</th></tr></thead>
  <tbody>
    <tr><td><strong>Atomic write operations</strong></td><td><code>UPDATE counters SET value = value + 1</code> — DB does it atomically with exclusive lock</td><td>Not all logic can be expressed atomically</td></tr>
    <tr><td><strong>Explicit locking</strong></td><td><code>SELECT ... FOR UPDATE</code> locks rows before read-modify-write cycle</td><td>Easy to forget a lock somewhere</td></tr>
    <tr><td><strong>Automatic detection</strong></td><td>DB detects lost updates during snapshot isolation and aborts offender</td><td>MySQL/InnoDB does NOT do this</td></tr>
    <tr><td><strong>Compare-and-set</strong></td><td><code>UPDATE ... WHERE content = 'old value'</code> — only succeeds if unchanged</td><td>Unsafe if WHERE reads from old snapshot — check your DB</td></tr>
    <tr><td><strong>Conflict resolution</strong></td><td>Replicated DBs: last-write-wins or CRDTs/merge at application level</td><td>LWW (Cassandra default) silently loses data</td></tr>
  </tbody>
</table>

<h3>Write Skew &amp; Phantoms</h3>
<p>The subtlest race condition. Two transactions read the same data, make decisions based on it, then update <em>different</em> objects. No dirty write, no lost update — but the combined effect violates an invariant.</p>
<pre>
  The 4-step pattern (appears everywhere):
  1. SELECT — check a precondition (≥2 doctors on call, room not booked, balance &gt; 0)
  2. Application decides to proceed based on the result
  3. WRITE (INSERT/UPDATE/DELETE) — changes data, invalidating the precondition
  4. Concurrent txn did the same thing → both proceeded on a stale premise

  ──────────────────────────────────────────────────────────────
  Doctor on-call (write skew on existing rows):
  ──────────────────────────────────────────────────────────────
  t1  Txn A (Alice): SELECT on_call_count → 2
  t2  Txn B (Bob):   SELECT on_call_count → 2 (same snapshot)
  t3  Txn A: 2 ≥ 2, safe → UPDATE doctors SET on_call=false WHERE name='Alice'
  t4  Txn B: 2 ≥ 2, safe → UPDATE doctors SET on_call=false WHERE name='Bob'
  t5  Both COMMIT → 0 doctors on call. Invariant violated. ✗

  Each txn updated a different row → no write-write conflict detected.
  Snapshot isolation misses this entirely.

  ──────────────────────────────────────────────────────────────
  Meeting room booking (phantom — no rows exist to lock):
  ──────────────────────────────────────────────────────────────
  t1  Txn A: SELECT room_101 overlap noon-1pm → 0 rows (no conflict)
  t2  Txn B: SELECT room_101 overlap noon-1pm → 0 rows (Alice's INSERT not yet visible)
  t3  Txn A: INSERT booking(Alice, room_101, noon-1pm)
  t4  Txn B: INSERT booking(Bob,   room_101, noon-1pm)
  t5  Both COMMIT → room 101 double-booked. ✗

  SELECT...FOR UPDATE on zero rows locks nothing — there's nothing to attach a lock to.
  Bob's INSERT changes the result of Alice's earlier SELECT: this is a phantom.</pre>

<table>
  <thead><tr><th>Scenario</th><th>Precondition</th><th>Fix</th></tr></thead>
  <tbody>
    <tr><td>Doctor on-call</td><td>≥2 doctors on call</td><td>FOR UPDATE on matching rows, or serializable</td></tr>
    <tr><td>Room booking</td><td>No overlapping bookings</td><td>Serializable — phantom, can't lock non-existent rows</td></tr>
    <tr><td>Username claim</td><td>Username not taken</td><td>Unique constraint (simple fix)</td></tr>
    <tr><td>Double-spending</td><td>Balance ≥ amount</td><td>Serializable</td></tr>
    <tr><td>Multiplayer game</td><td>Position not taken</td><td>Unique constraint or serializable</td></tr>
  </tbody>
</table>
<div class="info"><strong>Materializing conflicts</strong> (last resort): create a table of all possible lock targets (e.g., all room–timeslot combos for 6 months). Lock rows with FOR UPDATE. Correct, but leaks concurrency control into the data model.</div>

<h3>Serializability: 3 Approaches</h3>

<h4>Approach 1 — Actual Serial Execution</h4>
<pre>
  One transaction at a time, single thread. Became practical ~2007:
  - RAM got cheap → active dataset fits in memory, no disk I/O waits
  - OLTP transactions are short → single thread handles many/sec
  - Analytics queries run separately on snapshot isolation

  Requirements:
  ┌──────────────────────────────────────────────────────────────┐
  │ Stored procedures — entire txn submitted as one unit         │
  │   (interactive back-and-forth means the single thread spends │
  │    all its time waiting for network round trips)             │
  │ Transactions must be fast — one slow txn stalls everything   │
  │ Dataset fits in RAM                                          │
  │ Write throughput fits one CPU core, or data is partitioned   │
  └──────────────────────────────────────────────────────────────┘
  Cross-partition transactions: requires lock-step coordination across all
  partitions → orders of magnitude slower.
  VoltDB: ~1,000 cross-partition writes/sec vs millions for single-partition.

  Used by: VoltDB/H-Store, Redis, Datomic.</pre>

<h4>Approach 2 — Two-Phase Locking (2PL)</h4>
<pre>
  Core rule: readers block writers AND writers block readers.
  (Contrast: snapshot isolation — neither blocks the other)

  Lock modes:
  ┌───────────────┬────────────────────────────────────────────────┐
  │ Shared lock   │ Read — multiple txns can hold simultaneously    │
  │ Exclusive lock│ Write — no other lock (shared or excl) allowed  │
  │ Upgrade       │ Shared → exclusive when a read becomes a write  │
  └───────────────┴────────────────────────────────────────────────┘
  Phase 1: acquire locks during execution.
  Phase 2: release ALL locks at commit/abort.
  Deadlocks: DB detects cycles, aborts one txn. Must be retried.

  Performance: significantly worse throughput and p99 latency than
  weak isolation. One slow txn holding many locks can stall the entire system.

  2PL ≠ 2PC. Two-Phase Locking (concurrency) ≠ Two-Phase Commit (Ch.9, distributed txns).</pre>

<div class="compare">
  <div><h4>Row-level 2PL: solves write skew on existing rows</h4><pre>Doctor example (rows exist to lock):
t1 Txn A: SELECT → shared locks on Alice + Bob
t2 Txn B: SELECT → shared locks on Alice + Bob
   (shared locks coexist — both read OK)
t3 Txn A UPDATE Alice → needs exclusive lock
   Bob holds shared lock on Alice → Alice WAITS
t4 Txn B UPDATE Bob → needs exclusive lock
   Alice holds shared lock on Bob → Bob WAITS
   → DEADLOCK detected. Bob aborted.
t5 Alice commits. 1 doctor still on call. ✓</pre></div>
  <div><h4>Row-level 2PL FAILS for phantoms</h4><pre>Booking example (no rows to lock):
t1 Txn A: SELECT room_101 → 0 rows
   2PL wants shared locks on rows...
   but there are no rows. Lock attaches
   to nothing.
t2 Txn B: Same. Also acquires zero locks.
t3 Txn A: INSERT → exclusive lock on new row A
t4 Txn B: INSERT → exclusive lock on new row B
   (different rows — no conflict between them)
t5 Both COMMIT → room double-booked. ✗</pre></div>
</div>

<pre>
  Predicate locks: lock the logical condition itself
  ─────────────────────────────────────────────────────────────────────
  Instead of locking specific rows, lock the WHERE condition.
  Guards all objects — existing AND future — that match the predicate.
  Any INSERT/UPDATE/DELETE matching this condition must wait.
  Downside: every write checked against ALL active predicate locks → O(active_locks) per write.

  Index-range locks: the practical approximation (what real DBs use)
  ─────────────────────────────────────────────────────────────────────
  Instead of the exact predicate, lock the INDEX ENTRY the query used to search.
  Superset of the original condition → O(1) check (just look at the index entry).
  Example: query used room_id index → lock index entry for room_id=101.
  Any INSERT for room_id=101 must update that index → blocked. ✓
  False positive: Carol booking room_101 at 3pm is also blocked (no actual conflict).
  Fallback: if no suitable index → shared lock on the ENTIRE TABLE. Correct but terrible.</pre>

<table>
  <thead><tr><th>Lock type</th><th>What it locks</th><th>Phantom prevention</th><th>Check cost</th><th>False positives</th></tr></thead>
  <tbody>
    <tr><td><strong>Row locks</strong> (basic 2PL)</td><td>Specific existing rows</td><td>No — can't lock rows that don't exist</td><td>O(1)</td><td>None</td></tr>
    <tr><td><strong>Predicate locks</strong></td><td>The logical condition (all matching objects, future &amp; present)</td><td>Yes</td><td>O(active_locks) per write</td><td>None</td></tr>
    <tr><td><strong>Index-range locks</strong></td><td>Index entry covering the query's search range (superset)</td><td>Yes</td><td>O(1)</td><td>Yes — blocks writes outside original predicate</td></tr>
  </tbody>
</table>
<div class="info">Used by: MySQL/InnoDB (serializable), SQL Server (serializable), DB2 (repeatable read).</div>

<h4>Approach 3 — Serializable Snapshot Isolation (SSI)</h4>
<p>Newest approach (2008). <strong>Optimistic</strong>: transactions proceed without blocking. At commit time, DB checks for conflicts and aborts if serialization was violated. Both cases detect the same problem (acting on stale data) but the DB discovers it through different signals depending on <em>when</em> the conflicting write happens relative to the read.</p>

<pre>
  Case 1 — Stale MVCC reads (conflicting write existed before the read, hidden by MVCC)
  ──────────────────────────────────────────────────────────────────────────────────────
  t1  Txn 42 writes Alice.on_call=false (uncommitted)
  t2  Txn 43 reads on_call_count → 2. MVCC hides txn 42's uncommitted write.
      DB records: "txn 43 ignored txn 42's write." (No abort yet — txn 42 might still abort.)
  t3  Txn 43 writes Bob.on_call=false (not blocked — SSI is optimistic)
  t4  Txn 42 COMMITS. Alice is permanently off call.
  t5  Txn 43 tries to COMMIT. SSI checks: "Did txn 43 ignore a write that's now committed?"
      Yes (txn 42's write). Txn 43 also made writes → potential write skew. → ABORT.

  Case 2 — Write affects prior reads (conflicting write happens after the read)
  ──────────────────────────────────────────────────────────────────────────────
  t1  Txn 42 reads on_call_count=2. Txn 43 reads on_call_count=2.
      Index[shift_id=1234].readers = {txn 42, txn 43}
  t2  Txn 42 writes Alice.on_call=false → checks index: "who read shift_id=1234?" → txn 43.
      Notifies txn 43: "your read may be stale." (Non-blocking — just a tripwire.)
  t3  Txn 43 writes Bob.on_call=false → checks: "who read?" → txn 42. Notifies txn 42.
      Both flagged.
  t4  Txn 42 tries to COMMIT first. "Was I notified?" Yes. "Did notifier (txn 43) commit?" No.
      Uncommitted notification → txn 42 can commit safely. COMMITTED. (First committer wins.)
  t5  Txn 43 tries to COMMIT. "Was I notified?" Yes. "Did notifier (txn 42) commit?" YES.
      Confirmed stale read + txn 43 also made writes → ABORT.</pre>

<table>
  <thead><tr><th></th><th>Case 1</th><th>Case 2</th></tr></thead>
  <tbody>
    <tr><td><strong>Timing</strong></td><td>Conflicting write existed before the read</td><td>Conflicting write happens after the read</td></tr>
    <tr><td><strong>What DB sees at read time</strong></td><td>MVCC engine skips an uncommitted version — records the ignore</td><td>Data is genuinely current — nothing to flag</td></tr>
    <tr><td><strong>Detection source</strong></td><td>Reader side — MVCC records what it hid</td><td>Writer side — writer checks index for past readers, notifies them</td></tr>
    <tr><td><strong>At commit check</strong></td><td>"Did any write I ignored become committed?"</td><td>"Did any writer who notified me commit?"</td></tr>
  </tbody>
</table>
<div class="good">SSI performance: writers don't block readers, readers don't block writers. Much more predictable latency than 2PL. Not limited to one CPU core — FoundationDB distributes conflict detection across machines. Abort rate under high contention is the main cost.</div>
<div class="info">Used by: PostgreSQL ≥9.1, FoundationDB.</div>

<h3>Race Conditions by Isolation Level</h3>
<table>
  <thead><tr><th>Race condition</th><th>Description</th><th>Prevented by</th></tr></thead>
  <tbody>
    <tr><td><strong>Dirty reads</strong></td><td>Reading uncommitted data</td><td>Read committed and above</td></tr>
    <tr><td><strong>Dirty writes</strong></td><td>Overwriting uncommitted data</td><td>Almost all implementations</td></tr>
    <tr><td><strong>Read skew</strong></td><td>Seeing DB at two different points in time within one read</td><td>Snapshot isolation and above</td></tr>
    <tr><td><strong>Lost updates</strong></td><td>Concurrent read-modify-write clobbers one write</td><td>Snapshot isolation (some DBs), serializable</td></tr>
    <tr><td><strong>Write skew</strong></td><td>Decision based on stale premise, writes to different objects</td><td>Serializable only</td></tr>
    <tr><td><strong>Phantoms</strong></td><td>Write changes another txn's search result set</td><td>Serializable only</td></tr>
  </tbody>
</table>

<h3>Three Serializability Approaches Compared</h3>
<table>
  <thead><tr><th>Approach</th><th>Philosophy</th><th>Strength</th><th>Weakness</th><th>Used by</th></tr></thead>
  <tbody>
    <tr><td><strong>Serial execution</strong></td><td>Pessimistic (extreme)</td><td>Simple, no conflicts by definition</td><td>One CPU core, stored procs required, dataset must fit RAM</td><td>VoltDB, Redis, Datomic</td></tr>
    <tr><td><strong>Two-phase locking (2PL)</strong></td><td>Pessimistic</td><td>Prevents all races, well-understood for decades</td><td>Deadlocks, terrible p99 latency, readers block writers</td><td>MySQL/InnoDB, SQL Server</td></tr>
    <tr><td><strong>SSI</strong></td><td>Optimistic</td><td>Near-snapshot performance, scales across partitions</td><td>Abort rate under contention, relatively new</td><td>PostgreSQL 9.1+, FoundationDB</td></tr>
  </tbody>
</table>

</template>

<template id="node-12-07" data-type="node" data-trail="trail-12" data-order="7"
  data-title="Transformer Internals & the GPT-3 Parameter Count"
  data-file="Transformer Internals & GPT-3 Parameter Count.md"
  data-bridge="You now know what's in the box: weights arranged as attention + MLP blocks, ~175B of them for GPT-3. The obvious next question for anyone running these — they're huge. How do we make them smaller and cheaper without retraining from scratch? Two orthogonal levers: distillation and quantization.">
<h3>The end-to-end pipeline</h3>
<p>A transformer turns a sequence of token IDs into a next-token prediction. Built on the 3Blue1Brown series (GPT overview, Attention, MLP chapters).</p>
<pre>
text &rarr; token IDs &rarr; [embedding lookup] &rarr; +positional encoding
     &rarr; ( attention &rarr; MLP ) &times; n_layers     &larr; residual stream flows through
     &rarr; [unembedding] &rarr; probability over 50,257 tokens &rarr; sample next token
</pre>
<ul>
  <li><b>Tokenize</b>: text &rarr; word-piece tokens from a fixed vocab, each an integer ID. GPT-3 <code>n_vocab = 50,257</code>.</li>
  <li><b>Embedding lookup</b>: token ID &rarr; a learned vector of width <code>d_embed = 12,288</code>. It's <b>indexing, not computation</b> &mdash; like a hash table where the token ID <i>is</i> the array offset (O(1), no collisions).</li>
  <li><b>Positional encoding</b>: order info added on top (raw embedding = <i>what</i>, not <i>where</i>).</li>
  <li><b>Layer stack</b>: <code>n_layers = 96</code> identical layers, each = attention + MLP, both <b>adding</b> into the residual stream.</li>
  <li><b>Unembedding</b>: final vector &rarr; score over all 50,257 tokens &rarr; softmax &rarr; sample.</li>
</ul>

<div class="info"><b>Residual stream (key mental model):</b> the "river of meaning" is a per-token vector of width 12,288. Every block <b>reads from</b> and <b>adds back into</b> it &mdash; never replaced, only edited. That's why every projection matrix has 12,288 as one dimension.</div>

<h4>Attention block &mdash; tokens share information</h4>
<p>Three <b>learned</b> projections per token: <b>Query</b> (E&times;W_Q, "what am I looking for?"), <b>Key</b> (E&times;W_K, "what do I offer?"), <b>Value</b> (E&times;W_V, the info passed on). Database analogy: a query is matched against keys, matching keys return values.</p>
<ul>
  <li>Current token's Query &middot; every token's Key (dot product) &rarr; softmax per column &rarr; weighted blend of Values.</li>
  <li>3B1B "fluffy blue creature": in the <code>creature</code> column, <code>fluffy</code>=0.42, <code>blue</code>=0.58.</li>
  <li><b>Causal masking</b>: a token attends only to itself + earlier tokens &rarr; grid is lower-triangular. This is what makes a token's K/V <b>immutable once computed</b> (the basis of the KV cache).</li>
  <li><b>Multi-head</b>: many heads in parallel, each its own W_Q/W_K/W_V. GPT-3: 96 heads &times; 96 layers.</li>
</ul>
<div class="good"><b>Why "KV" cache, not "QKV":</b> at generation, the current token's Query is compared against <i>all previous</i> tokens' Keys/Values. K,V of every token are reused on every future step &rarr; cache them. Q of a token is used once, at its own step, then discarded.</div>

<h4>MLP block &mdash; each token processed alone</h4>
<p>Attention <i>mixes</i> tokens; the MLP <i>digests</i> each token independently.</p>
<pre>
d_embed (12,288) --up-proj--&gt; n_neurons (49,152) --[nonlinearity]--&gt; --down-proj--&gt; d_embed (12,288)
</pre>
<ul>
  <li>Up-projection widens to 4&times;; nonlinearity (ReLU/GELU) gates each neuron (without it, two matrices collapse to one); down-projection contracts back.</li>
  <li><b>Where facts live (3B1B thesis):</b> each hidden neuron can act as a fact detector &mdash; up-proj row = "question" (fires for a concept, e.g. a "Michael Jordan" neuron), down-proj column = "answer" (writes an associated concept, e.g. "basketball"). An MLP &asymp; learned <i>if-concept-then-concept</i> associations.</li>
</ul>
<div class="warn"><b>Caveat &mdash; superposition:</b> real neurons are polysemantic (fire for many unrelated features). "One neuron, one fact" is a teaching simplification.</div>

<h4>The GPT-3 parameter table (175,181,291,520)</h4>
<table>
  <thead><tr><th>Component</th><th>Formula</th><th>Count</th></tr></thead>
  <tbody>
    <tr><td>Embedding</td><td>d_embed &times; n_vocab</td><td>617,558,016</td></tr>
    <tr><td>Key</td><td>d_query &times; d_embed &times; n_heads &times; n_layers</td><td>14,495,514,624</td></tr>
    <tr><td>Query</td><td>d_query &times; d_embed &times; n_heads &times; n_layers</td><td>14,495,514,624</td></tr>
    <tr><td>Value</td><td>d_value &times; d_embed &times; n_heads &times; n_layers</td><td>14,495,514,624</td></tr>
    <tr><td>Output</td><td>d_embed &times; d_value &times; n_heads &times; n_layers</td><td>14,495,514,624</td></tr>
    <tr><td>Up-projection</td><td>n_neurons &times; d_embed &times; n_layers</td><td>57,982,058,496</td></tr>
    <tr><td>Down-projection</td><td>d_embed &times; n_neurons &times; n_layers</td><td>57,982,058,496</td></tr>
    <tr><td>Unembedding</td><td>n_vocab &times; d_embed</td><td>617,558,016</td></tr>
    <tr><td><b>Total</b></td><td></td><td><b>175,181,291,520</b></td></tr>
  </tbody>
</table>
<ul>
  <li><b>Embedding == Unembedding</b> (617M each) &mdash; same numbers, reversed roles.</li>
  <li><b>K/Q/V/Output equal</b> (~14.5B each) &mdash; same factors, different orientation.</li>
  <li><b>Up == Down</b> (~58B each), together <b>~116B = 66%</b> of the total. Most parameters &mdash; and most stored facts &mdash; live in the <b>MLPs</b>, not attention.</li>
</ul>
<div class="info">Every weight here is <b>learned via backpropagation</b>: forward pass &rarr; loss &rarr; gradients (blame propagated backward) &rarr; nudge each weight. "Learned" everywhere means this.</div>
</template>

<template id="node-12-08" data-type="node" data-trail="trail-12" data-order="8"
  data-title="Making Models Smaller: Distillation & Quantization"
  data-file="Distillation & Quantization.md"
  data-bridge="We can now shrink a model on two axes — fewer params (distillation), fewer bytes per param (quantization). But a smaller artifact is still inert. Next: how it actually runs to produce tokens, and the KV cache + GPU memory facts that dominate inference.">
<h3>Two orthogonal levers</h3>
<p><b>Distillation reduces the <i>number</i> of parameters; quantization reduces the <i>bytes per</i> parameter.</b> Different axis from RAG/fine-tuning (those inject knowledge; these compress). Often stacked: a small distilled model, quantized to INT4, is the "runs on a laptop" recipe.</p>

<h4>Distillation &mdash; fewer parameters</h4>
<p>Train a small <b>student</b> to imitate a big <b>teacher</b>.</p>
<ul>
  <li><b>Core insight (soft targets):</b> the unembedding+softmax gives a full <i>distribution</i> (cat 60%, dog 25%, rock 0.001%). A hard label is one bit ("cat"); the distribution encodes that cat/dog are plausible, rock is absurd. The student learns the whole distribution &rarr; absorbs nuance.</li>
  <li><b>Analogy:</b> an answer key says "B is correct"; a good teacher says "B correct, C a tempting trap, D nonsense" &mdash; the why/how-close is what transfers.</li>
</ul>
<table>
  <thead><tr><th>Flavor</th><th>Signal used</th><th>Who can do it</th></tr></thead>
  <tbody>
    <tr><td>Classic / soft-label</td><td>Teacher's full probability distribution</td><td>Model owner (needs logits)</td></tr>
    <tr><td>Data / response</td><td>Only final <b>text</b> outputs</td><td>Anyone (prompt&rarr;answer pairs)</td></tr>
    <tr><td>Task-specific</td><td>Final text outputs, one narrow task</td><td>Anyone</td></tr>
  </tbody>
</table>
<div class="warn"><b>Terminology nuance you caught:</b> only the <i>classic</i> flavor uses the distribution &mdash; the thing that makes the original (Hinton 2015) term meaningful. Data/task "distillation" use only hard text outputs &rarr; mechanically <b>identical to supervised fine-tuning</b>; the only difference is the labels came from a teacher model, not humans. Purists call these "synthetic-data fine-tuning."</div>
<ul>
  <li><b>Why the thin channel still works:</b> the teacher's <i>choice of token</i> still embeds competence; sampling it many times per prompt &asymp; sketching its distribution via a histogram of draws.</li>
  <li><b>Backend relevance:</b> mini/haiku/flash-tier models are usually distilled from larger siblings &rarr; disproportionately good for their size (the "GPT-4 quality, fraction of cost" mechanism).</li>
  <li><b>Caveats:</b> copies the teacher's mistakes/biases; student can't exceed teacher on what it distills. Provider ToS often restricts training competitors on their outputs.</li>
</ul>

<h4>Quantization &mdash; fewer bytes per parameter</h4>
<p>Weights default to <b>FP32</b> (4 bytes, ~7 digits) but that precision is mostly wasted (0.4837192 &asymp; 0.484 in effect). Quantization exploits the slack.</p>
<pre>
weights in [-1,+1], want 8-bit (256 buckets):
  slice range into 256 even buckets + one shared SCALE factor
  store each weight as INDEX of nearest bucket (1 byte, not 4)
  use: index &times; scale &rarr; approximate float
  0.4837 &rarr; bucket 189 &rarr; recovers ~0.484   (rounding error = the cost)
</pre>
<table>
  <thead><tr><th>Format</th><th>Bytes/weight</th><th>Note</th></tr></thead>
  <tbody>
    <tr><td>FP32</td><td>4</td><td>full baseline</td></tr>
    <tr><td>FP16 / BF16</td><td>2</td><td>half precision; common training default</td></tr>
    <tr><td>INT8</td><td>1</td><td>~4&times; smaller, little quality loss</td></tr>
    <tr><td>INT4</td><td>0.5</td><td>8&times; smaller; self-hosting sweet spot</td></tr>
    <tr><td>&le;3-bit</td><td>&lt; 0.5</td><td>aggressive; noticeable degradation</td></tr>
  </tbody>
</table>
<ul>
  <li>A filename like <code>Llama-3-8B-Q4_K_M</code> encodes it: Q4 = 4-bit.</li>
  <li><b>Ops math:</b> 70B model = 140 GB (FP16) &rarr; 35 GB (INT4) &mdash; same param count, now fits one GPU. And inference is memory-bandwidth-bound, so fewer bytes/weight &asymp; faster decode.</li>
  <li><b>DDIA echo:</b> same reason columnar compression speeds analytics &mdash; bottleneck is bytes read, not CPU.</li>
  <li><b>PTQ vs QAT:</b> Post-Training (quantize finished weights, cheap, ~95% of downloads) vs Quantization-Aware Training (simulate rounding during training, better at low bit-widths).</li>
</ul>
<div class="warn"><b>Outliers:</b> a few large-magnitude weights matter disproportionately; modern methods (GPTQ, AWQ) protect them and quantize the rest harder. Rule of thumb: INT8 nearly free, INT4 sweet spot, below that real quality cost.</div>
</template>

<template id="node-12-09" data-type="node" data-trail="trail-12" data-order="9"
  data-title="LLM Inference: Autoregressive Generation, KV Cache & GPUs"
  data-file="LLM Inference - Autoregressive Generation, KV Cache & GPUs.md"
  data-bridge="You now know how one request runs and what VRAM is (capacity vs bandwidth). The final step is running it for MANY users at once, profitably — batching, serving engines like vLLM, and the deployment math where context length and batch size fight over a fixed VRAM wall.">
<h3>Autoregressive generation</h3>
<p>An LLM generates <b>one token at a time</b>, feeding the whole sequence so far back each step. A 100-token answer = 100 forward passes.</p>
<pre>
pass 1  [The]            &rarr; "cat"
pass 2  [The cat]        &rarr; "sat"
pass 3  [The cat sat]    &rarr; "on"
</pre>
<p><b>The waste:</b> to process <code>[The cat sat]</code>, attention needs K/V of The, cat, sat &mdash; but The's and cat's K/V were already computed earlier and <b>never change</b> (causal masking). Recomputing every pass is quadratic waste.</p>

<h4>The KV cache</h4>
<p><b>Cache each token's K and V once computed; reuse on every later step.</b> Next pass, only compute K/V for the one new token.</p>
<pre>
pass 1  [The]          compute K,V for The
pass 2  [The cat]      The from cache, compute cat
pass 3  [The cat sat]  The,cat from cache, compute sat
        cache grows by ONE entry per step
</pre>
<ul>
  <li>Space-time tradeoff: spend memory to avoid recomputation (memoization / materialized-view instinct).</li>
  <li><b>DDIA echo:</b> entries are <b>immutable once written</b> (causal masking) &rarr; like an append-only log, no invalidation problem.</li>
</ul>
<div class="good"><b>Why K,V but not Q:</b> the current token's Query is compared against all previous K/V. K,V of every token are reused on every future step (cache); Q is used once at its own step, then discarded.</div>
<div class="warn"><b>Why NOT cache the layer output e+ (a wrong turn worth recording):</b> e2+ for "cat" is stable, true &mdash; but attention reads other tokens' <b>K and V</b> (upstream projections), not their post-attention <b>output</b> e+ (downstream). e2+ isn't cat's Key or Value, so caching it gives attention nothing; you'd still re-project. <b>A finished token contributes to future tokens only through its K and V</b> &mdash; the only thing worth caching.</div>
<ul>
  <li><b>Per-layer caches:</b> each layer has its own W_K/W_V &rarr; a 2-layer model keeps 2 separate caches. The new token flows forward; at each layer it reaches back into <i>that layer's</i> cache. Past tokens' meaning lives <b>in the caches</b>, not absorbed into the newest vector.</li>
  <li><b>Grid view:</b> columns = each token's Query vs all Keys (rows); causal masking &rarr; lower-triangular. Per decode pass only <b>one new column</b> appears (new Q vs cached Keys) &rarr; cost is <b>linear</b>, not the quadratic full-triangle rebuild. That collapse is the entire payoff.</li>
</ul>

<h4>Prefill vs decode</h4>
<table>
  <thead><tr><th>Phase</th><th>What</th><th>Bound by</th><th>Metric</th></tr></thead>
  <tbody>
    <tr><td>Prefill</td><td>Whole prompt in ONE parallel pass; fills cache in bulk; emits 1st token</td><td>Compute</td><td>TTFT</td></tr>
    <tr><td>Decode</td><td>One token per pass, sequential (N+1 needs N)</td><td>Memory bandwidth</td><td>TPS</td></tr>
  </tbody>
</table>
<ul>
  <li><b>TTFT</b> (Time To First Token) = prefill latency, dominated by prompt length &rarr; perceived responsiveness.</li>
  <li><b>TPS</b> (Tokens Per Second) = decode speed &rarr; how fast a long answer streams.</li>
  <li>Separate because you can be fast at one, slow at the other (huge prompt &rarr; bad TTFT even if TPS great).</li>
</ul>

<h4>GPUs &amp; VRAM (why all the above is shaped this way)</h4>
<ul>
  <li><b>CPU</b> = few powerful cores (sequential/branchy). <b>GPU</b> = thousands of weak cores doing the same op on different data in parallel. A transformer is matrix multiplies &rarr; exactly the GPU's shape &rarr; hundreds of&times; faster.</li>
  <li><b>VRAM</b> = the GPU's own memory holding weights + activations + KV cache. Two properties:</li>
</ul>
<div class="compare">
  <div><b>Capacity (GB)</b> &mdash; a HARD WALL. 70B@FP16 = 140 GB; an 80 GB GPU physically won't load it. Quantization shrinks weights to fit under it.</div>
  <div><b>Bandwidth (bytes/s)</b> &mdash; moving data to cores is slower than the cores compute, so cores sit idle waiting = "memory-bandwidth-bound." Decode's bottleneck.</div>
</div>
<ul>
  <li>"Quantization helps it fit" &rarr; capacity. "Decode is bandwidth-bound" &rarr; reads every weight/token. "KV cache is the real bottleneck" &rarr; competes with weights for capacity.</li>
  <li><b>DDIA echo:</b> capacity vs bandwidth = disk <i>size</i> vs disk <i>throughput</i>. Twist: VRAM is the only tier cores use directly, so "does it fit" is unforgiving.</li>
</ul>
<div class="info"><b>Anchor:</b> a GPU is thousands of simple cores doing matrix math in parallel, fed by VRAM whose <i>capacity</i> decides what fits and whose <i>bandwidth</i> often decides how fast you go.</div>
</template>

<template id="node-12-10" data-type="node" data-trail="trail-12" data-order="10"
  data-title="Serving LLMs in Production: Batching, Engines & Economics"
  data-file="Serving LLMs in Production - Batching, Engines & Economics.md"
  data-bridge="">
<h3>Batching &mdash; where throughput comes from</h3>
<p><b>Problem:</b> producing one token for one user reads the entire model's weights from VRAM (slow, bandwidth-bound), then thousands of cores do tiny work and go idle. Expensive cost, almost nothing gained.</p>
<p><b>Insight:</b> the weights are the same for every request &rarr; process many at once. Read weights once, compute the next token for all requests together. The weight-read is <b>amortized</b>; the extra compute was basically free.</p>
<table>
  <thead><tr><th></th><th>Weights</th><th>KV caches</th></tr></thead>
  <tbody>
    <tr><td>Copies</td><td>ONE, shared</td><td>ONE PER request (private)</td></tr>
    <tr><td>Cost vs batch</td><td><b>amortizes</b> (&divide; batch) &check;</td><td><b>does NOT</b> &mdash; grows linearly &cross;</td></tr>
  </tbody>
</table>
<div class="info"><b>DDIA echo:</b> weights = shared read-only data segment (amortizes); KV caches = per-connection session state (grows with live connections). Same wall as connection pooling &mdash; cap concurrency to fit a fixed memory budget.</div>
<ul>
  <li><b>Bigger batch isn't infinitely better:</b> (1) weight-read per request falls as 1/batch &mdash; diminishing returns, the un-amortizable KV read becomes dominant; (2) batch + KV caches compete for the same fixed VRAM.</li>
  <li><b>Static vs continuous batching:</b> static waits for a fixed group to ALL finish (short requests leave idle slots). <b>Continuous</b> (in-flight): evict a finished request and slot a waiting one mid-flight &rarr; GPU stays saturated. Biggest throughput-per-dollar lever. Resource-pool scheduler instinct (avoid head-of-line blocking).</li>
</ul>

<h4>Serving engine &mdash; what it actually is</h4>
<pre>
requests (HTTP) &rarr; [ SERVING ENGINE ] &harr; GPU + VRAM &rarr; tokens stream back
                   &boxur; scheduler (continuous batching)
                   &boxur; KV-cache manager (PagedAttention)
                   &boxur; optimized GPU kernels (FlashAttention, fused matmuls)
                   &boxur; API server + token streaming
</pre>
<div class="info"><b>DDIA framing:</b> a serving engine is to a model what a <b>database engine is to a data file</b>. Weights = data file; engine = Postgres wrapped around it (query planner + buffer pool + connection layer + execution engine).</div>
<ul>
  <li><b>Is vLLM "just an HTTP server"?</b> No. It contains an optional OpenAI-compatible HTTP shell, but you can <code>import vllm</code> and call <code>LLM.generate()</code> in-process with no socket &mdash; scheduler/PagedAttention/kernels still run. Like calling Postgres "a TCP server." It's an <b>inference engine</b> with an optional HTTP adapter.</li>
  <li>Alternatives: TensorRT-LLM (NVIDIA, fastest on their HW), SGLang (structured/agent workloads), TGI (Hugging Face).</li>
  <li><b>PagedAttention:</b> splits the KV cache into fixed-size non-contiguous <b>blocks</b>, allocated on demand &mdash; OS virtual-memory paging applied to the cache. Flip side: when VRAM is exhausted it swaps to host memory and decode latency spikes (~30ms &rarr; 200ms+/token) &mdash; thrashing.</li>
</ul>

<h4>The VRAM budget &amp; deployment math</h4>
<pre>
total VRAM = model weights (fixed) + &Sigma; per-request KV cache (grows with batch &times; context)
KV per request &asymp; 2 &times; layers &times; kv_heads &times; head_dim &times; seq_len &times; bytes
                  (the 2 = K and V; LINEAR in context length AND batch)
</pre>
<p><b>Worked example &mdash; Llama-70B on one 80 GB H100 (FP8):</b> weights &asymp; 70 GB &rarr; only ~10 GB left for ALL KV caches.</p>
<table>
  <thead><tr><th>Context</th><th>KV per request</th><th>Fits in ~10 GB</th></tr></thead>
  <tbody>
    <tr><td>128K</td><td>~13 GB</td><td>&lt; 1 (!)</td></tr>
    <tr><td>32K</td><td>~3.2 GB</td><td>~3</td></tr>
    <tr><td>4K</td><td>~0.4 GB</td><td>~24</td></tr>
  </tbody>
</table>
<div class="warn"><b>Central production tradeoff:</b> context length and batch size trade directly against each other inside the fixed VRAM wall. A workload fine at 8K can OOM at 32K &mdash; same model, same GPU.</div>

<h4>GPU landscape (early 2026)</h4>
<table>
  <thead><tr><th>GPU</th><th>VRAM</th><th>Bandwidth</th><th>~Cloud $/hr</th></tr></thead>
  <tbody>
    <tr><td>H100</td><td>80 GB</td><td>3.35 TB/s</td><td>~$2.00</td></tr>
    <tr><td>H200</td><td>141 GB</td><td>4.8 TB/s</td><td>~$2.60</td></tr>
    <tr><td>B200</td><td>~180-192 GB</td><td>~8 TB/s</td><td>~$4-5</td></tr>
  </tbody>
</table>
<ul>
  <li>H200 = H100 compute die + more/faster memory &rarr; pure inference win (fits 70B on one GPU; H100 needs 2-way tensor parallelism). B200 = new arch, ~2&times; bandwidth + FP4 &rarr; ~4&times; Llama-70B throughput, ~$0.17/M tokens vs ~$0.50.</li>
</ul>

<h4>Multi-GPU parallelism &amp; MoE</h4>
<ul>
  <li><b>Tensor parallelism</b> = split each layer's matrices across GPUs (sharding within an op; needs NVLink). <b>Pipeline parallelism</b> = different layers on different GPUs (assembly line / partition by stage). Fitting on ONE GPU is preferred (crossing adds per-token latency).</li>
  <li><b>MoE wrinkle:</b> DeepSeek V3 (671B total) routes only ~37B active/token &mdash; cheap to compute, but the whole expert table must live in VRAM &rarr; total <i>capacity</i> dominates.</li>
</ul>
<div class="good"><b>Whole picture (one line):</b> quantize weights to fit and free room &rarr; fill leftover VRAM with as big a batch as latency allows &rarr; let context length and batch fight over that leftover &rarr; use vLLM to keep the batch saturated &rarr; read it out as $/token. The central knob: bigger batch = cheaper per token, until latency breaks or VRAM runs out.</div>
</template>

<template id="node-11-04" data-type="node" data-trail="trail-11" data-order="4"
  data-title="Asymmetric Cryptography: RSA, DH &amp; Elliptic Curves"
  data-file="Security/Asymmetric Cryptography - RSA, DH &amp; Elliptic Curves.md"
  data-bridge="These are the primitives &mdash; key agreement, encryption, signatures &mdash; but on their own they are just math. TLS is where they get assembled into an actual secure channel: the handshake that runs every time you hit an https:// URL.">
<h3>The core idea</h3>
<p>A mathematically linked <b>key pair</b> instead of one shared secret: what one key locks, only the other unlocks. This solves key distribution &mdash; two strangers can talk securely over a public channel without ever having met to swap a secret.</p>
<div class="compare">
  <div><h4>Symmetric</h4><pre>ONE shared key
fast
but: how do you share
the key safely?
intercepted = game over</pre></div>
  <div><h4>Asymmetric</h4><pre>PUBLIC key (broadcast)
PRIVATE key (guarded)
linked, but public can't
reveal private
padlock everyone can snap
shut; only you hold the key</pre></div>
</div>
<div class="info"><b>Padlock intuition:</b> your public key is an open padlock you hand out freely. Anyone can lock a box with it (encrypt); only your private key opens it (decrypt). Handing out a thousand padlocks helps no one open a locked one.</div>

<h3>Three security goals (keep them separate)</h3>
<p>The biggest source of confusion is collapsing these. RSA can do the first two; DH only does the third.</p>
<table>
  <thead><tr><th>Goal</th><th>Question</th><th>Term</th></tr></thead>
  <tbody>
    <tr><td>Confidentiality</td><td>Can I hide the message from eavesdroppers?</td><td>Encryption</td></tr>
    <tr><td>Authenticity</td><td>Can I prove who sent it?</td><td>Digital signature</td></tr>
    <tr><td>Key agreement</td><td>Can two strangers agree a secret without meeting?</td><td>Key exchange</td></tr>
  </tbody>
</table>

<h3>RSA &mdash; trapdoor = factoring</h3>
<p>Multiplying two large primes is trivial; factoring the product back is practically impossible for big enough numbers.</p>
<pre>
  p &times; q = n     &larr; easy (milliseconds)
  n &rarr; p, q      &larr; hard (longer than the age of the universe for 2048-bit n)
</pre>
<h4>Key generation (tiny demo numbers)</h4>
<pre>
  p = 61, q = 53
  n = p&times;q = 3233                      (public; in both keys)
  &phi;(n) = (p-1)(q-1) = 60&times;52 = 3120  (needs p,q &rarr; why private key is safe)
  e = 17     public exponent, gcd(e,&phi;)=1   (real-world: 65537)
  d = e&#8315;&sup1; mod &phi;(n) = 2753           private exponent

  Public key  = (n=3233, e=17)
  Private key = (n=3233, d=2753)
  p, q, &phi;(n) are DISCARDED &mdash; never stored
</pre>
<h4>Encrypt / decrypt</h4>
<pre>
  Encrypt (anyone, public key):  c = m^e mod n = 42^17   mod 3233 = 2557
  Decrypt (only private d):      m = c^d mod n = 2557^2753 mod 3233 = 42
</pre>
<p>Works by Euler's theorem: applying <code>e</code> then <code>d</code> is raising to <code>1</code> (since e&times;d &equiv; 1 mod &phi;(n)) &rarr; original <code>m</code> back. Large powers never computed directly &mdash; <b>square-and-multiply</b>, taking mod n at every step (<code>m^17</code>: 17 = 10001&#8322; &rarr; ~5 ops, not 17).</p>

<h3>The key-direction swap (the thing that confuses people)</h3>
<p>Same operation <code>x^key mod n</code>; <i>which</i> key you apply flips the entire meaning.</p>
<div class="compare">
  <div><h4>Encryption (confidentiality)</h4><pre>lock with recipient's PUBLIC key
&rarr; only their PRIVATE key opens
"anyone can lock, only they open"</pre></div>
  <div><h4>Signature (authenticity)</h4><pre>sign with sender's PRIVATE key
&rarr; anyone's copy of the PUBLIC
  key verifies
"only they make it, anyone checks"</pre></div>
</div>
<div class="info"><b>Mental model:</b> private key = "only I can do this"; public key = "anyone can do this." Signatures in practice sign the <i>hash</i> of the message: <code>sig = hash(m)^d mod n</code>; verifier re-hashes and checks.</div>

<h3>Diffie-Hellman &mdash; key agreement, NOT encryption</h3>
<p>Two parties each contribute randomness and independently arrive at the <i>same</i> secret, which neither ever transmits.</p>
<pre>
  Public params: prime p, generator g
  Alice secret a &rarr; sends A = g^a mod p
  Bob   secret b &rarr; sends B = g^b mod p

  Alice: B^a mod p = g^(ab) mod p
  Bob:   A^b mod p = g^(ab) mod p
                    &uarr; same shared secret S, never sent on the wire
</pre>
<ul>
  <li><b>Colour-mixing analogy:</b> both start with a shared public colour, each mixes in a secret colour and swaps the result, then each adds their own secret again &rarr; same final mix. An observer can't un-mix.</li>
  <li><b>Hard problem = discrete log:</b> given <code>g^a mod p</code>, recover <code>a</code>. Infeasible for large p. (RSA's is factoring; DH's is discrete log.)</li>
  <li><b>Critical weakness &mdash; no identity:</b> DH proves <i>someone</i> is on the other end, not <i>who</i>. Naked DH is MITM-able &rarr; it always needs a signature layer on top (see TLS).</li>
</ul>

<h3>DH &ne; RSA</h3>
<table>
  <thead><tr><th></th><th>RSA</th><th>Diffie-Hellman</th></tr></thead>
  <tbody>
    <tr><td>Job</td><td>Encrypt data; sign messages</td><td>Establish a shared secret</td></tr>
    <tr><td>Authentication</td><td>Yes (private-key signatures)</td><td>No (needs separate signature layer)</td></tr>
    <tr><td>Forward secrecy</td><td>No (key pair reused)</td><td>Yes (fresh a, b per session)</td></tr>
    <tr><td>Hard problem</td><td>Integer factorisation</td><td>Discrete logarithm</td></tr>
  </tbody>
</table>

<h3>Elliptic Curve &mdash; just a faster substrate</h3>
<p>EC is <b>not a new idea</b> &mdash; it's a different mathematical surface to run the same DH/signature ideas on. The prefix names the algorithm; <b>EC = the implementation technique underneath.</b></p>
<ul>
  <li><b>ECDH</b> = EC + Diffie-Hellman (same key agreement). <b>ECDSA</b> = EC + DSA (same job as RSA signatures).</li>
  <li>Why bother: equivalent security with much smaller keys &mdash; <b>~256-bit EC &asymp; 3072-bit RSA</b> &rarr; faster math, less data.</li>
  <li>Seen in the wild: <b>X25519</b> (key agreement), <b>Ed25519</b> (signatures). Everything modern has moved to EC variants. Guarantees are identical to the non-EC versions; only the number-crunching differs.</li>
</ul>

<h3>Hybrid encryption (how it's actually used)</h3>
<p>Asymmetric is never used for the real message body: it's ~1000&times; slower than AES and the message must be shorter than <code>n</code>. So real systems layer them:</p>
<pre>
  1. Asymmetric (RSA or ECDH) &rarr; securely establish a small symmetric key (e.g. 256-bit AES)
  2. Symmetric (AES)          &rarr; encrypt the actual bulk data at full speed
</pre>
<div class="info"><b>Connections:</b> <code>JWT.md</code> RS256 signing is RSA in <i>signature</i> mode (server signs with private key, anyone verifies with public) &mdash; the exact "only I make it, anyone checks" direction. The identity-vs-secrecy split recurs everywhere: a signature proves <i>who</i>; encryption/DH provides <i>secrecy</i>; real systems layer both.</div>
</template>

<template id="node-11-05" data-type="node" data-trail="trail-11" data-order="5"
  data-title="TLS Handshake &amp; Secure Channels"
  data-file="Security/TLS Handshake &amp; Secure Channels.md"
  data-bridge="">
<h3>What TLS actually is</h3>
<p>TLS assembles the primitives (ECDH for key agreement, RSA/ECDSA for identity, AES for bulk, MAC for integrity) into one encrypted, authenticated channel. Two phases:</p>
<ul>
  <li><b>Handshake</b> &mdash; runs once at connection start: agree a shared secret (ECDH), verify identity (certificate + signature), confirm integrity (Finished MAC).</li>
  <li><b>Record protocol</b> &mdash; runs continuously after: app data (HTTP) chopped into records, each AES-encrypted and MAC-tagged.</li>
</ul>
<pre>
  HTTP   &larr; application data
    &boxv;
  TLS    &larr; encrypts / authenticates it   (this layer)
    &boxv;
  TCP    &larr; reliable delivery
    &boxv;
  IP     &larr; routing
</pre>
<ul>
  <li><code>HTTPS = HTTP + TLS</code> &mdash; plain HTTP through a TLS channel instead of raw TCP.</li>
  <li><b>SSL vs TLS:</b> SSL (1990s, Netscape) is TLS's deprecated, broken predecessor. Renamed TLS from 1999; current is TLS 1.2 (2008) and TLS 1.3 (2018). "SSL certificate" / OpenSSL persist culturally &mdash; like calling every vacuum a "Hoover."</li>
</ul>

<h3>The TLS 1.3 handshake (1 round trip)</h3>
<pre>
  Client (browser)                                    Server (bank.com)
    &boxv; generates ephemeral ECDH key pair               has long-term cert + ECDH key
    &boxv; &mdash;&mdash; 1. ClientHello (client_pub + ciphers) &mdash;&mdash;&rarr; &boxv;
    &boxv; &larr;&mdash; 2. ServerHello (server_pub + chosen cipher) &mdash; &boxv;
    &boxv;                                                        &boxv;
    &boxv; 3. BOTH derive same shared secret independently:       &boxv;
    &boxv;    S = ECDH(own_priv, other_pub) &rarr; HKDF &rarr; AES keys   &boxv;
    &boxv; ==== everything below is AES-encrypted ====            &boxv;
    &boxv; &larr;&mdash; 4. Certificate (identity, CA-signed) &mdash;&mdash;&mdash;&mdash; &boxv;
    &boxv; &larr;&mdash; 5. CertificateVerify (signature over transcript) &boxv;
    &boxv; &larr;&mdash; 6. Finished (MAC over whole handshake) &mdash;&mdash;&mdash; &boxv;
    &boxv; &mdash;&mdash; 6. Finished (client) &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&rarr; &boxv;
    &boxv; &mdash;&mdash; 7. GET /account (AES-encrypted) &mdash;&mdash;&mdash;&mdash;&rarr; &boxv;
</pre>
<ul>
  <li><b>Steps 1&ndash;2:</b> both generate a <i>fresh</i> ECDH key pair (typically X25519) just for this connection; exchange public points in the clear; agree a cipher suite.</li>
  <li><b>Step 3:</b> each multiplies own private scalar by the other's public value &rarr; identical shared secret &rarr; HKDF stretches it into AES keys.</li>
  <li><b>Steps 4&ndash;5:</b> server sends its CA-signed certificate <i>plus a fresh signature over the entire handshake transcript so far</i> &mdash; the authenticity check.</li>
  <li><b>Step 6:</b> Finished MAC over the full transcript, both directions &mdash; confirms nothing was tampered with and both sides derived matching keys.</li>
</ul>
<div class="info">See it live: <code>openssl s_client -connect google.com:443 -tls1_3</code> &rarr; shows <code>TLS_AES_256_GCM_SHA384</code> (symmetric cipher) and <code>Server Temp Key: X25519</code> (the ephemeral ECDH key &mdash; "Temp" = forward secrecy).</div>

<h3>Certificate Authority &mdash; the chain of trust</h3>
<p>When bank.com sends its public key, how do you know it's really theirs and not an attacker's? You've never met bank.com &mdash; you need a trusted third party to vouch.</p>
<pre>
  CA's trusted root key (built into your browser/OS)
     &boxur; signs bank.com's certificate
          &boxur; certificate contains bank.com's public key
               &boxur; that public key signs the ECDH exchange (CertificateVerify)
</pre>
<p>A <b>CA</b> (DigiCert, Let's Encrypt) verifies the requester controls bank.com, then signs a cert binding that domain to its public key. Your browser ships with trusted CA root keys, so it doesn't trust the server blindly.</p>

<h3>MAC &mdash; message authentication code</h3>
<p>A keyed fingerprint: <code>MAC = hash(secret_key + message)</code>. Proves two things at once &mdash; the message wasn't tampered with, AND it came from someone who knows the shared key. Receiver recomputes and compares; an attacker can't forge one without the key.</p>
<table>
  <thead><tr><th></th><th>Digital signature</th><th>MAC</th></tr></thead>
  <tbody>
    <tr><td>Key type</td><td>Asymmetric (private signs, public verifies)</td><td>Symmetric (same secret both sides)</td></tr>
    <tr><td>Who can verify</td><td>Anyone with the public key</td><td>Only someone with the shared key</td></tr>
    <tr><td>Proves identity to third parties</td><td>Yes</td><td>No (both sides share the key)</td></tr>
  </tbody>
</table>
<p>TLS uses both: signatures (ECDSA/RSA) for the one-time identity proof, MACs for cheap per-message integrity once the shared key exists.</p>

<h3>Attack 1 &mdash; downgrade, and why Finished covers the transcript</h3>
<p>ClientHello/ServerHello are sent in <b>plaintext, before</b> the certificate is verified &mdash; a vulnerability window.</p>
<pre>
  1. Browser: "I support AES-256, AES-128, and (legacy) weak cipher"
  2. Attacker on wire EDITS it to: "I support only the weak cipher"
  3. Server picks weak cipher; certificate check STILL PASSES
     (the cert says nothing about which cipher was chosen)
  4. Session uses a weak cipher the attacker can break
</pre>
<p><b>Fix:</b> the Finished MAC is computed over the <i>entire handshake transcript</i>, every byte including the original ClientHello. If the attacker edited it in transit, the client's and server's transcripts differ &rarr; their Finished MACs differ &rarr; connection aborts. The attacker can't forge a valid MAC (the key came from ECDH, never transmitted).</p>
<div class="info">The split: <b>CA / CertificateVerify</b> answers "is this really bank.com?" (authenticates the endpoint). The <b>Finished MAC</b> answers "did both sides see the exact same handshake, byte for byte?" (authenticates the conversation). Identity and integrity are separate guarantees; you need both.</div>

<h3>Attack 2 &mdash; MITM with the attacker's own keys, and why it fails</h3>
<p>Attacker M runs two ECDH exchanges (one with client, one with server), relaying transparently, and forwards the server's certificate. Forwarding the cert is fine &mdash; it's public. The attack dies at <b>CertificateVerify</b>, because that signature covers the transcript, which includes the server's ECDH public key:</p>
<pre>
  Server signs a transcript containing:  server's ECDH key
  Client verifies against its transcript: M's ECDH key      &larr; what client actually saw
                                          &uarr; mismatch &rarr; signature fails
</pre>
<pre>
  Option A: relay server's real ECDH key &rarr; M can't decrypt (doesn't know that private key)
  Option B: substitute M's own ECDH key  &rarr; server's signature no longer matches &rarr; client aborts
</pre>
<div class="good">To repair the mismatch M would need to forge a signature over its own ECDH key that still verifies against bank.com's certificate &rarr; requires bank.com's <b>certificate private key</b>, which never leaves the server. Copying the public cert grants no power to sign with it. This is why CertificateVerify signs the <i>transcript</i> rather than presenting a static cert &mdash; identity is stapled to <i>this</i> session's key exchange, not a reusable stamp.</div>

<h3>Forward secrecy</h3>
<p>Both ECDH keys are <b>ephemeral</b> &mdash; fresh per connection, discarded after. Even if bank.com's long-term certificate private key is stolen a year later, past sessions can't be decrypted: their session keys came from private scalars that existed only in memory for one handshake. (TLS 1.2's RSA key-exchange mode lacked this &mdash; one stolen key decrypted every past session; TLS 1.3 removed it.)</p>
<div class="info"><b>Connections:</b> <code>Networking/What happens when you visit a website.md</code> has the TLS handshake inside the URL-to-page journey; this is the crypto deep dive. Same identity-vs-integrity split as bearer-token / IDOR auth work one level up: a token proves <i>who</i>, but the proof must bind to <i>this</i> request/session or a relay can lift and replay it &mdash; and TLS provides the confidentiality that stops the token being intercepted in transit at all.</div>
</template>

<script>
(function () {
  'use strict';

  // ── Build data from templates ────────────────────────────────────
  const trailMap = {};

  document.querySelectorAll('template[data-type="trail"]').forEach(function(el) {
    trailMap[el.id] = {
      id: el.id,
      order: +el.dataset.order,
      title: el.dataset.title,
      objective: el.dataset.objective,
      prereqs: el.dataset.prereqs ? el.dataset.prereqs.split(',').filter(Boolean) : [],
      color: el.dataset.color,
      reviewTime: el.dataset.reviewTime,
      nodes: []
    };
  });

  document.querySelectorAll('template[data-type="node"]').forEach(function(el) {
    var t = trailMap[el.dataset.trail];
    if (!t) return;
    t.nodes.push({
      id: el.id,
      order: +el.dataset.order,
      title: el.dataset.title,
      file: el.dataset.file || '',
      bridge: el.dataset.bridge || null,
      el: el
    });
  });

  var DATA = Object.values(trailMap).sort(function(a, b) { return a.order - b.order; });
  DATA.forEach(function(t) { t.nodes.sort(function(a, b) { return a.order - b.order; }); });

  // ── Progress ─────────────────────────────────────────────────────
  var STORE = 'sde_trails_v1';
  var progress = {};

  function loadProgress() { try { progress = JSON.parse(localStorage.getItem(STORE) || '{}'); } catch(e) { progress = {}; } }
  function saveProgress() { localStorage.setItem(STORE, JSON.stringify(progress)); }
  function isDone(id) { return !!progress[id]; }
  function setDone(id, v) { if (v) progress[id] = true; else delete progress[id]; saveProgress(); }

  function trailStats(trail) {
    var total = trail.nodes.length;
    var done = trail.nodes.filter(function(n) { return isDone(n.id); }).length;
    return { total: total, done: done, pct: total ? Math.round(done / total * 100) : 0 };
  }
  function overallStats() {
    var total = 0, done = 0;
    DATA.forEach(function(t) { t.nodes.forEach(function(n) { total++; if (isDone(n.id)) done++; }); });
    return { total: total, done: done, pct: total ? Math.round(done / total * 100) : 0 };
  }

  // ── Content ───────────────────────────────────────────────────────
  function getContent(node) {
    var html = node.el.innerHTML.trim();
    return html || '<p class="no-content">Content coming soon.</p>';
  }

  // ── State ─────────────────────────────────────────────────────────
  var currentTrailId = null;
  var expanded = new Set();

  // ── Sidebar ───────────────────────────────────────────────────────
  function renderSidebar() {
    var ov = overallStats();
    document.getElementById('overall-fill').style.width = ov.pct + '%';
    document.getElementById('overall-label').textContent = ov.done + '/' + ov.total + ' nodes';
    document.getElementById('trail-list').innerHTML = DATA.map(function(t) {
      var s = trailStats(t);
      return '<div class="trail-item' + (t.id === currentTrailId ? ' active' : '') + '" ' +
        'style="--trail-color:' + t.color + '" onclick="app.select(\'' + t.id + '\')">' +
        '<div class="trail-item-header">' +
        '<span class="trail-dot" style="background:' + t.color + '"></span>' +
        '<span class="trail-title">' + t.title + '</span>' +
        '<span class="trail-count">' + s.done + '/' + s.total + '</span>' +
        '</div>' +
        '<div class="trail-prog-bar"><div class="trail-prog-fill" style="width:' + s.pct + '%;background:' + t.color + '"></div></div>' +
        '</div>';
    }).join('');
  }

  // ── Trail view ────────────────────────────────────────────────────
  function renderTrail(trailId) {
    var trail = DATA.find(function(t) { return t.id === trailId; });
    if (!trail) return;
    var s = trailStats(trail);

    var unmet = trail.prereqs.map(function(id) { return DATA.find(function(t) { return t.id === id; }); })
      .filter(function(t) { return t && trailStats(t).pct < 50; });
    var prereqHtml = unmet.length
      ? '<div class="prereq-banner">Recommended first: ' +
        unmet.map(function(t) { return '<a onclick="app.select(\'' + t.id + '\')">' + t.title + ' (' + trailStats(t).pct + '%)</a>'; }).join(', ') +
        '</div>'
      : '';

    var nodesHtml = trail.nodes.map(function(node, i) {
      var done = isDone(node.id), open = expanded.has(node.id), isLast = i === trail.nodes.length - 1;
      return '<div class="node-wrap">' +
        '<div class="node-card' + (done ? ' done' : '') + '">' +
        '<div class="node-header" onclick="app.toggle(\'' + node.id + '\')">' +
        '<span class="node-num">' + node.order + '</span>' +
        '<div class="node-title-block">' +
        '<span class="node-title-text">' + node.title + '</span>' +
        (node.file ? '<span class="node-source">' + node.file + '</span>' : '') +
        '</div>' +
        '<span class="node-chevron' + (open ? ' open' : '') + '">▼</span>' +
        '<input type="checkbox" class="node-check"' + (done ? ' checked' : '') +
        ' onclick="event.stopPropagation();app.check(\'' + node.id + '\',this.checked)" title="Mark as read">' +
        '</div>' +
        (open ? '<div class="node-content">' + getContent(node) + '</div>' : '') +
        '</div>' +
        (!isLast && node.bridge ? '<div class="bridge-note">↓ ' + node.bridge + '</div>' : '') +
        '</div>';
    }).join('');

    document.getElementById('trail-view').innerHTML =
      '<div class="trail-header" style="border-color:' + trail.color + '">' +
      '<h2 style="color:' + trail.color + '">' + trail.title + '</h2>' +
      '<p class="trail-objective">' + trail.objective + '</p>' +
      '<div class="trail-meta"><span>⏱ ' + trail.reviewTime + '</span><span>' + s.done + '/' + s.total + ' completed</span></div>' +
      '</div>' + prereqHtml +
      '<div class="nodes-list">' + nodesHtml + '</div>' +
      '<div class="trail-footer"><button onclick="app.markAll(\'' + trail.id + '\')">Mark all as read</button></div>';
  }

  // ── Public API ────────────────────────────────────────────────────
  window.app = {
    select: function(id) {
      currentTrailId = id; expanded.clear();
      history.replaceState(null, '', '#' + id);
      renderSidebar(); renderTrail(id);
      document.getElementById('main-panel').scrollTop = 0;
    },
    toggle: function(id) {
      if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
      renderTrail(currentTrailId);
    },
    check: function(id, v) { setDone(id, v); renderSidebar(); renderTrail(currentTrailId); },
    markAll: function(id) {
      var trail = DATA.find(function(t) { return t.id === id; });
      if (!trail || !confirm('Mark all ' + trail.nodes.length + ' nodes in "' + trail.title + '" as read?')) return;
      trail.nodes.forEach(function(n) { setDone(n.id, true); });
      renderSidebar(); renderTrail(id);
    }
  };

  document.getElementById('reset-btn').addEventListener('click', function() {
    if (!confirm('Reset all progress? This cannot be undone.')) return;
    progress = {}; saveProgress(); renderSidebar(); if (currentTrailId) renderTrail(currentTrailId);
  });

  window.addEventListener('hashchange', function() {
    var id = window.location.hash.slice(1);
    if (id && id !== currentTrailId) app.select(id);
  });

  loadProgress(); renderSidebar();
  var startId = window.location.hash.slice(1);
  var startTrail = DATA.find(function(t) { return t.id === startId; }) || DATA[0];
  if (startTrail) app.select(startTrail.id);

})();
</script>
</body>
</html>
