    .trail-item.active { background: rgba(255,255,255,.06); border-left-color: var(--trail-color, #58a6ff); }

    .trail-prog-fill { height: 100%; border-radius: 1px; transition: width .3s; }

<!-- Trail 01: Data Structures & Hashing -->
<template id="node-01-01" data-type="node" data-trail="trail-01" data-order="1"
  data-title="Internal Structure of a Hash Table"
  data-file="Hashing Internals/Internal Structure of a Hash Table.md"
  data-bridge="The hash table structure depends on two steps — hash function and modulo — but this immediately creates collisions. Chaining resolves them by turning each array slot into a linked list of all colliding keys.">
<h3>The Two-Step Pipeline</h3>
<pre>
key "user_42"
     │
     ▼  h("user_42") = 2,849,412,091
┌─────────────────┐
│  hash function   │   Step 1: any key → INT32 (0 to ~4.29 billion)
└─────────────────┘
     │ 2849412091 % 8 = 3
     ▼
  ┌───┬───┬───┬───┬───┬───┬───┬───┐
  │ 0 │ 1 │ 2 │ 3 │ 4 │ 5 │ 6 │ 7 │   Step 2: INT32 → small array index
  └───┴───┴───┴───┴───┴───┴───┴───┘
              ▲
        KV pair stored here</pre>
<ul>
  <li><strong>Step 1 — hash function</strong>: maps any key to INT32 range via <code>__hash__()</code> (Python) / <code>hashCode()</code> (Java)</li>
  <li><strong>Step 2 — modulo</strong>: compresses INT32 to a valid index: <code>index = hash_key % array_length</code></li>
</ul>
<h3>Why Two Steps? The Memory Problem</h3>
<div class="compare">
  <div><h4>Naive (broken)</h4><pre>4.29 billion slots × 4 bytes
= ~16 GB RAM
Almost entirely empty</pre></div>
  <div><h4>Practical (correct)</h4><pre>Array ∝ keys inserted
Modulo compresses the range
A few bytes of memory ✓</pre></div>
</div>
<h3>Load Factor and Dynamic Resizing</h3>
<pre>
Before resize (LF = 2/4 = 0.5 → threshold hit!):
  ┌──────┬──────┬──────┬──────┐
  │ a:1  │      │ b:2  │      │
  └──────┴──────┴──────┴──────┘

After 2× resize (LF = 2/8 = 0.25 → healthy):
  ┌──────┬──────┬──────┬──────┬──────┬──────┬──────┬──────┐
  │      │ a:1  │ b:2  │      │      │      │      │      │
  └──────┴──────┴──────┴──────┴──────┴──────┴──────┴──────┘
  ↑ keys are REHASHED — indices change after resize</pre>
<ul>
  <li><strong>Load factor</strong> = keys/slots; grow at LF ≥ 0.5, shrink at LF ≤ 0.125</li>
  <li>Asymmetric thresholds prevent thrashing (grow then immediately shrink)</li>
  <li>Doubling is amortized O(1) per insert — same analysis as Python <code>list.append()</code></li>
  <li>Collisions are inevitable — you are mapping 4.29B → small array. Two resolution strategies: Chaining and Open Addressing</li>
</ul>
</template>

<template id="node-01-02" data-type="node" data-trail="trail-01" data-order="2"
  data-title="Conflict Resolution with Chaining"
  data-file="Hashing Internals/Conflict Resolution in Hash Tables with Chaining.md"
  data-bridge="Chaining uses external linked lists, which means pointer overhead and poor cache locality. Open addressing eliminates auxiliary structures entirely — all keys live in the flat array, found by probing for the next available slot.">
<h3>Array of Linked Lists</h3>
<pre>
 index   slot
 ─────   ────────────────────────────────────────────────
  [0]  ──► "dave":4  → NULL
  [1]  ──► NULL
  [2]  ──► "alice":1  →  "bob":2  → NULL
             ↑ both hashed to slot 2 (collision!)
  [3]  ──► NULL
  [4]  ──► "carol":3  → NULL</pre>
<h3>Insert: Always Prepend to Head — O(1)</h3>
<pre>
  Insert "eve" where h("eve") % 8 = 2:

  Before: [2] → alice:1 → bob:2 → NULL
  After:  [2] → eve:5 → alice:1 → bob:2 → NULL
                ↑ new node prepended — no traversal needed</pre>
<div class="warn">Lookup must compare <strong>actual keys</strong>, not just hash values — two different keys CAN produce the same hash. Each node also stores the pre-computed <code>hash_key</code> INT32 so the cheap integer comparison runs before the expensive string comparison.</div>
<h3>Upgrade to BST for Long Chains</h3>
<div class="compare">
  <div><h4>Linked list (O(n))</h4><pre>alice → bob → carol
  → dave → eve
  (linear scan)</pre></div>
  <div><h4>Red-Black tree (O(log n))</h4><pre>      carol
     /     \
   bob    dave
   /         \
alice        eve</pre></div>
</div>
<p>Java 8 HashMap converts at <strong>TREEIFY_THRESHOLD = 8 entries</strong>; reverts at 6.</p>
<table>
  <thead><tr><th>Operation</th><th>Linked list</th><th>BST / Red-Black</th></tr></thead>
  <tbody>
    <tr><td>Insert</td><td>O(1) prepend</td><td>O(log n)</td></tr>
    <tr><td>Lookup</td><td>O(n) worst, O(1) avg</td><td>O(log n)</td></tr>
    <tr><td>Delete</td><td>O(n) to find</td><td>O(log n)</td></tr>
  </tbody>
</table>
<ul>
  <li><strong>Extra memory</strong>: each node needs a <code>next</code> pointer (8 bytes on 64-bit) + heap allocation overhead</li>
  <li><strong>Poor cache locality</strong>: list nodes scattered across heap; CPU prefetcher cannot predict next address</li>
  <li>LF can exceed 1.0 — table never hard-full; real deletes (no tombstones needed)</li>
</ul>
</template>

<template id="node-01-03" data-type="node" data-trail="trail-01" data-order="3"
  data-title="Conflict Resolution with Open Addressing"
  data-file="Hashing Internals/Conflict Resolution in Hash Tables with Open Addressing.md"
  data-bridge="Open addressing needs a probing function to find the next available slot. Three strategies exist, each trading off between clustering and CPU cache efficiency.">
<h3>All Keys Live in the Array Itself</h3>
<div class="compare">
  <div><h4>Chaining</h4><pre>[0] → linked list
[1] → linked list
[2] → linked list
uses extra heap memory</pre></div>
  <div><h4>Open Addressing</h4><pre>[0]  EMPTY
[1]  key A  (primary)
[2]  key B  (collided → probed)
[3]  EMPTY
all KV pairs in the array ✓</pre></div>
</div>
<h3>Three Slot States</h3>
<pre>
  ┌───────────┐  EMPTY    — never occupied
  │           │            probe STOPS here (key definitely not in table)
  └───────────┘

  ┌───────────┐  OCCUPIED — holds a live key-value pair
  │  key:val  │
  └───────────┘

  ┌───────────┐  DELETED  — tombstone (soft-removed)
  │   ~~~     │            probe SKIPS and keeps going
  └───────────┘</pre>
<h3>Why Soft Delete (Not Hard Delete)?</h3>
<pre>
  Step 1: Insert A at slot 3; B collides → probes to slot 4
    [ ][ ][ ][ A ][ B ][ ]

  Hard-delete A → slot 3 = EMPTY:
    [ ][ ][ ][   ][ B ][ ]

  Lookup B: hash(B) = 3 → slot 3 is EMPTY → STOP ✗
  B is at slot 4 but we never reach it!

  ─────────────────────────────────────────────────────────────
  Soft-delete A → slot 3 = DELETED:
    [ ][ ][ ][ ~~ ][ B ][ ]

  Lookup B: slot 3 = DELETED → skip → slot 4 = B ✓</pre>
<ul>
  <li>Python <code>dict</code> uses open addressing; <code>del d[key]</code> is a soft delete internally</li>
  <li>Max LF &lt; 1.0 (hard cap at array size, unlike chaining)</li>
  <li>Tombstones accumulate; they are cleaned up during a resize (not copied to new array)</li>
</ul>
</template>

<template id="node-01-04" data-type="node" data-trail="trail-01" data-order="4"
  data-title="Linear, Quadratic, and Double Hashing"
  data-file="Hashing Internals/Conflict Resolution- Linear, Quadratic and Double Hashing.md"
  data-bridge="The three probing strategies complete the picture of collision resolution. Now zoom into the resize event itself: the exact cost proof that makes doubling O(1) amortized, and the bitwise trick that makes power-of-two array sizes faster than plain modulo.">
<h3>Linear Probing — <code>p(k,i) = (h(k) + i) mod m</code></h3>
<pre>
  Collision at slot 2, table size 8:
  i=0: try slot 2 (occupied!)
  i=1: try slot 3 (occupied!)
  i=2: try slot 4 (free → insert)
  Probe path: 2, 3, 4 — sequential = cache-friendly ✓

  PRIMARY CLUSTERING PROBLEM:
  [ ][ ][X][X][X][X][ ][ ]
        2  3  4  5
  Any key hashing to 2–5 extends this block further</pre>
<h3>Quadratic Probing — <code>p(k,i) = (h(k) + c1·i + c2·i²) mod m</code></h3>
<pre>
  Offsets grow: +1, +4, +9, +16...
  Breaks primary clustering ✓
  Secondary clustering remains: same primary hash → same quadratic path</pre>
<h3>Double Hashing — <code>p(k,i) = (h1(k) + i·h2(k)) mod m</code></h3>
<pre>
  Key A: h1=3, h2=5  → probes: 3, 8, 13, 18...
  Key B: h1=3, h2=3  → probes: 3, 6,  9, 12...
                              ↑
  Same primary slot, different step — immediately diverge ✓
  h2(k) must never return 0 (infinite loop on primary slot)</pre>
<table>
  <thead><tr><th>Strategy</th><th>Formula</th><th>Clustering</th><th>Cache</th><th>Cost</th></tr></thead>
  <tbody>
    <tr><td>Linear</td><td>h(k) + i</td><td>Primary (worst)</td><td>Best ★★★</td><td>1 hash</td></tr>
    <tr><td>Quadratic</td><td>h(k) + c1·i + c2·i²</td><td>Secondary</td><td>OK ★★</td><td>1 hash + math</td></tr>
    <tr><td>Double</td><td>h1(k) + i·h2(k)</td><td>None (best)</td><td>Poor ★</td><td>2 hashes</td></tr>
  </tbody>
</table>
</template>

<template id="node-01-05" data-type="node" data-trail="trail-01" data-order="5"
  data-title="Hash Table Resizing and Optimizations"
  data-file="Hashing Internals/Hash Table Resizing and Optimizations.md"
  data-bridge="">
<h3>The Resize Event: Three Stages</h3>
<pre>
  Stage 1 — ALLOCATE:
    OS allocates a new contiguous block of size 2 × M_old

  Stage 2 — REHASH + COPY:
    For every key: new_index = hash(key) % M_new  ← must re-run!
    Cannot use realloc() — M changed, so every index changes

  Stage 3 — DEALLOCATE:
    Free the old array</pre>
<h3>Why +1 Growth Is O(N²)</h3>
<pre>
  Insert 1st: 1 op | Insert 2nd: 2 ops | ... | Insert Nth: N ops
  Total = 1+2+...+N = N(N+1)/2 = O(N²)  ← catastrophic</pre>
<h3>Why Doubling Is O(1) Amortized</h3>
<pre>
  After doubling to size N (N/2 keys occupy the left half):

  N/2 - 1 easy inserts:   each O(1)  (empty slots available)
  Final insert triggers resize to 2N:
    allocate 2N  → 2N ops
    rehash all N → N  ops
  ───────────────────────────────────────────────────────────
  Total = (N/2 - 1) + 1 + 2N + N = 7N/2 - 1 = O(N)
  Amortized per insert = O(N) / N = O(1) ✓</pre>
<h3>Bitwise AND — Why Array Sizes Are Powers of Two</h3>
<pre>
  Standard:  index = hash(key) % M        ← CPU integer division (slow)
  Optimized: index = hash(key) &amp; (M - 1)  ← single CPU instruction (fast)

  Works because M-1 in binary has all lower bits as 1:
    M=4  →  M-1 = 3  = 0011
    M=8  →  M-1 = 7  = 0111
    M=16 →  M-1 = 15 = 1111
  AND isolates exactly those lower bits = same as modulo, free</pre>
<table>
  <thead><tr><th>Key</th><th>hash % 4</th><th>binary: key &amp; 0011</th><th>Result</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>1</td><td>0001 &amp; 0011 = 0001</td><td>1</td></tr>
    <tr><td>4</td><td>0</td><td>0100 &amp; 0011 = 0000</td><td>0</td></tr>
    <tr><td>5</td><td>1</td><td>0101 &amp; 0011 = 0001</td><td>1</td></tr>
  </tbody>
</table>
<h3>Shrink at LF = 1/8, Not LF = 1/4 — Avoiding Thrashing</h3>
<pre>
  Shrink at LF=0.25:  16 slots, 4 keys → shrink to 8
  After shrink: 4/8 = 0.50 → RIGHT AT grow threshold!
  One insert → grow back to 16 → one delete → shrink again
  Every operation triggers a resize! ✗

  Shrink at LF=0.125: 16 slots, 2 keys → shrink to 8
  After shrink: 2/8 = 0.25 → buffer of ~2 inserts before next grow ✓</pre>
<table>
  <thead><tr><th>Property</th><th>+1 Growth</th><th>Doubling (×2)</th></tr></thead>
  <tbody>
    <tr><td>Time complexity</td><td>O(N²)</td><td>O(1) amortized</td></tr>
    <tr><td>Grow trigger</td><td>Every insert</td><td>LF = 0.5</td></tr>
    <tr><td>Shrink trigger</td><td>Every delete</td><td>LF = 0.125</td></tr>
    <tr><td>Index computation</td><td><code>hash % M</code> (slow)</td><td><code>hash &amp; (M-1)</code> (fast)</td></tr>
  </tbody>
</table>
</template>

<template id="node-02-01" data-type="node" data-trail="trail-02" data-order="1"
  data-title="OS Scheduling, Processes and Threads"
  data-file="Python/OS Scheduling, Process and Threads.md"
  data-bridge="The OS gives you processes and threads at the hardware level. Now zoom into Python's runtime — every variable is a heap reference, and how Python manages that allocation model directly motivates why the GIL exists.">
<h3>12-Core CPU (No Hyper-Threading)</h3>
<pre>
  Core 0   Core 1   Core 2  ...  Core 11
  ──────   ──────   ──────       ───────
  Thread   Thread   Thread  ...  Thread
    A        B        C            L

  12 physical = 12 logical = 12 truly simultaneous threads
  (With SMT: 6 cores × 2 logical = 12, but share execution units)</pre>
<h3>Process vs Thread</h3>
<div class="compare">
  <div><h4>Process (heavyweight)</h4><pre>own heap
own stack
own code segment
own registers
─────────────────
isolated — crash
stays contained</pre></div>
  <div><h4>Thread (lightweight)</h4><pre>shared heap ◄─────┐
                   │
own stack          │
own registers      │
─────────────────  │
Thread 2 (same ───┘
process) sees
shared memory!</pre></div>
</div>
<table>
  <thead><tr><th></th><th>Process</th><th>Thread</th></tr></thead>
  <tbody>
    <tr><td>Memory</td><td>Isolated (own address space)</td><td>Shared (heap + code shared, own stack)</td></tr>
    <tr><td>Creation cost</td><td>High (copy address space)</td><td>Low (share address space)</td></tr>
    <tr><td>Context switch</td><td>Slow (full memory context)</td><td>Fast (just registers + stack)</td></tr>
    <tr><td>Crash isolation</td><td>Yes</td><td>No</td></tr>
  </tbody>
</table>
<h3>OS Schedulers</h3>
<table>
  <thead><tr><th>Scheduler</th><th>OS</th><th>Algorithm</th></tr></thead>
  <tbody>
    <tr><td>CFS</td><td>Linux</td><td>Red-Black tree; always runs thread with least virtual runtime</td></tr>
    <tr><td>MLFQ</td><td>Windows / macOS</td><td>Multi-level queues; I/O-bound stays high-priority, CPU-hog demoted</td></tr>
  </tbody>
</table>
<h3>User-Level vs Kernel-Level Threads</h3>
<table>
  <thead><tr><th></th><th>User-level (green)</th><th>Kernel-level</th></tr></thead>
  <tbody>
    <tr><td>Managed by</td><td>Runtime library</td><td>OS</td></tr>
    <tr><td>Context switch</td><td>Fast (no syscall)</td><td>Slower (syscall required)</td></tr>
    <tr><td>If one blocks</td><td>Entire process blocks</td><td>Only that thread blocks</td></tr>
  </tbody>
</table>
<h3>Concurrency Strategies</h3>
<table>
  <thead><tr><th>Strategy</th><th>Mechanism</th><th>Best for</th><th>Analogy</th></tr></thead>
  <tbody>
    <tr><td>asyncio</td><td>1 thread + event loop, programmer yields via <code>await</code></td><td>High-volume non-blocking I/O</td><td>1 chef, many pots</td></tr>
    <tr><td>ThreadPool</td><td>Many kernel threads, OS-managed</td><td>Blocking sync or legacy code</td><td>Many chefs, shared kitchen</td></tr>
    <tr><td>Multiprocessing</td><td>Separate processes (own GIL + memory)</td><td>CPU-bound parallelism</td><td>Many chefs, separate kitchens</td></tr>
  </tbody>

<template id="node-02-02" data-type="node" data-trail="trail-02" data-order="2"
  data-title="Memory Allocation and Management in Python"
  data-file="Python/Memory Allocation and Management in Python.md"
  data-bridge="Reference counts are shared heap state that multiple threads would corrupt without protection. The GIL is that protection — this note explains the cost and your workarounds.">
<h3>Variables Are References, Not Values</h3>
<pre>
  x = [1, 2, 3]
  y = x          ← both names point to the SAME object

     STACK                 HEAP
  ────────────         ───────────────────────────
  │ x ──────────────► │  list [1, 2, 3]  refcount=2 │
  │ y ──────────────► │  (same object)              │
  ────────────         ───────────────────────────

  y.append(4)  → list becomes [1, 2, 3, 4]
  print(x)     → [1, 2, 3, 4]  ← x sees the same change!</pre>
<h3>Reference Counting</h3>
<pre>
  obj = MyClass()    refcount = 1
  alias = obj        refcount = 2
  del obj            refcount = 1
  del alias          refcount = 0  → freed immediately ✓

  CYCLE (refcounting can't handle):
  a = []; a.append(a)   ← a → list → a → list → ∞
  del a    refcount drops to 1, not 0  → Cyclic GC handles this</pre>
<h3>Three Levels of Copying</h3>
<pre>
  original = [ [1, 2], [3, 4] ]

  ASSIGNMENT  b = a
    b ──► same list object (alias)
    b[0].append(99) changes original[0] too ✗

  SHALLOW COPY  b = copy.copy(a)
    b ──► NEW outer list
            ├──► [1, 2]  ← SAME inner list (shared!)
            └──► [3, 4]  ← SAME inner list (shared!)
    b[0].append(99) still changes original[0] ✗

  DEEP COPY  b = copy.deepcopy(a)
    b ──► NEW outer list
            ├──► [1, 2]  ← brand new copy
            └──► [3, 4]  ← brand new copy
    fully independent ✓</pre>
<table>
  <thead><tr><th>Method</th><th>Syntax</th><th>New container?</th><th>New nested items?</th><th>Use when</th></tr></thead>
  <tbody>
    <tr><td>Assignment</td><td><code>b = a</code></td><td>No</td><td>No</td><td>Intentional alias</td></tr>
    <tr><td>Shallow copy</td><td><code>copy.copy(a)</code></td><td>Yes</td><td>No</td><td>Flat structures only</td></tr>
    <tr><td>Deep copy</td><td><code>copy.deepcopy(a)</code></td><td>Yes</td><td>Yes</td><td>Nested mutable structures</td></tr>
  </tbody>
</table>
<ul>
  <li><strong>Immutable types</strong> (<code>int</code>, <code>str</code>, <code>tuple</code>): shallow copy is safe — they can't be mutated in-place</li>
  <li>Small int cache: -5 to 256 pre-allocated as singletons — <code>a = 5; b = 5; a is b</code> → True</li>
  <li><code>is</code> checks object identity (same heap address); <code>==</code> checks value equality</li>
  <li>Weak references (<code>weakref.ref(obj)</code>): don't increment refcount — let object be collected</li>
</ul>
</template>

<template id="node-02-03" data-type="node" data-trail="trail-02" data-order="3"
  data-title="GIL, Threads and Processes"
  data-file="Python/GIL, Threads and Processes.md"
  data-bridge="The GIL blocks OS threads from running Python code in parallel on CPU-bound work. Asyncio sidesteps the problem entirely for I/O: one thread, one event loop, coroutines that suspend at await rather than blocking.">
<h3>What the GIL Does</h3>
<div class="compare">
  <div><h4>CPU-bound (GIL hurts)</h4><pre>Core 0: [Thread A runs]│[Thread B]│...
Core 1: IDLE            IDLE
→ Only one thread runs at a time
  even on multi-core! Use
  multiprocessing instead.</pre></div>
  <div><h4>I/O-bound (GIL releases)</h4><pre>Core 0: Thread A ──►[wait...]──► A
                    Thread B runs ◄── GIL
                    released during wait
→ Real concurrency for I/O ✓</pre></div>
</div>
<h3>Why the GIL Exists</h3>
<ul>
  <li>Python's reference counting stores each object's <code>ob_refcnt</code> on the heap</li>
  <li>Two threads modifying the same refcount simultaneously = memory corruption</li>
  <li>GIL = one mutex protecting all CPython internals; simplest solution (added 1991)</li>
  <li>Specific to <strong>CPython</strong> — Jython and IronPython have no GIL</li>
  <li>GIL releases during I/O waits and C extensions that call <code>Py_BEGIN_ALLOW_THREADS</code></li>
</ul>
<h3>Process vs Thread vs Coroutine</h3>
<table>
  <thead><tr><th></th><th>Process</th><th>Thread</th><th>Coroutine (asyncio)</th></tr></thead>
  <tbody>
    <tr><td>Own GIL?</td><td>Yes (separate)</td><td>No (shared)</td><td>N/A (single thread)</td></tr>
    <tr><td>Memory</td><td>Isolated</td><td>Shared</td><td>Shared</td></tr>
    <tr><td>True parallelism?</td><td>Yes (multi-core)</td><td>No (GIL blocks)</td><td>No (1 thread)</td></tr>
    <tr><td>I/O concurrency?</td><td>Yes</td><td>Yes (GIL releases)</td><td>Yes (await)</td></tr>
    <tr><td>Overhead</td><td>High</td><td>Low</td><td>Very low</td></tr>
    <tr><td>Use for</td><td>CPU-bound</td><td>I/O-bound legacy</td><td>I/O-bound async</td></tr>
  </tbody>
</table>
<table>
  <thead><tr><th>Concept</th><th>Process</th><th>Thread</th><th>User-level thread</th><th>Kernel-level thread</th></tr></thead>
  <tbody>
    <tr><td>Scheduling</td><td>OS, independently</td><td>OS or app</td><td>By library</td><td>OS, individually</td></tr>
    <tr><td>If one blocks</td><td>Others unaffected</td><td>All may block (ULT)</td><td>All block</td><td>Only that thread</td></tr>
    <tr><td>Context switch</td><td>Slow</td><td>Fast</td><td>Very fast</td><td>Slower (syscall)</td></tr>
  </tbody>
</table>
</template>

<template id="node-02-04" data-type="node" data-trail="trail-02" data-order="4"
  data-title="Asyncio"
  data-file="Python/Asyncio.md"
  data-bridge="With asyncio understood, compare it directly to how FastAPI (ASGI) and Django (WSGI) handle concurrency — and where Node.js fits as the single-threaded async alternative.">
<h3>Sequential vs Concurrent</h3>
<div class="compare">
  <div><h4>Sequential (9 seconds)</h4><pre>t=0s ──► await fetch_a()
t=3s ──► await fetch_b()
t=6s ──► await fetch_c()
t=9s     done</pre></div>
  <div><h4>Concurrent (3 seconds)</h4><pre>t=0s ──► fetch_a() ─┐
          fetch_b() ─┼─ all run together
          fetch_c() ─┘
t=3s     done ✓</pre></div>
</div>
<div class="warn">Use <code>asyncio.gather(a(), b(), c())</code> — not <code>await a(); await b(); await c()</code></div>
<h3>Calling a Coroutine Does NOT Run It</h3>
<pre>
  fetch(url)                → creates a coroutine OBJECT, runs nothing
  await fetch(url)          → runs now, this function waits
  asyncio.create_task(...)  → schedules to run alongside other tasks
  asyncio.gather(a(), b())  → runs both concurrently, waits for both</pre>
<h3>The Abandoned Task Trap</h3>
<pre>
  WRONG:
  task = asyncio.create_task(slow_fn())
  # never await task → exception silently swallowed ✗

  CORRECT (Python 3.11+):
  async with asyncio.TaskGroup() as tg:
      tg.create_task(slow_fn())
      tg.create_task(other_fn())
  # all tasks awaited; exceptions propagate ✓</pre>
<h3>Blocking Code Freezes the Event Loop</h3>
<div class="compare">
  <div><h4>Wrong</h4><pre>async def handler():
    time.sleep(5)    ← blocks
    requests.get(url) ← blocks
    # entire event loop
    # frozen for 5s!</pre></div>
  <div><h4>Correct</h4><pre>async def handler():
    await asyncio.sleep(5)
    await asyncio.to_thread(
        requests.get, url
    )  ← runs in thread pool</pre></div>
</div>
<ul>
  <li>asyncio = cooperative multitasking; coroutines must explicitly <code>await</code> to yield</li>
  <li>Still single-threaded — GIL applies; no actual CPU parallelism</li>
  <li><code>asyncio.Semaphore(n)</code> limits concurrent coroutines (rate limiting APIs)</li>
</ul>
</template>

expose only interface

<template id="node-02-08" data-type="node" data-trail="trail-02" data-order="9"

  data-bridge="After understanding how Python runs and structures code, this covers how you distribute it — virtual environments, Poetry, lock files, and the difference between wheel and sdist.">

<h3>Execution Pipeline by Language</h3>
<pre>
  PYTHON:     source.py ──→ bytecode (.pyc) ──→ PVM interprets
  JAVASCRIPT: source.js ──→ AST ──→ bytecode ──→ (JIT) native code for hot paths
  C++:        source.cpp ──→ native machine code ──→ CPU runs directly
                              ↑
                         no VM layer</pre>
<table>
  <thead><tr><th>Language</th><th>Compiled to</th><th>When?</th><th>JIT?</th></tr></thead>
  <tbody>
    <tr><td>Python</td><td>Bytecode (.pyc)</td><td>Import time</td><td>No (CPython); Yes (PyPy)</td></tr>
    <tr><td>JavaScript</td><td>Bytecode + machine code</td><td>At runtime (V8)</td><td>Yes (TurboFan)</td></tr>
    <tr><td>C++</td><td>Machine code</td><td>Build step (AOT)</td><td>No</td></tr>
  </tbody>
</table>

<h3>Bytecode — What It Is and When It Happens</h3>
<p><strong>Bytecode</strong> is an intermediate representation — compiled from source, but not machine code. It targets a <strong>virtual machine (VM)</strong>, not real CPU hardware.</p>
<pre>
  source.py
      │
      ▼  compile (at import time)
  bytecode (.pyc)        ← compact, VM-readable, not human-readable
      │
      ▼  interpret
  machine code (CPU)</pre>
<ul>
  <li>Python compiles at <strong>import time</strong> — first load of a module triggers compilation</li>
  <li>Result cached in <code>__pycache__/module.cpython-311.pyc</code></li>
  <li>Edit the <code>.py</code> → timestamp changes → stale cache → recompiles</li>
  <li>Upgrade Python 3.11 → 3.12 → old <code>.pyc</code> invalid (version encoded in filename)</li>
</ul>
<div class="compare">
  <div><h4>Why not machine code directly?</h4>
    <ul>
      <li><strong>Portability</strong> — one <code>.pyc</code> runs on x86, ARM, Windows (same CPython version)</li>
      <li><strong>Cheap to produce</strong> — just parse + flatten AST; no register allocation or optimization passes</li>
      <li><strong>VM control layer</strong> — enforces bounds checking and memory safety</li>
    </ul>
  </div>
  <div><h4>When .pyc actually matters in industry</h4>
    <ul>
      <li><strong>Source obfuscation</strong> — ship <code>.pyc</code> without <code>.py</code> to hide proprietary logic</li>
      <li><strong>Frozen executables</strong> — PyInstaller bundles <code>.pyc</code> + CPython into one binary</li>
      <li><strong>MicroPython</strong> — <code>.mpy</code> bytecode on 256KB-RAM embedded devices</li>
      <li><strong>Docker</strong> — pre-compile during image build to speed up cold starts</li>
    </ul>
  </div>
</div>
<div class="info">For a FastAPI server you always have <code>.py</code> source — Python generates <code>__pycache__</code> automatically. The real benefit is just skipping re-parse on warm imports, not portability.</div>

<h3>__pycache__</h3>
<pre>
  your_project/
  ├── main.py
  ├── utils.py
  └── __pycache__/
      ├── main.cpython-311.pyc     ← bytecode for main.py
      └── utils.cpython-311.pyc    ← bytecode for utils.py</pre>
<ul>
  <li>Auto-created by Python — safe to delete, just regenerates</li>
  <li>Should be in <code>.gitignore</code> — it's a build artifact</li>
  <li>Read-only filesystem? Python still runs — just recompiles every time</li>
</ul>

<h3>PyPy — Python with a Built-in JIT</h3>
<p>Drop-in replacement for CPython. Same Python code, different runtime.</p>
<pre>
  CPython:   bytecode ──→ interpreted line by line (forever)

  PyPy:      bytecode ──→ interpreted
                               │
                               ▼ after ~1000 calls / loop iterations
                          JIT compiler kicks in
                               │
                               ▼
                          native machine code (much faster)</pre>
<table>
  <thead><tr><th></th><th>CPython</th><th>PyPy</th></tr></thead>
  <tbody>
    <tr><td>CPU-bound code</td><td>Slow</td><td>5–10× faster</td></tr>
    <tr><td>Startup time</td><td>Fast</td><td>Slower (JIT warmup)</td></tr>
    <tr><td>Memory</td><td>Lower</td><td>Higher</td></tr>
    <tr><td>C extensions (numpy)</td><td>Native</td><td>Often broken/slow</td></tr>
    <tr><td>Compatibility</td><td>Reference impl</td><td>~95%</td></tr>
  </tbody>
</table>
<div class="warn">Most web servers (FastAPI, Django) are I/O-bound — JIT doesn't help <code>await db.query(...)</code>. PyPy shines for long-running CPU loops, not request handlers.</div>

<h3>JIT — Deep Dive</h3>
<pre>
  ┌──────────────┬──────────────────────┬───────────────┐
  │     AOT      │        JIT           │  Interpreted  │
  │  (compile    │  (compile during     │  (never       │
  │  before run) │   run, hot paths)    │   compile)    │
  ├──────────────┼──────────────────────┼───────────────┤
  │  C, Rust, Go │  PyPy, V8, JVM       │  CPython      │
  │  fastest     │  fast after warmup   │  slowest      │
  │  not portable│  portable            │  portable     │
  └──────────────┴──────────────────────┴───────────────┘</pre>
<p><strong>The profiling loop:</strong></p>
<ol>
  <li>Run bytecode normally</li>
  <li>Profiler tracks: how many times called? what types are the variables <em>actually</em>?</li>
  <li>"Hot path" threshold hit</li>
  <li>JIT generates native machine code for THIS specific case — using real observed types</li>
  <li>Future calls skip bytecode entirely and run native code</li>
</ol>
<div class="compare">
  <div><h4>Type specialization (why JIT &gt; AOT sometimes)</h4>
    <p>AOT must generate generic code for all possible types.<br>JIT sees real runtime types and specializes:</p>
    <pre>def add(a, b): return a + b
add(1, 2)   # JIT: always int+int
            # → int-addition machine code
            # → no type-check overhead</pre>
  </div>
  <div><h4>Deoptimization</h4>
    <pre>add(1, 2)    # JIT compiled for int
add(1, 2)    # fast ✓
add("a","b") # type changed!
             # → throw away compiled code
             # → fall back to bytecode
             # → may recompile for string</pre>
    <p>Unpredictable types kill JIT performance.</p>
  </div>
</div>
<pre>
  Execution speed
       │
  slow │ ▓▓ ▓▓                           ← JIT profiling / warmup
       │       ▓▓
       │          ▓▓
  fast │             ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓   ← native machine code (steady state)
       └──────────────────────────────────▶ time
              warmup        steady state</pre>

<h3>V8 Pipeline (JavaScript / Node.js)</h3>
<p>No separate compile step — everything happens at runtime inside V8.</p>
<pre>
  .js file
      │
      ▼
   Parser ──→ AST
      │
      ▼
  Ignition (bytecode compiler)
      │  starts executing immediately
      ▼
  Profiler watches for hot code
      │
      ├── cold code ──→ stays as bytecode (Ignition interprets)
      │
      └── hot code ──→ TurboFan (JIT)
                            │
                            ▼
                     native machine code
                            │
                     deoptimize if assumptions break
                            │
                            ▼
                     back to bytecode</pre>
<table>
  <thead><tr><th></th><th>CPython</th><th>PyPy</th><th>V8 (Node.js)</th></tr></thead>
  <tbody>
    <tr><td>Bytecode cached to disk</td><td>Yes (.pyc)</td><td>No</td><td>No</td></tr>
    <tr><td>JIT</td><td>No</td><td>Yes (after warmup)</td><td>Yes (always)</td></tr>
    <tr><td>Type specialization</td><td>No</td><td>Yes</td><td>Yes (hidden classes)</td></tr>
    <tr><td>Deoptimization</td><td>N/A</td><td>Yes</td><td>Yes</td></tr>
    <tr><td>C extension support</td><td>Native</td><td>Poor</td><td>Native (N-API)</td></tr>
  </tbody>
</table>
<h4>Hidden Classes — V8's Runtime Type System</h4>
<p>V8 invents internal type representations at runtime so TurboFan can specialize code:</p>
<pre>
  function Point(x, y) {
      this.x = x   // hidden class C0 ──→ C1
      this.y = y   // C1 ──→ C2
  }
  const p1 = new Point(1, 2)  // shape C2 — TurboFan optimizes for this ✓
  const p2 = new Point(3, 4)  // reuses C2 — same optimized path ✓
  p2.z = 7                    // new property ──→ hidden class C3 ──→ deoptimizes ✗</pre>
<div class="warn">This is why "don't add properties to objects after creation" is a JS performance rule — it breaks the hidden class chain and forces deoptimization.</div>
<div class="info">V8 difference from PyPy: JIT is always on by default. CPython requires switching to PyPy entirely to get JIT. Every Node.js app benefits from TurboFan automatically on hot paths.</div>

<h3>Frontend Framework Reference</h3>
<table>
  <thead><tr><th>Framework</th><th>Type</th><th>Key idea</th></tr></thead>
  <tbody>
    <tr><td>React</td><td>UI library</td><td>Virtual DOM, component-based, JSX, unidirectional data flow</td></tr>
    <tr><td>Vue</td><td>Framework</td><td>Reactive data binding, single-file components, progressive</td></tr>
    <tr><td>Angular</td><td>Full framework</td><td>TypeScript-first, built-in routing/forms/HTTP/DI, opinionated</td></tr>
    <tr><td>Next.js</td><td>React meta-fw</td><td>SSR, SSG, file-based routing, API routes on top of React</td></tr>
    <tr><td>Svelte</td><td>Compiler</td><td>Compiles to imperative DOM updates at build time; no virtual DOM</td></tr>
    <tr><td>Bootstrap</td><td>CSS framework</td><td>Pre-built responsive grid and UI components; not a JS framework</td></tr>
  </tbody>
</table>

<h3>System VM vs Process VM — Two Different Things</h3>
<div class="compare">
  <div><h4>Type 1 — System VM (VMware, VirtualBox, WSL)</h4>
    <pre>
  Physical hardware (your laptop)
  └── Hypervisor (VMware / Hyper-V / KVM)
      ├── Guest OS 1 (Ubuntu)
      │   └── thinks it has real CPU, RAM, disk
      └── Guest OS 2 (Windows)</pre>
    <ul>
      <li>Intercepts every hardware instruction from the guest OS</li>
      <li>Guest OS has no idea it's not on real hardware</li>
      <li><strong>What it virtualizes:</strong> CPU, RAM, disk, network — the whole machine</li>
      <li><strong>Purpose:</strong> isolation, run multiple OSes on one machine</li>
    </ul>
  </div>
  <div><h4>Type 2 — Process VM / Language Runtime (JVM, PVM, CLR, V8)</h4>
    <pre>
  Your script
      ↓
  Language VM (normal process on your OS)
      ↓  interprets each bytecode instruction
  Real CPU executes the VM's own machine code</pre>
    <ul>
      <li>Does not emulate hardware at all</li>
      <li>Reads a made-up bytecode instruction set, translates to real machine code</li>
      <li><strong>What it virtualizes:</strong> a CPU instruction set (the JVM ISA, Python bytecode ISA)</li>
      <li><strong>Purpose:</strong> portability + memory safety</li>
    </ul>
  </div>
</div>
<table>
  <thead><tr><th></th><th>System VM</th><th>Process VM</th></tr></thead>
  <tbody>
    <tr><td>Abstracts</td><td>Physical hardware</td><td>CPU instruction set</td></tr>
    <tr><td>Examples</td><td>VMware, VirtualBox, WSL</td><td>JVM, CPython, CLR, V8</td></tr>
    <tr><td>Runs</td><td>A whole OS</td><td>A single program</td></tr>
    <tr><td>Memory managed by</td><td>Guest OS</td><td>The VM itself</td></tr>
  </tbody>
</table>
<div class="info">Both use the same word for the same reason: both create an abstraction layer that says "write for me, not for real hardware — I'll handle the translation."</div>

<h3>Process VM Landscape Across Languages</h3>
<table>
  <thead><tr><th>Language</th><th>VM</th><th>Bytecode format</th><th>JIT?</th></tr></thead>
  <tbody>
    <tr><td>Python</td><td>CPython VM (PVM)</td><td>.pyc</td><td>No (PyPy adds it)</td></tr>
    <tr><td>Java</td><td>JVM (HotSpot)</td><td>.class files</td><td>Yes (C2 compiler)</td></tr>
    <tr><td>Kotlin / Scala / Clojure</td><td>JVM</td><td>.class files</td><td>Yes (same HotSpot)</td></tr>
    <tr><td>C# / F#</td><td>CLR (.NET Runtime)</td><td>CIL / MSIL</td><td>Yes (RyuJIT)</td></tr>
    <tr><td>Ruby</td><td>YARV</td><td>in-memory</td><td>Partial</td></tr>
    <tr><td>PHP</td><td>Zend Engine</td><td>OPcache opcodes</td><td>Partial</td></tr>
    <tr><td>Erlang / Elixir</td><td>BEAM VM</td><td>.beam files</td><td>No</td></tr>
    <tr><td>Lua</td><td>Lua VM</td><td>in-memory</td><td>No (LuaJIT adds it)</td></tr>
    <tr><td>JavaScript</td><td>V8 / SpiderMonkey / JSC</td><td>in-memory</td><td>Yes (always)</td></tr>
  </tbody>
</table>
<div class="info">JVM is dominant — Kotlin, Scala, Groovy, Clojure all compile to .class bytecode and ride the same HotSpot JIT. "Runs on the JVM" is a selling point because HotSpot is one of the most battle-tested runtimes ever built.</div>
<div class="info">BEAM (Erlang/Elixir) is notable not for speed but fault tolerance — the VM enforces a concurrency model of millions of lightweight processes with "let it crash" semantics.</div>

<h3>CPython: Compiler vs PVM Are Two Separate Components</h3>
<p>PVM's responsibility starts <strong>only at bytecode</strong>. The source → bytecode step is a separate CPython component.</p>
<pre>
  script.py
      │
      ▼
  ┌────────────────────────────────┐
  │       CPython Compiler         │  ← NOT the PVM
  │  Lexer → Parser → AST          │
  │  → Compiler → bytecode         │    lives in parser/compiler modules
  └────────────────────────────────┘
      │
      │  .pyc (the handoff point)
      ▼
  ┌────────────────────────────────┐
  │             PVM                │  ← PVM starts here
  │  reads each bytecode opcode    │    lives in Python/ceval.c
  │  executes on real hardware     │
  └────────────────────────────────┘</pre>
<div class="info">Both are part of the same CPython binary and run sequentially when you call <code>python script.py</code>. But they are separate components with separate jobs. Compiler output = .pyc. PVM input = .pyc.</div>

<h3>AST — Universal Compiler Tool (Not Specific to VMs)</h3>
<p>AST exists in <strong>every language</strong> — compiled, interpreted, and JIT. It's a compiler scratch pad, not a runtime concept.</p>
<pre>
  int x = a + b * 2;   ← flat text, ambiguous

          Assignment
          ├── x
          └── BinaryExpr (+)
                  ├── a
                  └── BinaryExpr (*)
                          ├── b
                          └── 2        ← tree is unambiguous, walkable</pre>
<ul>
  <li><strong>Type check</strong> — walk tree, verify <code>a</code> and <code>b</code> are ints</li>
  <li><strong>Optimize</strong> — spot <code>b * 2</code> can become <code>b &lt;&lt; 1</code></li>
  <li><strong>Code gen</strong> — walk tree, emit instructions in correct order</li>
  <li><strong>Always discarded</strong> after compilation — never persisted, just a scratch pad</li>
</ul>
<table>
  <thead><tr><th></th><th>Compiled (C, Rust, Go)</th><th>Bytecode VM (Python, Java, JS)</th></tr></thead>
  <tbody>
    <tr><td>Has AST?</td><td>Yes</td><td>Yes</td></tr>
    <tr><td>Used for</td><td>type checking, optimization, machine code gen</td><td>same — outputs bytecode instead</td></tr>
    <tr><td>Persisted?</td><td>No — discarded after compile</td><td>No — discarded after bytecode produced</td></tr>
    <tr><td>Output</td><td>machine code binary</td><td>bytecode</td></tr>
  </tbody>
</table>

<h3>Compiler Frontend vs Backend — and LLVM</h3>
<p>Every compiler has two halves:</p>
<pre>
  Source code
      ↓
  ┌─────────────────────┐
  │  Compiler Frontend  │  ← knows the SOURCE LANGUAGE (language-specific)
  │  Lex → Parse → AST  │
  │  Type checking      │
  │  Produces IR        │
  └─────────────────────┘
      ↓  IR (Intermediate Representation)
  ┌─────────────────────┐
  │  Compiler Backend   │  ← knows the TARGET HARDWARE (architecture-specific)
  │  Optimization       │
  │  Machine code gen   │
  └─────────────────────┘
      ↓
  Machine code</pre>
<p><strong>LLVM</strong> is a reusable compiler backend. Languages compile to <strong>LLVM IR</strong> and get every CPU architecture for free:</p>
<pre>
  C/C++  → Clang (frontend)  → LLVM IR ─┬─→ x86-64  (laptop)
  Rust   → rustc (frontend)  → LLVM IR  ├─→ ARM      (phone)
  Swift  → swiftc (frontend) → LLVM IR  ├─→ RISC-V   (embedded)
                                         └─→ WASM     (browser)</pre>
<div class="compare">
  <div><h4>Languages using LLVM backend</h4>
    <ul>
      <li><strong>C/C++</strong> via Clang — Clang is just the frontend</li>
      <li><strong>Rust</strong> via rustc — LLVM is why Rust targets so many platforms</li>
      <li><strong>Swift</strong> via swiftc — Apple's language, fully LLVM-backed</li>
      <li><strong>Kotlin Native</strong> — Kotlin targeting non-JVM platforms (iOS, embedded)</li>
    </ul>
  </div>
  <div><h4>Languages with their own backend (no LLVM)</h4>
    <ul>
      <li><strong>C/C++</strong> via GCC — GCC has its own backend, pre-dates LLVM</li>
      <li><strong>Go</strong> via <code>gc</code> — Go's own compiler, not LLVM</li>
      <li>Clang vs GCC: same output (machine code), different toolchain</li>
    </ul>
  </div>
</div>
<div class="warn">C/C++ via LLVM/Clang is still a compiled language — output is native machine code, no VM at runtime. LLVM is a build-time tool only. By the time your binary runs, LLVM is long gone.</div>
</template>

<template id="node-02-10" data-type="node" data-trail="trail-02" data-order="11"
  data-title="Pandas Reference Guide"
  data-file="Python/PANDAS_REFERENCE_GUIDE.md"
  data-bridge="">
<h3>Performance vs Pure Python</h3>
<table>
  <thead><tr><th>Operation (1M rows)</th><th>Pure Python</th><th>pandas</th><th>Speedup</th></tr></thead>
  <tbody>
    <tr><td>Iterate + sum</td><td>~3.0 s</td><td>~0.015 s</td><td>200×</td></tr>
    <tr><td>groupby + mean</td><td>~8.0 s</td><td>~0.04 s</td><td>200×</td></tr>
    <tr><td>merge two DataFrames</td><td>~12.0 s</td><td>~0.1 s</td><td>120×</td></tr>
  </tbody>
</table>
<h3>Internal Architecture</h3>
<pre>
  Your pandas code (Python)
         │
         ▼
  ┌──────────────────────────────────────────────┐
  │          pandas API (Python layer)            │
  ├──────────────────────────────────────────────┤
  │            Cython / C internals              │
  │   groupby  │  merge  │  rolling              │
  │            ▼                                 │
  │      NumPy vectorised operations             │
  │            ▼                                 │
  │      SIMD (CPU vector units)                 │
  └──────────────────────────────────────────────┘
         │
         ▼
  Contiguous column arrays in RAM</pre>
<h3>Key Optimisations</h3>
<ul>
  <li><strong>Column-oriented storage</strong>: each column is a contiguous C array — reading one column touches nothing else</li>
  <li><strong>SIMD vectorisation</strong>: NumPy operations exploit CPU vector units automatically</li>
  <li><strong>Index hash tables</strong>: <code>df.loc[label]</code> is O(1) average, not O(n) scan</li>
  <li><strong>Copy-on-write</strong> (pandas 2.0+): modifications copy only when data actually diverges</li>
  <li><strong>Split-apply-combine</strong>: <code>groupby()</code> runs entirely in Cython, not Python loops</li>
  <li><strong>dtype optimisation</strong>: <code>int32</code> halves memory vs <code>int64</code>; <code>category</code> for low-cardinality strings</li>
</ul>
<h3>When to Use What</h3>
<table>
  <thead><tr><th>Scenario</th><th>Tool</th></tr></thead>
  <tbody>
    <tr><td>Complex multi-step transforms, fits in RAM</td><td>pandas</td></tr>
    <tr><td>Simple filter/sort of DB data</td><td>ORM or raw SQL</td></tr>
    <tr><td>Dataset larger than available RAM</td><td>Dask or Polars</td></tr>
    <tr><td>Statistical analysis, ML feature engineering</td><td>pandas</td></tr>
    <tr><td>Transactional data with integrity constraints</td><td>ORM / SQL</td></tr>
  </tbody>
</table>
</template>

<template id="node-02-11" data-type="node" data-trail="trail-02" data-order="7"
  data-title="WSGI and ASGI Deep Dive"
  data-file="Python/WSGI and ASGI Deep Dive.md"
  data-bridge="With the runtime and deployment model fully clear, OOP is the design layer used to structure the code that runs within it — encapsulation, MRO, duck typing, and the patterns in every production Python codebase.">

<h3>The Problem: No Standard Before WSGI</h3>
<p>Before PEP 333 (2003), every framework had bespoke server integrations. <strong>WSGI</strong> defined a single callable contract so any server and any framework can be swapped freely — neither side needs to know what the other is built with.</p>

<h3>WSGI Interface</h3>
<pre>
  def app(environ, start_response):
      # environ        — dict: method, path, headers, body (file-like)
      # start_response — callback: call to send status + response headers
      start_response('200 OK', [('Content-Type', 'text/plain')])
      return [b'Hello World']   # iterable of bytes

  ┌────────────┐   environ, start_response   ┌───────────────┐
  │  Gunicorn  │ ──────────────────────────► │  Django/Flask │
  │  (server)  │ ◄────────────────────────── │  (your app)   │
  └────────────┘   iterable of bytes         └───────────────┘
</pre>
<div class="warn">WSGI is synchronous — server blocks until app returns. WebSockets never "return", so WSGI cannot model them.</div>

<h3>ASGI Interface (2019)</h3>
<pre>
  async def app(scope, receive, send):
      # scope   — connection metadata (type, path, headers)
      # receive — async callable: pull incoming events (body chunks, WS messages)
      # send    — async callable: push outgoing events (response start, body, WS frames)

      await send({'type': 'http.response.start', 'status': 200, 'headers': [...]})
      await send({'type': 'http.response.body',  'body': b'Hello'})

  One coroutine can hold a WebSocket open indefinitely —
  sending and receiving events without blocking a process.
</pre>

<h3>WSGI vs ASGI</h3>
<table>
  <thead><tr><th></th><th>WSGI</th><th>ASGI</th></tr></thead>
  <tbody>
    <tr><td>Interface</td><td>Sync callable</td><td>Async callable</td></tr>
    <tr><td>WebSocket / SSE</td><td>No</td><td>Yes</td></tr>
    <tr><td>HTTP/2</td><td>No</td><td>Yes</td></tr>
    <tr><td>Servers</td><td>Gunicorn, uWSGI</td><td>Uvicorn, Daphne, Hypercorn</td></tr>
    <tr><td>Frameworks</td><td>Django, Flask</td><td>FastAPI, Starlette, Django Channels</td></tr>
  </tbody>
</table>

<h3>Gunicorn and Uvicorn Are Python</h3>
<div class="compare">
  <div><h4>CPython interpreter</h4><pre>
executes bytecode
manages memory, GIL
knows nothing about HTTP
no socket, no port binding</pre></div>
  <div><h4>Gunicorn / Uvicorn</h4><pre>
plain Python packages (pip install)
binds socket, accepts TCP
parses HTTP bytes
calls app(environ, ...) or
    await app(scope, ...)</pre></div>
</div>
<div class="info">Node.js is the exception: its <code>http</code> module is baked into the runtime in C++. No separate server package needed — the runtime IS the server interface.</div>

<h3>Dev Servers vs Production Servers</h3>
<p>Frameworks ship a dev server already — it uses Python's <code>socket</code> stdlib directly:</p>
<ul>
  <li>Django: <code>manage.py runserver</code></li>
  <li>Flask: <code>flask run</code></li>
  <li>FastAPI: <code>uvicorn main:app</code> directly</li>
</ul>
<p>These are single-process. What Gunicorn adds for production:</p>
<ul>
  <li><strong>Pre-fork workers</strong>: spawns N OS processes; copy-on-write memory efficient</li>
  <li><strong>Crash recovery</strong>: automatically restarts a crashed worker</li>
  <li><strong>Graceful restart</strong>: drains in-flight requests before replacing workers on deploy</li>
  <li><strong>Timeout enforcement</strong>: kills hung workers past a threshold</li>
  <li><strong>Signal handling</strong>: SIGTERM / SIGHUP / SIGWINCH handled correctly</li>
</ul>

<h3>Common Deployment Patterns</h3>
<table>
  <thead><tr><th>Scenario</th><th>Stack</th></tr></thead>
  <tbody>
    <tr><td>Development</td><td><code>manage.py runserver</code> or <code>uvicorn main:app</code></td></tr>
    <tr><td>Simple async prod</td><td><code>uvicorn main:app --workers 4</code></td></tr>
    <tr><td>Django / Flask prod</td><td>Nginx → Gunicorn → Django</td></tr>
    <tr><td>FastAPI prod</td><td>Nginx → Gunicorn (process mgr) → Uvicorn workers → FastAPI</td></tr>
  </tbody>
</table>
<div class="info">Gunicorn + Uvicorn workers is a common combo: Gunicorn owns process supervision and signals; Uvicorn owns the async event loop inside each worker.</div>
</template>

<!-- Trail 03: Node.js Runtime -->
<template id="node-03-01" data-type="node" data-trail="trail-03" data-order="1"
  data-title="Event Loop: Role"
  data-file="NodeJS/Event Loop- Role.md"
  data-bridge="The 'what': Node's event loop is a single thread that delegates I/O to the browser or OS and processes callbacks when they return. The 'how': libuv, six distinct loop phases, and the critical microtask-vs-macrotask ordering that determines when your callbacks actually run.">
<h3>The Single-Threaded Problem</h3>
<pre>
  JavaScript has ONE call stack.
  Any slow/synchronous code on the stack BLOCKS everything:
  rendering, clicks, timers — all frozen until stack empties.
  "Don't block the event loop" is the cardinal rule.</pre>
<h3>Async APIs Live OUTSIDE the JS Engine</h3>
<pre>
  ┌──────────────────────────────────────────────────────┐
  │               BROWSER / NODE.JS                       │
  │                                                       │
  │  ┌───────────────┐    ┌─────────────────────────┐    │
  │  │  JS Engine    │    │   Web APIs / OS APIs    │    │
  │  │  Call Stack   │    │                         │    │
  │  │               │    │  setTimeout ──────────┐ │    │
  │  │               │    │  XHR / fetch ─────────┤ │    │
  │  └──────┬────────┘    └──────────────┬─────────┘ │   │
  │         │                            │            │   │
  │         │    ┌───────────────────────▼──────────┐ │   │
  │         │    │         Task Queue               │ │   │
  │         │    │  [callback_1, callback_2, ...]   │ │   │
  │         │    └─────────────────────────────────┘ │   │
  │         │                    ▲                   │   │
  │         └──── Event Loop ─────┘                   │   │
  │               "stack empty? push next callback"   │   │
  └──────────────────────────────────────────────────┘</pre>
<h3>setTimeout(0) — After the Stack, Not Immediately</h3>
<pre>
  console.log("A");
  setTimeout(() => console.log("B"), 0);
  console.log("C");

  1. Stack runs → logs "A"
  2. setTimeout hands callback to Browser APIs (0ms timer)
  3. Stack runs → logs "C"
  4. Stack EMPTIES
  5. Timer fires → callback → Task Queue
  6. Event Loop pushes callback → logs "B"

  Output: A, C, B</pre>
<ul>
  <li>Rendering is queued like tasks — heavy JS blocks repaints</li>
  <li>Synchronous callbacks (e.g. <code>Array.forEach</code>) run in current stack — not async</li>
  <li><strong>Debouncing</strong>: fire handler only after events stop for N ms — prevents queue flooding</li>
</ul>
</template>

<template id="node-03-02" data-type="node" data-trail="trail-03" data-order="2"
  data-title="Event Loop: Deep Dive"
  data-file="NodeJS/Event Loop- Deep dive.md"
  data-bridge="The event loop handles I/O concurrency but is helpless for CPU-bound work — one heavy computation blocks everything. Worker threads give you true OS-level parallelism within Node without spawning a new process.">
<h3>Six Event Loop Phases</h3>
<pre>
  ┌─────────────────────────────────────────────────┐
  │                  EVENT LOOP                      │
  │                                                  │
  │   TIMERS          setTimeout / setInterval        │
  │       ↓                                          │
  │   PENDING CALLBACKS  I/O errors from prev tick   │
  │       ↓                                          │
  │   IDLE / PREPARE  internal use only              │
  │       ↓                                          │
  │   POLL            retrieve new I/O, run callbacks│
  │       ↓           (blocks here if nothing ready) │
  │   CHECK           setImmediate callbacks          │
  │       ↓                                          │
  │   CLOSE CALLBACKS socket.destroy() etc.          │
  │       └──────────────► (back to TIMERS)           │
  └─────────────────────────────────────────────────┘</pre>
<h3>Microtasks vs Macrotasks</h3>
<pre>
  MACROTASKS (one per loop tick):
    setTimeout, setInterval, setImmediate, I/O callbacks

  MICROTASKS (drained COMPLETELY before next phase):
    process.nextTick  ← highest priority
    Promise.then/catch
    queueMicrotask()</pre>
<h3>Execution Order Example</h3>
<pre>
  setTimeout(() => console.log("1: timeout"), 0);
  Promise.resolve().then(() => console.log("2: promise"));
  process.nextTick(() => console.log("3: nextTick"));
  console.log("4: sync");

  Output:
  4: sync       ← synchronous stack
  3: nextTick   ← process.nextTick (highest-priority microtask)
  2: promise    ← Promise microtask
  1: timeout    ← setTimeout macrotask (next loop tick)</pre>
<table>
  <thead><tr><th>Phase</th><th>What runs</th><th>Key APIs</th></tr></thead>
  <tbody>
    <tr><td>Timers</td><td>Expired timer callbacks</td><td><code>setTimeout</code>, <code>setInterval</code></td></tr>
    <tr><td>Poll</td><td>New I/O events + callbacks</td><td><code>fs.readFile</code>, network sockets</td></tr>
    <tr><td>Check</td><td>Immediate callbacks</td><td><code>setImmediate</code></td></tr>
  </tbody>
</table>
<ul>
  <li>Node does NOT re-scan source code each tick — callbacks are pre-registered in phase queues</li>
  <li>Poll phase <strong>blocks</strong> waiting for new I/O if timer queue and check queue are empty — how Node sleeps efficiently</li>
</ul>
</template>

<template id="node-03-03" data-type="node" data-trail="trail-03" data-order="3"
  data-title="Worker Threads"
  data-file="NodeJS/Worker threads.md"
  data-bridge="">
<h3>Node.js Architecture (Three Distinct Layers)</h3>
<pre>
  ┌─────────────────────────────────────────────────────────┐
  │                     NODE.JS RUNTIME                      │
  │                                                         │
  │  ┌───────────────────────────────────────────────────┐  │
  │  │       JS MAIN THREAD  (single thread for JS)      │  │
  │  │   V8 engine  +  Event Loop (libuv)                │  │
  │  └───────────────────────┬───────────────────────────┘  │
  │                          │ delegates work                │
  │         ┌────────────────┼──────────────────┐           │
  │         ▼                ▼                  ▼            │
  │  ┌─────────────┐  ┌──────────────┐  ┌──────────────┐   │
  │  │   libuv     │  │  Worker      │  │  Worker      │   │
  │  │   Thread    │  │  Thread 1    │  │  Thread 2    │   │
  │  │   Pool      │  │  own V8      │  │  own V8      │   │
  │  │  (4 default)│  │  own loop    │  │  own loop    │   │
  │  └─────────────┘  └──────────────┘  └──────────────┘   │
  │  Blocking OS I/O   CPU-bound JS      CPU-bound JS        │
  │  (fs, DNS, crypto  (image proc,      (compression)       │
  │   zlib)             ML inference)                        │
  └─────────────────────────────────────────────────────────┘</pre>
<div class="compare">
  <div><h4>libuv Thread Pool</h4>
    <ul>
      <li>Handles: <code>fs.readFile</code>, <code>dns.lookup</code>, crypto, zlib</li>
      <li>Does <strong>NOT</strong> execute JavaScript</li>
      <li>Callback fires back on main JS thread when done</li>
    </ul>
  </div>
  <div><h4>Worker Threads</h4>
    <ul>
      <li>Full V8 instance — runs actual JavaScript</li>
      <li>Own event loop — truly parallel to main</li>
      <li>Separate OS thread; independent of libuv pool</li>
      <li>Communication via <code>postMessage()</code></li>
    </ul>
  </div>
</div>
<table>
  <thead><tr><th>Scenario</th><th>Approach</th><th>Why</th></tr></thead>
  <tbody>
    <tr><td>File I/O, DNS, crypto</td><td>Async API (nothing extra)</td><td>libuv pool handles it automatically</td></tr>
    <tr><td>High-concurrency HTTP</td><td>Event loop + async/await</td><td>Non-blocking; no threads needed</td></tr>
    <tr><td>CPU-bound computation</td><td>Worker threads</td><td>Moves off main thread; true parallelism</td></tr>
  </tbody>
</table>
</template>

<template id="node-04-01" data-type="node" data-trail="trail-04" data-order="1"
  data-title="What Happens When You Visit a Website"
  data-file="Networking/What happens when you visit a website.md"
  data-bridge="The full URL-to-pixels journey gives you the narrative. Now zoom into the layers: OSI model, TCP/IP stack, and the protocols at each level — so 'Layer 7 routing' means something concrete.">
<h3>URL Structure</h3>
<pre>
  https://example.com/products/shoes?color=red
  ──────   ───────────  ──────────────  ─────────
  scheme   domain        path            query</pre>
<h3>The Full Journey: 6 Steps</h3>
<pre>
  1. URL PARSE
     Extract scheme, domain, path

  2. DNS LOOKUP
     browser cache → OS cache → resolver (1.1.1.1)
     → root server → .com TLD → authoritative server
     Result: example.com = 93.184.216.34
     (cached at every level)

  3. TCP HANDSHAKE
     Browser → SYN → server
     server → SYN-ACK
     Browser → ACK     ← ESTABLISHED

  4. TLS HANDSHAKE  (https only)
     Negotiate cipher, exchange certificates
     (SSL session resumption reuses prior keys)

  5. HTTP REQUEST / RESPONSE
     GET / HTTP/1.1 ──────────────────► server
     HTTP/1.1 200 OK ◄──────────────── HTML

  6. RENDER + SUB-RESOURCES
     Parse HTML → find CSS, JS, images
     Repeat steps 2–5 for each resource
     Reuse TCP connections via Keep-Alive</pre>
</template>

<template id="node-04-02" data-type="node" data-trail="trail-04" data-order="2"
  data-title="Networking Fundamentals: Protocols and Layers"
  data-file="Networking/Networking Fundamentals - Protocols, Layers, and W.md"
  data-bridge="From the protocol layers, zoom deeper into the mechanics: what sockets actually are as kernel data structures, how TCP's sequence numbers and ACKs ensure reliability, and what routers actually do at each hop.">
<h3>OSI Model + Encapsulation</h3>
<pre>
  Layer             What it does                    Protocols
  ────────────────  ──────────────────────────────  ─────────────────
  Application (7)   Format the actual message        HTTP, DNS, SMTP
  Transport   (4)   Reliable or fast delivery         TCP, UDP, QUIC
  Network     (3)   Route across the internet         IPv4, IPv6
  Data Link   (2)   Deliver to the next device        Ethernet, Wi-Fi
  Physical    (1)   Convert bits to signals            Cables, radio

  Each layer ADDS its own header (encapsulation):
  ┌─────────────────────────────────────────────────────┐
  │  HTTP data                             (Application) │
  ├─────────────────────────────────────────────────────┤
  │  TCP header  +  HTTP data              (Transport)   │
  ├─────────────────────────────────────────────────────┤
  │  IP header   +  TCP segment            (Network)     │
  ├─────────────────────────────────────────────────────┤
  │  Ethernet hdr + IP packet              (Data Link)   │
  └─────────────────────────────────────────────────────┘
                     ↓ bits on wire (Physical)</pre>
<h3>DNS Resolution Steps</h3>
<pre>
  1. Browser DNS cache   → hit? done
  2. OS DNS cache        → hit? done
  3. OS sends UDP query (port 53) to resolver
  4. Resolver → Root server    "Who handles .com?"
  5. Resolver → TLD server     "Who handles example.com?"
  6. Resolver → Auth server    "What is example.com's IP?"
  7. IP returned and cached at resolver + OS + browser</pre>
<h3>TCP vs UDP</h3>
<table>
  <thead><tr><th></th><th>TCP</th><th>UDP</th></tr></thead>
  <tbody>
    <tr><td>Reliability</td><td>Guaranteed (ACKs + retransmit)</td><td>No guarantee</td></tr>
    <tr><td>Ordering</td><td>In-order delivery assured</td><td>Out-of-order possible</td></tr>
    <tr><td>Connection</td><td>3-way handshake required</td><td>Connectionless</td></tr>
    <tr><td>Use for</td><td>HTTP, SSH, databases</td><td>DNS, video streaming, gaming, QUIC</td></tr>
  </tbody>
</table>
<h3>Port Ranges</h3>
<table>
  <thead><tr><th>Range</th><th>Type</th><th>Examples</th></tr></thead>
  <tbody>
    <tr><td>0–1023</td><td>Well-known (root to bind)</td><td>80 HTTP, 443 HTTPS, 53 DNS, 22 SSH</td></tr>
    <tr><td>1024–49151</td><td>Registered apps</td><td>3306 MySQL, 5432 Postgres, 6379 Redis</td></tr>
    <tr><td>49152–65535</td><td>Ephemeral (OS assigns to clients)</td><td>Your browser's outbound source ports</td></tr>
  </tbody>
</table>
<ul>
  <li>TCP port 80 and UDP port 80 are completely independent namespaces (protocol is part of the 5-tuple)</li>
  <li>HTTP/2 runs over TCP; HTTP/3 runs over QUIC (UDP-based, built-in encryption, faster connection setup)</li>
</ul>
</template>

<template id="node-04-03" data-type="node" data-trail="trail-04" data-order="3"
  data-title="Networking Deep Dive: How the Internet Actually Works"
  data-file="Networking/Networking Deep Dive — How the Internet Actually Works.md"
  data-bridge="With the full request cycle understood, HTTP status codes are the vocabulary servers use to communicate outcomes — essential for designing and consuming APIs correctly.">
<h3>End-to-End: 7 Stages</h3>
<pre>
  STAGE 1: Browser — socket(), connect(), write("GET / HTTP/1.1...")
  STAGE 2: Kernel  — TCP segments, IP wraps, Ethernet frame → NIC queue
  STAGE 3: NIC     — converts frame to electrical signals → wire
  STAGE 4: Routers (10–20 hops)
           Each: strip Ethernet → read IP → routing table → new Ethernet frame
           IP addresses STAY THE SAME. MAC addresses CHANGE every hop.
           Routers NEVER read TCP headers or HTTP content.
  STAGE 5: Server's kernel — NIC → strip layers → matches 5-tuple → socket
           Web server: read() → process → write("HTTP/1.1 200 OK...")
  STAGE 6: Response (~36 TCP segments for 52 KB)
           Each segment independently routed back
           Kernel reassembles in order using sequence numbers
  STAGE 7: Browser renders — discovers sub-resources → fetch via same socket</pre>
<h3>Socket: A Kernel Data Structure</h3>
<pre>
  ┌─────────────────────────────────────────────────────┐
  │            SOCKET in kernel memory                   │
  │                                                      │
  │  5-tuple: (TCP, 192.168.1.42, 52384, 93.184.216.34, 80) │
  │  Send buffer:    your write() calls queue here       │
  │  Receive buffer: incoming data waits here            │
  │  Sequence tracking: next seq# to send: 1501          │
  │  State: ESTABLISHED                                  │
  └─────────────────────────────────────────────────────┘
  A socket is NOT a wire — it is kernel state.
  Every TCP segment travels independently as an IP packet.</pre>
<h3>TCP 3-Way Handshake + Sequence Numbers</h3>
<pre>
  Browser → SYN, seq=1000   "My first byte is #1001"
  Google  → SYN-ACK, seq=5000, ack=1001
  Browser → ACK, ack=5001   ESTABLISHED

  Google sends 52 KB response (split into segments):
    seq=5001, len=1460  ✓ received
    seq=6461, len=1460  ✗ LOST!
    seq=7921, len=1460  ✓ held out of order

  Browser → ACK 6461 (duplicate — gap not filled)
  Google retransmits seq=6461 → Browser ACK 9381 ✓

  ACKs are cumulative: ACK 9381 = "everything up to 9380 received"</pre>
<ul>
  <li>Browser only uses 4 syscalls: <code>socket()</code>, <code>connect()</code>, <code>write()</code>, <code>read()</code></li>
  <li>MSS ≈ 1,460 bytes = 1,500 (Ethernet) − 20 (IP) − 20 (TCP)</li>
  <li>HTTP is plain ASCII text written into the socket — no binary encoding of headers</li>
</ul>
</template>

<h3>Key Codes Reference</h3>
<table>
  <thead><tr><th>Code</th><th>Name</th><th>When to use</th></tr></thead>
  <tbody>
    <tr><td>200</td><td>OK</td><td>GET/PUT succeeded; body present</td></tr>
    <tr><td>201</td><td>Created</td><td>POST created a resource; include <code>Location</code> header</td></tr>
    <tr><td>202</td><td>Accepted</td><td>Request received but async (job queued)</td></tr>

    <tr><td>400</td><td>Bad Request</td><td>Malformed request (unparseable JSON, missing fields)</td></tr>
    <tr><td>401</td><td>Unauthorized</td><td>"Who are you?" — not authenticated</td></tr>
    <tr><td>403</td><td>Forbidden</td><td>"I know who you are, but no" — not authorized</td></tr>
    <tr><td>404</td><td>Not Found</td><td>Resource does not exist</td></tr>
    <tr><td>409</td><td>Conflict</td><td>Write conflict (duplicate key, stale lock)</td></tr>
    <tr><td>422</td><td>Unprocessable Entity</td><td>Parseable but semantically invalid (validation errors)</td></tr>
    <tr><td>429</td><td>Too Many Requests</td><td>Rate limit exceeded</td></tr>
    <tr><td>500</td><td>Internal Server Error</td><td>Generic server failure; safe to retry</td></tr>
    <tr><td>502</td><td>Bad Gateway</td><td>Upstream service returned invalid response</td></tr>
    <tr><td>503</td><td>Service Unavailable</td><td>Server overloaded or in maintenance</td></tr>
    <tr><td>504</td><td>Gateway Timeout</td><td>Upstream did not respond in time</td></tr>
  </tbody>
</table>
<div class="info"><strong>400 vs 422:</strong> 400 = can't even parse the request; 422 = parsed fine but values are invalid.<br><strong>301 vs 302:</strong> 301 = browser caches and skips your server next time (bad for analytics); 302 = every visit hits your server.</div>

<template id="node-05-01" data-type="node" data-trail="trail-05" data-order="1"

  data-bridge="MVC is a structural pattern; SOLID is the set of principles that explain why that structure is valuable. Understanding SOLID transforms 'this is how web frameworks work' into 'this is why code stays maintainable as it grows'.">
<h3>The Three Layers</h3>
<pre>

                         ↑                    ↑

  <div><h4>Your REST API</h4><pre>View = JSON formatter
responseHandler.ts:
{ success: true,
  data: {...} }</pre></div>
</div>
<h3>Service Layer Enhancement</h3>
<div class="compare">
  <div><h4>Pure MVC (fat controller)</h4><pre>Controller handles:
- HTTP parsing
- Business rules
- DB queries
- Response format
Hard to test ✗</pre></div>
  <div><h4>MVC + Service Layer</h4><pre>Controller: HTTP only
  └─ call service
Service: business logic
  └─ call model
Model: DB queries

  <thead><tr><th>Framework</th><th>Model</th><th>View</th><th>Controller</th></tr></thead>

    <tr><td>Django</td><td>ORM Model</td><td>Template</td><td><strong>View</strong> function (confusing!)</td></tr>
    <tr><td>Rails</td><td>ActiveRecord</td><td>.erb template</td><td>Controller</td></tr>
    <tr><td>Express / Node</td><td>Mongoose schema</td><td>responseHandler</td><td>Route handler</td></tr>
